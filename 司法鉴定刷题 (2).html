"×","ref":"仲裁法第四十四条，可以交由当事人约定的鉴定部门鉴定，也可以由仲裁庭指定的鉴定部门鉴定。"},{"id":"2_338","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《中华人民共和国仲裁法》的规定，仲裁庭对专门性问题认为需要鉴定的，应当由仲裁庭指定的鉴定部门鉴定。","answer":"×","ref":"仲裁法第四十四条。"},{"id":"2_339","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据中华人民共和国仲裁法》的规定，当事人的请求或者仲裁庭的要求，鉴定部门应当派鉴定人参加开庭。","answer":"√","ref":"仲裁法第四十四条。"},{"id":"2_340","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《中华人民共和国仲裁法》的规定，鉴定部门派鉴定人参加开庭。当事人经鉴定部门许可，可以向鉴定人提问。","answer":"×","ref":"仲裁法第四十四条，当事人经仲裁庭许可。"},{"id":"2_341","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《中华人民共和国仲裁法》的规定，鉴定部门派鉴定人参加开庭。当事人经仲裁庭许可，可以向鉴定人提问。","answer":"√","ref":"仲裁法第四十四条。"},{"id":"3_344","type":"single","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定管理实行（ ）和（ ）相结合的管理制度。","options":{"A":"行政管理","B":"行政管理 组织管理","C":"行业管理 业务管理","D":"行业管理 组织管理"},"answer":["A"],"ref":"《司法鉴定机构登记管理办法》第四条。"},{"id":"3_345","type":"single","chapter":"司法鉴定机构登记管理办法","question":"司法行政机关对（ ）及（ ）依法进行指导、管理和监督、检查。","options":{"A":"司法鉴定机构 司法鉴定人","B":"司法鉴定人 司法鉴定活动","C":"司法鉴定机构 司法鉴定文书","D":"司法鉴定机构 司法鉴定活动"},"answer":["D"],"ref":"《司法鉴定机构登记管理办法》第四条。"},{"id":"3_346","type":"single","chapter":"司法鉴定机构登记管理办法","question":"法人或者其他组织申请从事司法鉴定业务，应当有（ ）的资金。","options":{"A":"不少于十万至五十万元人民币","B":"不少于二十万至五十万元人民币","C":"不少于二十万至一百万元人民币","D":"不少于一百万至二百万元人民币"},"answer":["C"],"ref":"《司法鉴定机构登记管理办法》第十四条。"},{"id":"3_347","type":"single","chapter":"司法鉴定机构登记管理办法","question":"《司法鉴定许可证》由（ ）统一监制，分为正本和副本。","options":{"A":"司法部","B":"省级司法行政机关","C":"市级司法行政机关","D":"县级司法行政机关"},"answer":["A"],"ref":"《司法鉴定机构登记管理办法》第二十二条。"},{"id":"3_348","type":"single","chapter":"司法鉴定机构登记管理办法","question":"《司法鉴定许可证》使用期限为（ ），自颁发之日起计算。","options":{"A":"一年","B":"两年","C":"五年","D":"十年"},"answer":["C"],"ref":"《司法鉴定机构登记管理办法》第二十二条。"},{"id":"3_349","type":"single","chapter":"司法鉴定机构登记管理办法","question":"《司法鉴定许可证》使用期限届满后，需要延续的，司法鉴定机构应当在使用期限届满（）前，向原负责登记的司法行政机关提出延续申请，司法行政机关依法审核办理。","options":{"A":"七日","B":"十日","C":"十五日","D":"三十日"},"answer":["D"],"ref":"《司法鉴定机构登记管理办法》第二十六条。"},{"id":"3_350","type":"single","chapter":"司法鉴定机构登记管理办法","question":"登记事项发生变化，不符合设立条件的司法鉴定机构，原负责登记的司法行政机关应当依法办理（）手续。","options":{"A":"鉴定许可","B":"重新登记","C":"补充登记","D":"注销登记"},"answer":["D"],"ref":"《司法鉴定机构登记管理办法》第二十七条。"},{"id":"3_351","type":"single","chapter":"司法鉴定机构登记管理办法","question":"省级司法行政机关负责编制本行政区域的司法鉴定人和司法鉴定机构名册，报司法部备案后，在本行政区域内（）公告一次。","options":{"A":"每半年","B":"每年","C":"每两年","D":"每三年"},"answer":["B"],"ref":"《司法鉴定机构登记管理办法》第二十九条。"},{"id":"3_352","type":"single","chapter":"司法鉴定机构登记管理办法","question":"司法部负责汇总省级司法行政机关编制的司法鉴定人和司法鉴定机构名册，在全国范围内（）公告一次。","options":{"A":"每年","B":"每两年","C":"每三年","D":"每五年"},"answer":["D"],"ref":"《司法鉴定机构登记管理办法》第二十九条。"},{"id":"3_353","type":"single","chapter":"司法鉴定机构登记管理办法","question":"（ ）应当按照统一部署，依法对司法鉴定机构进行监督、检查。","options":{"A":"司法鉴定协会","B":"人民检察院","C":"人民法院","D":"司法行政机关"},"answer":["D"],"ref":"《司法鉴定机构登记管理办法》第三十三条。"},{"id":"3_354","type":"single","chapter":"司法鉴定机构登记管理办法","question":"法人或者其他组织未经登记从事司法鉴定业务的，省级司法行政机关应当责令其停止司法鉴定活动，并处以违法所得（）的罚款，罚款总额最高不得超过（ ）。","options":{"A":"一至三倍 一万元","B":"一至三倍 三万元","C":"一至五倍 三万元","D":"一至五倍 五万元"},"answer":["B"],"ref":"《司法鉴定机构登记管理办法》第三十八条。"},{"id":"3_363","type":"multi","chapter":"司法鉴定机构登记管理办法","question":"司法行政机关对司法鉴定机构及其司法鉴定活动依法进行（ ）。","options":{"A":"指导","B":"管理","C":"监督","D":"检查"},"answer":["A","B","C","D"],"ref":"《司法鉴定机构登记管理办法》第四条。"},{"id":"3_364","type":"multi","chapter":"司法鉴定机构登记管理办法","question":"全国实行统一的司法鉴定机构及司法鉴定人（ ）制度。","options":{"A":"审核登记","B":"名册编制","C":"业务管理","D":"名册公告"},"answer":["A","B","D"],"ref":"《司法鉴定机构登记管理办法》第五条。"},{"id":"3_365","type":"multi","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定机构的发展应当符合下列哪些要求（ ）。","options":{"A":"统筹规划","B":"合理布局","C":"优化结构","D":"有序发展"},"answer":["A","B","C","D"],"ref":"《司法鉴定机构登记管理办法》第六条。"},{"id":"3_366","type":"multi","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定机构开展司法鉴定活动应当遵循下列哪些原则（ ）。","options":{"A":"合法","B":"中立","C":"规范","D":"有偿"},"answer":["A","B","C"],"ref":"《司法鉴定机构登记管理办法》第七条。D 应为及时。"},{"id":"3_367","type":"multi","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定机构具有下列哪些情形，原负责登记的司法行政机关应当依法办理注销登记手续（）。","options":{"A":"依法申请终止司法鉴定活动的","B":"自愿解散或者停业的","C":"登记事项发生变化，不符合设立条件的","D":"《司法鉴定许可证》使用期限届满未申请延续的"},"answer":["A","B","C","D"],"ref":"《司法鉴定机构登记管理办法》第二十七条。"},{"id":"3_368","type":"multi","chapter":"司法鉴定机构登记管理办法","question":"司法行政机关应当就下列哪些事项，对司法鉴定机构进行监督、检查（ ）。","options":{"A":"遵守法律、法规和规章的情况","B":"遵守司法鉴定程序、技术标准的情况","C":"遵守技术操作规范的情况","D":"所属司法鉴定人执业的情况"},"answer":["A","B","C","D"],"ref":"《司法鉴定机构登记管理办法》第三十四条。"},{"id":"3_369","type":"multi","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定机构有下列哪些情形的，由省级司法行政机关依法给予警告，并责令其改正（）。","options":{"A":"超出登记的司法鉴定业务范围开展司法鉴定活动的","B":"未经依法登记擅自设立分支机构的；","C":"未依法办理变更登记的","D":"登记事项发生变化，不符合设立条件的"},"answer":["A","B","C"],"ref":"《司法鉴定机构登记管理办法》第三十九条。D 应为二十七条的注销登记手续。"},{"id":"3_370","type":"multi","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定机构有下列哪些情形的，由省级司法行政机关依法给予警告，并责令其改正（）。","options":{"A":"出借《司法鉴定许可证》的","B":"违反司法鉴定收费管理办法的","C":"《司法鉴定许可证》使用期限届满未申请延续的","D":"无正当理由拒绝接受司法鉴定委托的"},"answer":["A","B","D"],"ref":"《司法鉴定机构登记管理办法》第三十九条。C 应为二十七条的注销登记手续。"},{"id":"3_371","type":"multi","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定机构有下列哪些情形的，由省级司法行政机关依法给予警告，并责令其改正（）。","options":{"A":"登记事项发生变化，不符合设立条件的","B":"组织未取得《司法鉴定人执业证》的人员从事司法鉴定业务的","C":"《司法鉴定许可证》使用期限届满未申请延续的","D":"支付回扣、介绍费，进行虚假宣传等不正当行为的"},"answer":["B","D"],"ref":"《司法鉴定机构登记管理办法》第三十九条。AC 应为二十七条的注销登记手续。"},{"id":"3_375","type":"multi","chapter":"司法鉴定机构登记管理办法","question":"司法部负责全国司法鉴定机构的登记管理工作，依法履行的主要职责有（）。","options":{"A":"制定全国司法鉴定发展规划并指导实施","B":"负责对司法鉴定机构违法违纪的执业行为进行调查处理","C":"组织制定全国统一的司法鉴定实施程序、技术标准和技术操作规范等司法鉴定技术管理制度","D":"指导司法鉴定科学技术研究、开发、引进与推广"},"answer":["A","C","D"],"ref":"《司法鉴定机构登记管理办法》第九条。B 为省级司法行政机关对机构登记管理工作的主要职责。"},{"id":"3_376","type":"multi","chapter":"司法鉴定机构登记管理办法","question":"申请从事司法鉴定业务，应当具备的条件有（ ）。","options":{"A":"有不少于二十万至一百万元人民币的资金","B":"有明确的司法鉴定业务范围","C":"每项司法鉴定业务必须有两名（含两名）以上司法鉴定人","D":"拥有产权的办公住所"},"answer":["A","B"],"ref":"《司法鉴定机构登记管理办法》第十四条。"},{"id":"3_377","type":"multi","chapter":"司法鉴定机构登记管理办法","question":"以下关于司法鉴定机构设立分支机构的说法不正确的有（ ）。","options":{"A":"分支机构在本省的，可以直接开展业务范围内的司法鉴定活动","B":"分支机构在本省的，应当经省级司法行政机关审核登记","C":"分支机构跨省的，可以直接开展业务范围内的司法鉴定活动","D":"分支机构跨省的，须经当地省级司法行政机关审核登记后，方可开展业务范围内的司法鉴定活动"},"answer":["B","D"],"ref":"《司法鉴定机构登记管理办法》第十七条。"},{"id":"3_378","type":"multi","chapter":"司法鉴定机构登记管理办法","question":"法人或者其他组织申请从事司法鉴定业务，以下属于应当提交的材料有（）。","options":{"A":"申请表","B":"住所证明","C":"资金证明","D":"仪器设备所有权凭证"},"answer":["A","B","C","D"],"ref":"《司法鉴定机构登记管理办法》第十五条。"},{"id":"3_379","type":"multi","chapter":"司法鉴定机构登记管理办法","question":"以下关于司法鉴定机构审核登记的说法正确的有（ ）。","options":{"A":"鉴定机构负责人受过刑事处罚的不予受理","B":"司法行政机关决定受理申请的，应当出具受理决定书","C":"司法行政机关应组织专家对鉴定机构进行评审","D":"经审核不符合条件的，应书面通知申请人并说明理由"},"answer":["A","B","C","D"],"ref":"《司法鉴定机构登记管理办法》第十九条、二十条。"},{"id":"3_380","type":"multi","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定机构出现以下哪些情形的，省级司法行政机关应依法给予敬告，并责令整改（）。","options":{"A":"未依法办理变更登记的","B":"出借《司法鉴定许可证》的","C":"无正当理由拒绝接受司法鉴定委托的","D":"支付回扣、介绍费的"},"answer":["A","B","C","D"],"ref":"《司法鉴定机构登记管理办法》第三十九条。"},{"id":"3_381","type":"multi","chapter":"司法鉴定机构登记管理办法","question":"省级司法行政机关依法给予停止从事司法鉴定业务三个月以下一年以下处罚的情形有（）。","options":{"A":"因严重不负责任给当事人合法权益造成重大损失的","B":"未经依法登记擅自设立分支机构，并造成严重后果的","C":"提供虚假证明文件骗取登记的","D":"进行虚假宣传等不正当行为，并造成严重后果的"},"answer":["A","B","C","D"],"ref":"《司法鉴定机构登记管理办法》第四十条。"},{"id":"3_382","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定管理实行行政管理与业务管理相结合的管理制度。","answer":"×","ref":"《司法鉴定机构登记管理办法》第四条。行政管理和行业管理。"},{"id":"3_383","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定行业协会依法进行自律管理。","answer":"√","ref":"《司法鉴定机构登记管理办法》第四条。"},{"id":"3_384","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"全国实行统一的司法鉴定机构及司法鉴定人审核登记、名册编制和名册公告制度。","answer":"√","ref":"《司法鉴定机构登记管理办法》第五条。"},{"id":"3_385","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定机构开展司法鉴定活动应当遵循合法、中立、有偿、及时的原则。","answer":"×","ref":"《司法鉴定机构登记管理办法》第七条。合法、中立、规范、及时。"},{"id":"3_386","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法部负责制定全国统一的司法鉴定机构资质管理评估制度和司法鉴定质量管理评估制度并指导实施。","answer":"√","ref":"《司法鉴定机构登记管理办法》第九条。"},{"id":"3_387","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"法人或者其他组织申请从事司法鉴定业务，应当对申请材料的真实性、完整性和可靠性负责。","answer":"√","ref":"《司法鉴定机构登记管理办法》第十五条。"},{"id":"3_388","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"跨省（自治区、直辖市）设立分支机构的，经拟设分支机构所在行政区域的省级司法行政机关审核登记后，无需报经司法鉴定机构所在行政区域的省级司法行政机关同意。","answer":"×","ref":"《司法鉴定机构登记管理办法》第十七条。两个都需要。"},{"id":"3_389","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定机构应当参加司法鉴定执业责任保险并且建立执业风险金制度。","answer":"×","ref":"《司法鉴定机构登记管理办法》第十八条。或者。"},{"id":"3_390","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法行政机关应当组织专家，对申请人从事司法鉴定业务必需的仪器、设备和检测实验室进行评审，评审的时间计入审核时限。","answer":"×","ref":"《司法鉴定机构登记管理办法》第二十条。不计入。"},{"id":"3_391","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"《司法鉴定许可证》正本和副本具有同等的法律效力。","answer":"√","ref":"《司法鉴定机构登记管理办法》第二十二条。"},{"id":"3_392","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定资源不足的地区，司法行政机关可以采取招标的方式审核登记司法鉴定机构。","answer":"√","ref":"《司法鉴定机构登记管理办法》第二十三条。"},{"id":"3_393","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定机构要求变更有关登记事项的，应当及时向上一级负责登记的司法行政机关提交变更登记申请书和相关材料。","answer":"×","ref":"《司法鉴定机构登记管理办法》第二十四条，原司法行政机关。"},{"id":"3_394","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定机构变更后的登记事项，应当在《司法鉴定许可证》正本和副本上 同时注明。","answer":"×","ref":"《司法鉴定机构登记管理办法》第二十五条，在副本上注明。"},{"id":"3_395","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"不申请延续的司法鉴定机构，《司法鉴定许可证》使用期限届满后，由原负责登记的司法行政机关办理注销登记手续。","answer":"√","ref":"《司法鉴定机构登记管理办法》第二十六条。"},{"id":"3_396","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定机构依法申请终止司法鉴定活动的，上一级司法行政机关应当依法办理注销登记手续。","answer":"×","ref":"《司法鉴定机构登记管理办法》第二十七条。原负责登记的司法行政机关。"},{"id":"3_397","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法部负责汇总省级司法行政机关编制的司法鉴定人和司法鉴定机构名册，在全国范围内每三年公告一次。","answer":"×","ref":"《司法鉴定机构登记管理办法》第二十九条，每五年。"},{"id":"3_398","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"省级司法行政机关负责编制本行政区域的司法鉴定人和司法鉴定机构名册，报司法部备案后，在本行政区域内每年公告一次。","answer":"√","ref":"《司法鉴定机构登记管理办法》第二十九条。"},{"id":"3_399","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定人和司法鉴定机构名册分为电子版和纸质版。电子版由司法行政机关负责公告，纸质版由司法行政机关组织司法鉴定机构在有关媒体上公告并正式出版。","answer":"√","ref":"《司法鉴定机构登记管理办法》第三十条。"},{"id":"3_400","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法行政机关对司法鉴定机构进行监督、检查时，可以依法查阅或者要求司法鉴定机构报送有关材料。司法鉴定机构应当如实提供有关情况和材料。","answer":"√","ref":"《司法鉴定机构登记管理办法》第三十五条。"},{"id":"3_401","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法行政机关对司法鉴定机构进行资质评估，对司法鉴定质量进行评估。评估结果供司法行政机关内部掌握，一般无需向社会公开。","answer":"×","ref":"《司法鉴定机构登记管理办法》第三十七条。向社会公开。"},{"id":"3_402","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"拒绝接受司法行政机关监督、检查或者向其提供虚假材料的司法鉴定机构，应由原负责登记的司法行政机关依法办理注销登记手续。","answer":"×","ref":"《司法鉴定机构登记管理办法》第三十九条。由省级司法行政机关依法给予警告，并责令其改正。"},{"id":"3_403","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"未经依法登记擅自设立分支机构的，应由省级司法行政机关依法给予警告，并责令其改正。","answer":"√","ref":"《司法鉴定机构登记管理办法》第三十九条。"},{"id":"3_404","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定机构对司法行政机关的行政许可和行政处罚有异议的，可以依法申请行政复议。","answer":"√","ref":"《司法鉴定机构登记管理办法》第四十三条。"},{"id":"3_408","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定机构应当参加司法鉴定执业责任保险或建立执业风险金制度。","answer":"√","ref":"《司法鉴定机构登记管理办法》第十八条。"},{"id":"3_409","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"申请设立具有独立法人资格的司法鉴定机构，应当提交司法鉴定机构章程。 ╳，《司法鉴定机构登记管理办法》第十七条，均须报经机构所在行政区域的省级司法行政机关审核同意。","answer":"√","ref":"《司法鉴定机构登记管理办法》第十五条。"},{"id":"3_411","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法鉴定资源不足的地区，司法行政机关可以采取招标的方式审核登记司法鉴定机构。","answer":"√","ref":"《司法鉴定机构登记管理办法》第二十三条。"},{"id":"3_413","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"不申请延续的司法鉴定机构，《司法鉴定许可证》使用期限届满后，由原负责登记的司法行政机关办理注销登记手续。","answer":"√","ref":"《司法鉴定机构登记管理办法》第二十六条。"},{"id":"3_414","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法行政机关应当按照统一部署，依法对司法鉴定机构进行监督、检查。","answer":"√","ref":"《司法鉴定机构登记管理办法》第三十三条。"},{"id":"3_415","type":"judge","chapter":"司法鉴定机构登记管理办法","question":"司法行政机关工作人员在管理工作中滥用职权、玩忽职守造成严重后果的，依法追究相应的法律责任。","answer":"√","ref":"《司法鉴定机构登记管理办法》第四十二条。"},{"id":"4_417","type":"single","chapter":"司法鉴定人登记管理办法","question":"申请从事经验鉴定型或者技能鉴定型司法鉴定业务的，应当具备相关专业工作（）以上经历和较强的专业技能。","options":{"A":"三年","B":"五年","C":"八年","D":"十年"},"answer":["D"],"ref":"《司法鉴定人登记管理办法》第十二条。"},{"id":"4_418","type":"single","chapter":"司法鉴定人登记管理办法","question":"《司法鉴定人执业证》使用期限为（ ），自颁发之日起计算。","options":{"A":"一年","B":"两年","C":"五年","D":"十年"},"answer":["C"],"ref":"《司法鉴定人登记管理办法》第十七条。"},{"id":"4_419","type":"single","chapter":"司法鉴定人登记管理办法","question":"《司法鉴定人执业证》使用期限届满后，需要继续执业的，司法鉴定人应当在使用期限届满（）前通过所在司法鉴定机构，向原负责登记的司法行政机关提出延续申请，司法行政机关依法审核办理。","options":{"A":"七日","B":"十日","C":"十五日","D":"三十日"},"answer":["D"],"ref":"《司法鉴定人登记管理办法》第十九条。"},{"id":"4_420","type":"single","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人发生下列哪种情形，原负责登记的司法行政机关应当依法办理注销登记手续（）。","options":{"A":"所在司法鉴定机构注销或者被撤销的","B":"同时在两个以上司法鉴定机构执业的","C":"超出登记的执业类别执业的","D":"私自接受司法鉴定委托的"},"answer":["A"],"ref":"《司法鉴定人登记管理办法》第二十条。BCD 为二十九条，由省级司法行政机关依法给予警告，并责令其改正。"},{"id":"4_421","type":"single","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人依法申请终止司法鉴定活动的，（）应当依法办理注销登记手续。","options":{"A":"司法鉴定人","B":"原负责登记的司法行政机关","C":"司法鉴定行业协会","D":"原负责登记的司法行政机关的上级机关"},"answer":["B"],"ref":"《司法鉴定人登记管理办法》第二十条。"},{"id":"4_422","type":"single","chapter":"司法鉴定人登记管理办法","question":"下列哪项属于司法鉴定人应当履行的义务（ ）。","options":{"A":"要求鉴定委托人无偿提供鉴定所需要的鉴材、样本","B":"依法出庭作证，回答与鉴定有关的询问","C":"进行鉴定所必需的检验、检查和模拟实验","D":"拒绝解决、回答与鉴定无关的问题"},"answer":["B"],"ref":"《司法鉴定人登记管理办法》第二十二条。ACD 均为权利，二十一条。"},{"id":"4_423","type":"single","chapter":"司法鉴定人登记管理办法","question":"《司法鉴定人执业证》使用期限为（ ），自颁发之日起计算。","options":{"A":"两年","B":"三年","C":"四年","D":"五年"},"answer":["D"],"ref":"《司法鉴定人登记管理办法》第十七条。"},{"id":"4_424","type":"single","chapter":"司法鉴定人登记管理办法","question":"个人申请从事司法鉴定业务，应当具有相关的行业职业资格或者高等院校相关专业本科以上学历，从事相关工作（）以上。","options":{"A":"三年","B":"五年","C":"八年","D":"十年"},"answer":["B"],"ref":"《司法鉴定人登记管理办法》第十二条第二款。"},{"id":"4_425","type":"single","chapter":"司法鉴定人登记管理办法","question":"个人申请从事经验鉴定型或者技能鉴定型司法鉴定业务的，应当具备相关专业工作（）以上经历和较强的专业技能。","options":{"A":"三年","B":"五年","C":"八年","D":"十年"},"answer":["D"],"ref":"《司法鉴定人登记管理办法》第十二条第三款。"},{"id":"4_426","type":"single","chapter":"司法鉴定人登记管理办法","question":"未经审核登记的人员，从事已纳入《司法鉴定人登记管理办法》调整范围司法鉴定业务的，省级司法行政机关对其罚款总额最高不得超过（）万元。","options":{"A":"三","B":"二","C":"四","D":"一"},"answer":["A"],"ref":"《司法鉴定人登记管理办法》第二十八条。"},{"id":"4_427","type":"single","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人对司法行政机关的行政许可和行政处罚有异议的，可以依法申请 （ ）。","options":{"A":"行政诉讼","B":"行政仲裁","C":"行政复议","D":"行政强制"},"answer":["C"],"ref":"《司法鉴定人登记管理办法》第三十三条。"},{"id":"4_428","type":"single","chapter":"司法鉴定人登记管理办法","question":"《司法鉴定人执业证》使用期限届满后，司法鉴定人需要继续执业的，应当在使用期限届满（）日前提出申请。","options":{"A":"三十","B":"二十","C":"六十","D":"五十"},"answer":["A"],"ref":"《司法鉴定人登记管理办法》第十九条。"},{"id":"4_429","type":"single","chapter":"司法鉴定人登记管理办法","question":"《司法鉴定人执业证》由（ ）统一监制。","options":{"A":"司法局","B":"司法部","C":"司法厅","D":"司法行政机关"},"answer":["B"],"ref":"司机鉴定人登记管理办法第十七条。"},{"id":"4_430","type":"single","chapter":"司法鉴定人登记管理办法","question":"司法鉴定管理实行行政管理与（）相结合的制度。","options":{"A":"组织管理","B":"公共管理","C":"行业管理","D":"人事管理"},"answer":["C"],"ref":"《司法鉴定人登记管理办法》第四条。"},{"id":"4_431","type":"single","chapter":"司法鉴定人登记管理办法","question":"司法部依法指导和监督（）司法行政机关对司法鉴定人的审核登记、名册编制和名册公告工作。","options":{"A":"注销","B":"撤销","C":"撤回","D":"吊销"},"answer":["B"],"ref":"《司法鉴定人登记管理办法》第八条第一款。"},{"id":"4_433","type":"single","chapter":"司法鉴定人登记管理办法","question":"司法行政机关依法建立司法鉴定人诚信档案，对司法鉴定人进行诚信登记评估，评估结果（）。","options":{"A":"应当保密","B":"只通知司法鉴定人","C":"只通知司法鉴定人所在鉴定机构","D":"向社会公开"},"answer":["D"],"ref":"《司法鉴定人登记管理办法》第二十七条。"},{"id":"4_434","type":"single","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人应当在所在司法鉴定机构接受（ ）统一部署的监督、检查。","options":{"A":"法院","B":"公安机关","C":"检察机关","D":"司法行政机关"},"answer":["D"],"ref":"《司法鉴定人登记管理办法》第二十三条。"},{"id":"4_435","type":"single","chapter":"司法鉴定人登记管理办法","question":"有下列（）情形的，不得申请从事司法鉴定业务。","options":{"A":"完全民事行为能力人","B":"所在的司法鉴定机构受到停业处罚，处罚期已满","C":"限制行为能力人","D":"拟执业机构已经取得"},"answer":["C"],"ref":"《司法鉴定人登记管理办法》第十三条。"},{"id":"4_436","type":"single","chapter":"司法鉴定人登记管理办法","question":"下列哪一职责是省级司法行政机关应该依法履行的（ ）。","options":{"A":"负责对司法鉴定人进行监督、检查","B":"制定司法鉴定人执业规则","C":"制定司法鉴定人继续教育规划","D":"制定司法鉴定人诚信等级评估制度"},"answer":["A"],"ref":"《司法鉴定人登记管理办法》第九条。"},{"id":"4_437","type":"single","chapter":"司法鉴定人登记管理办法","question":"下列哪一项不是司法鉴定人享有的权利（ ）。","options":{"A":"进行鉴定所必需的检验","B":"鉴定意见不一致时，保留不同意见","C":"接受岗前培训和继续教育","D":"出庭质证时，拒绝回答问题"},"answer":["D"],"ref":"《司法鉴定人登记管理办法》第二十一条。"},{"id":"4_438","type":"single","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人同时在两个以上司法鉴定机构执业的（ ）。","options":{"A":"由省级司法行政机关给予停止执业","B":"依法给予警告并责令其改正","C":"撤销登记","D":"追究刑事责任"},"answer":["B"],"ref":"《司法鉴定人登记管理办法》第二十九条。"},{"id":"4_439","type":"single","chapter":"司法鉴定人登记管理办法","question":"全国实行统一的司法鉴定机构及司法鉴定人名册编制、名册公告制度和（）。","options":{"A":"诚信登记评估制度","B":"回避制度","C":"保密制度","D":"审核登记制度"},"answer":["D"],"ref":"《司法鉴定人登记管理办法》第五条。"},{"id":"4_441","type":"single","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人是指运用科学技术或者专门知识对诉讼涉及的（）问题进行鉴别和判断并提出鉴定意见的人员。","options":{"A":"专门性","B":"针对性","C":"综合性","D":"专业性"},"answer":["A"],"ref":"《司法鉴定人登记管理办法》第三条。"},{"id":"4_442","type":"single","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人应当科学、客观、独立、（ ）地从事司法鉴定活动。","options":{"A":"公平","B":"公正","C":"公允","D":"公道"},"answer":["B"],"ref":"《司法鉴定人登记管理办法》第六条。"},{"id":"4_443","type":"single","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人拒绝接受司法行政机关监督、检查的（ ）。","options":{"A":"由省级司法行政机关给予停止执业","B":"依法给予警告并责令其改正","C":"撤销登记","D":"给予罚款"},"answer":["A"],"ref":"《司法鉴定人登记管理办法》第二十九条。"},{"id":"4_444","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人执业实行（ ）制度。","options":{"A":"回避","B":"保密","C":"时限","D":"错鉴责任追究"},"answer":["A","B","C","D"],"ref":"《司法鉴定人登记管理办法》第七条。"},{"id":"4_445","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法部负责全国司法鉴定人的登记管理工作，依法履行的职责包括（ ）。","options":{"A":"制定司法鉴定人执业规则和职业道德、职业纪律规范","B":"制定司法鉴定人诚信等级评估制度并指导实施","C":"制定和发布司法鉴定人继续教育规划并指导实施","D":"负责对司法鉴定人进行监督、检查"},"answer":["A","B","C"],"ref":"《司法鉴定人登记管理办法》第八条。D 由省级司法行政机关负责。第九条。"},{"id":"4_446","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法部负责全国司法鉴定人的登记管理工作，依法履行的职责包括（ ）。","options":{"A":"会同国务院有关部门制定司法鉴定人专业技术职称评聘标准和办法","B":"负责对司法鉴定人违法违纪执业行为进行调查处理","C":"制定和发布司法鉴定人继续教育规划并指导实施","D":"负责对司法鉴定人进行监督、检查"},"answer":["A","C"],"ref":"《司法鉴定人登记管理办法》第八条。BD 由省级司法行政机关负责。第九条。"},{"id":"4_447","type":"multi","chapter":"司法鉴定人登记管理办法","question":"省级司法行政机关负责本行政区域内司法鉴定人的登记管理工作，依法履行的职责包括（）。","options":{"A":"指导和监督省级司法行政机关对司法鉴定人的审核登记、名册编制和名册公告工作","B":"负责司法鉴定人诚信等级评估工作","C":"负责对司法鉴定人违法违纪执业行为进行调查处理","D":"组织开展司法鉴定人专业技术职称评聘工作"},"answer":["B","C","D"],"ref":"《司法鉴定人登记管理办法》第九条。A 为司法部负责，第八条。"},{"id":"4_448","type":"multi","chapter":"司法鉴定人登记管理办法","question":"省级司法行政机关负责本行政区域内司法鉴定人的登记管理工作，依法履行的职责包括（）。","options":{"A":"负责司法鉴定人的审核登记、名册编制和名册公告","B":"负责对司法鉴定人进行监督、检查","C":"制定司法鉴定人诚信等级评估制度并指导实施","D":"组织司法鉴定人参加司法鉴定岗前培训和继续教育"},"answer":["A","B","D"],"ref":"《司法鉴定人登记管理办法》第九条。C 为司法部负责，第八条。"},{"id":"4_449","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人应当享有的权利包括（ ）。","options":{"A":"了解、查阅与鉴定事项有关的情况和资料","B":"询问与鉴定事项有关的当事人、证人等","C":"妥善保管送鉴的鉴材、样本和资料","D":"进行鉴定所必需的检验、检查和模拟实验"},"answer":["A","B","D"],"ref":"《司法鉴定人登记管理办法》第二十一条。C 为二十二条规定的义务。"},{"id":"4_450","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人应当享有的权利包括（ ）。","options":{"A":"要求鉴定委托人无偿提供鉴定所需要的鉴材、样本","B":"依法出庭作证，回答与鉴定有关的询问","C":"妥善保管送鉴的鉴材、样本和资料","D":"拒绝解决、回答与鉴定无关的问题"},"answer":["A","D"],"ref":"《司法鉴定人登记管理办法》第二十一条。BC 为二十二条规定的义务。"},{"id":"4_451","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人应当享有的权利包括（ ）。","options":{"A":"获得合法报酬","B":"拒绝接受不合法的鉴定委托","C":"鉴定意见不一致时，保留不同意见","D":"接受岗前培训和继续教育"},"answer":["A","B","C","D"],"ref":"《司法鉴定人登记管理办法》第二十一条。"},{"id":"4_452","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人应当履行的义务包括（ ）。","options":{"A":"对鉴定意见负责","B":"依法回避","C":"妥善保管送鉴的鉴材、样本和资料","D":"鉴定意见不一致时，保留不同意见"},"answer":["A","B","C"],"ref":"《司法鉴定人登记管理办法》第二十二条。D 为二十一条规定的权利。"},{"id":"4_453","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人应当履行的义务包括（ ）。","options":{"A":"依法出庭作证，回答与鉴定有关的询问","B":"保守在执业活动中知悉的国家秘密、商业秘密和个人隐私","C":"妥善保管送鉴的鉴材、样本和资料","D":"自觉接受司法行政机关的管理和监督、检查"},"answer":["A","B","C","D"],"ref":"《司法鉴定人登记管理办法》第二十二条。"},{"id":"4_454","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法行政机关应当就下列哪些事项，对司法鉴定人进行监督、检查（ ）。","options":{"A":"遵守法律、法规和规章的情况","B":"遵守司法鉴定程序、技术标准和技术操作规范的情况","C":"遵守执业规则、职业道德和职业纪律的情况","D":"遵守所在司法鉴定机构内部管理制度的情况"},"answer":["A","B","C","D"],"ref":"《司法鉴定人登记管理办法》第二十四条。"},{"id":"4_455","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人有下列哪些情形的，由省级司法行政机关依法给予警告，并责令其改正（）。","options":{"A":"同时在两个以上司法鉴定机构执业的","B":"超出登记的执业类别执业的","C":"私自接受司法鉴定委托的","D":"《司法鉴定人执业证》使用期限届满未申请延续的"},"answer":["A","B","C"],"ref":"《司法鉴定人登记管理办法》第二十九条。D 为二十条规定的注销登记。"},{"id":"4_456","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人有下列哪些情形的，由省级司法行政机关依法给予警告，并责令其改正（）。","options":{"A":"违反保密和回避规定的","B":"拒绝接受司法行政机关监督、检查或者向其提供虚假材料的","C":"《司法鉴定人执业证》使用期限届满未申请延续的","D":"私自接受司法鉴定委托的"},"answer":["A","B","D"],"ref":"《司法鉴定人登记管理办法》第二十九条。C 为二十条规定的注销登记。"},{"id":"4_457","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法部负责全国司法鉴定人的登记管理工作，下列哪些职责是其应依法履行的（）。","options":{"A":"制定司法鉴定人诚信等级评估制度并指导实施","B":"会同国务院有关部门制定司法鉴定人专业技术职称评聘标准和办法","C":"负责每年司法鉴定人的名册公告","D":"负责每年司法鉴定人的名册编制"},"answer":["A","B"],"ref":"《司法鉴定人登记管理办法》第八条。"},{"id":"4_458","type":"multi","chapter":"司法鉴定人登记管理办法","question":"省级司法行政机关负责本行政区域内司法鉴定人的登记管理工作，下列哪些职责是其应依法履行的（）。","options":{"A":"制定司法鉴定人诚信等级评估制度并指导实施","B":"负责对司法鉴定人进行监督检查","C":"负责对司法鉴定人违法违纪执业行为进行调查处理","D":"负责辖区内司法鉴定人的名册编制"},"answer":["B","C","D"],"ref":"《司法鉴定人登记管理办法》第九条。"},{"id":"4_459","type":"multi","chapter":"司法鉴定人登记管理办法","question":"以下哪些条件是个人申请从事司法鉴定业务需要具备的（ ）。","options":{"A":"身体健康，能够适应司法鉴定工作需要","B":"所申请从事的司法鉴定业务，行业有特殊规定的，应当符合行业规定","C":"拟执业机构已经取得或者正在申请《司法鉴定许可证》","D":"具有相关的高级专业技术职称；或者具有相关的行业执业资格或者高等院校相关专业本科以上学历，从事相关工作五年以上。"},"answer":["A","B","C","D"],"ref":"《司法鉴定人登记管理办法》第十二条。"},{"id":"4_460","type":"multi","chapter":"司法鉴定人登记管理办法","question":"以下哪种情形，不得申请从事司法鉴定业务（ ）。","options":{"A":"受过开除公职处分的","B":"所在的司法鉴定机构受到业务处罚，处罚期已满的","C":"限制行为能力人","D":"被司法行政机关撤销司法鉴定人登记的"},"answer":["A","C","D"],"ref":"《司法鉴定人登记管理办法》第十三条。"},{"id":"4_461","type":"multi","chapter":"司法鉴定人登记管理办法","question":"个人申请从事司法鉴定业务，下列哪些材料是应当由拟执业的司法鉴定机构向司法行政机关提交的（）。","options":{"A":"专业技术职称","B":"行业执业资格","C":"从事相关专业工作经历","D":"申请表"},"answer":["A","B","C","D"],"ref":"《司法鉴定人登记管理办法》第十四条。"},{"id":"4_462","type":"multi","chapter":"司法鉴定人登记管理办法","question":"以下哪些内容是《司法鉴定人执业证》应当载明的（ ）。","options":{"A":"专业技术职称","B":"执业类别","C":"学历","D":"性别"},"answer":["A","B","D"],"ref":"《司法鉴定人登记管理办法》第十七条。"},{"id":"4_463","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人有下列哪些情形，原负责登记的司法行政机关应当依法办理注销登记手续（）。","options":{"A":"《司法鉴定人执业证》使用期限届满已申请延续的","B":"依法申请终止司法鉴定活动的","C":"所在司法鉴定机构注销或者被撤销的","D":"法律、法规规定的其他情形"},"answer":["B","C","D"],"ref":"《司法鉴定人登记管理办法》第二十条。"},{"id":"4_464","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人应当履行下列义务（ ）。","options":{"A":"受所在司法鉴定机构指派按照规定时限独立完成鉴定工作，并出具鉴定意见","B":"参加岗前培训和继续教育","C":"妥善保管送鉴的鉴材、样本和资料","D":"自觉接受司法行政机关的管理和监督、检查"},"answer":["A","C","D"],"ref":"《司法鉴定人登记管理办法》第二十二条。"},{"id":"4_465","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人出现下列哪些情形，由省级司法行政机关依法给予警告，并责令其改正（）。","options":{"A":"超出登记的执业类别执业的","B":"私自接受司法鉴定委托的","C":"违反保密和回避规定的","D":"违反《司法鉴定程序通则》的"},"answer":["A","B","C"],"ref":"《司法鉴定人登记管理办法》第二十九条。"},{"id":"4_466","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人因严重不负责任给当事人合法权益造成重大损失的（ ）。","options":{"A":"由省级司法行政机关给予停止执业三个月以上一年以下的处罚","B":"由省级司法行政机关给予停止执业三个月以上六个月以下的处罚","C":"情节严重的，撤销登记","D":"构成犯罪的，依法追究刑事责任"},"answer":["A","C","D"],"ref":"《司法鉴定人登记管理办法》第三十条。"},{"id":"4_467","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人有下列哪些情形且情节严重的，由省级司法行政机关撤销登记 （ ）。","options":{"A":"提供虚假证明文件或者采取其他欺诈手段，骗取登记的","B":"经人民法院依法通知，非法定事由拒绝出庭作证的","C":"故意做虚假鉴定的","D":"私自接受司法鉴定委托并造成严重后果的"},"answer":["A","B","C","D"],"ref":"《司法鉴定人登记管理办法》第三十条。"},{"id":"4_468","type":"multi","chapter":"司法鉴定人登记管理办法","question":"未经登记的人员，从事已纳入《司法鉴定人登记管理办法》调整范围司法鉴定业务的，以下说法正确的是（）。","options":{"A":"省级司法行政机关应当依法给予警告并责令其改正","B":"处以违法所得一至三倍的款，罚款总额最高不得超过五万元","C":"省级司法行政机关应当责令其停止司法鉴定活动","D":"处以违法所得一至三倍的款，罚款总额最高不得超过三万元"},"answer":["C","D"],"ref":"《司法鉴定人登记管理办法》第二十八条。"},{"id":"4_469","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法行政机关应当就下列哪些事项，对司法鉴定人进行监督、检查（ ）。","options":{"A":"遵守法律、法规和规章的情况","B":"遵守司法鉴定程序、技术标准和技术操作规范的情况","C":"遵守执业规则、职业道德和职业纪律的情况","D":"遵守所在司法鉴定机构内部管理制度的情况"},"answer":["A","B","C","D"],"ref":"《司法鉴定人登记管理办法》第二十四条。"},{"id":"4_470","type":"multi","chapter":"司法鉴定人登记管理办法","question":"下列对司法鉴定人的说法错误的是（ ）。","options":{"A":"司法鉴定人可以在两个司法鉴定机构中执业","B":"司法鉴定人是指运用科学技术或者专门知识对诉讼涉及的专门性问题进行鉴别和判断并提出鉴定意见的人员","C":"各地行政机关实行不同的司法鉴定人审核登记、名册编制和名册公告制度","D":"司法鉴定人应当按照登记的司法鉴定执业类别，从事司法鉴定业务"},"answer":["A","C"],"ref":"《司法鉴定人登记管理办法》第三条、第五条。"},{"id":"4_471","type":"multi","chapter":"司法鉴定人登记管理办法","question":"下列关于司法鉴定人登记管理主管机关的说法正确的是（ ）。","options":{"A":"司法部负责全国司法鉴定人的登记管理工作，依法制定司法鉴定人诚信等级评估制度","B":"省级司法行政机关负责对司法鉴定人进行监督、检查","C":"省级司法行政机关依法制定和发布司法鉴定人继续教育规划并指导实施","D":"省级司法行政机关可以委托下一级司法行政机关协助办理对司法鉴定人违法违纪执业行为进行调查处理的有关工作"},"answer":["A","B","D"],"ref":"《司法鉴定人登记管理办法》第八条、第九条、第十条。"},{"id":"4_472","type":"multi","chapter":"司法鉴定人登记管理办法","question":"下列关于司法鉴定人执业登记的说法正确的是（ ）。","options":{"A":"个人兼职从事司法鉴定业务的，应当经所在单位同意","B":"司法鉴定人经审核符合条件的，省级司法行政机关应当颁发《司法鉴定人执业证》","C":"《司法鉴定人执业证》使用期限届满后，不申请延续的司法鉴定人，由原负责登记的司法行政机关办理注销登记手续","D":"《司法鉴定人执业证》使用期限届满后需要继续执业的，司法鉴定人应当在使用期限届满六十日前提出。"},"answer":["A","B","C"],"ref":"《司法鉴定人登记管理办法》第十四条、十六条、十九条。"},{"id":"4_473","type":"multi","chapter":"司法鉴定人登记管理办法","question":"下列对司法鉴定人监督管理的说法错误的是（ ）。","options":{"A":"司法鉴定人应当在所在司法鉴定机构接受司法行政机关统一部署的监督、检查","B":"公民对司法鉴定人违反《司法鉴定人登记管理办法》规定的行为进行举报的，司法行政机关可暂不予处理","C":"司法行政机关依法建立司法鉴定人诚信档案，对司法鉴定人进行诚信等级评估","D":"司法行政机关对司法鉴定人进行监督时，不可以要求司法鉴定人报送有关材料"},"answer":["B","D"],"ref":"《司法鉴定人登记管理办法》第二十三条、二十五条、二十六条、二十七条。"},{"id":"4_474","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人在执业活动中，因重大过失行为给当事人造成损失的，下列说法正确的是（）。","options":{"A":"司法鉴定人所在的司法鉴定机构不用承担赔偿责任","B":"司法鉴定人所在的司法鉴定机构应依法承担赔偿责任","C":"司法鉴定机构可以向有过错行为的司法鉴定人追偿","D":"司法鉴定机构无权向有过错的司法鉴定人追偿"},"answer":["B","C"],"ref":"《司法鉴定人登记管理办法》第三十一条。"},{"id":"4_475","type":"multi","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人执业实行下列哪些制度（ ）。","options":{"A":"回避制度","B":"保密制度","C":"时限制度","D":"错鉴责任追究制度"},"answer":["A","B","C","D"],"ref":"《司法鉴定人登记管理办法》第七条。"},{"id":"4_476","type":"judge","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人执业实行回避、保密、时限和错鉴责任追究制度。","answer":"√","ref":"《司法鉴定人登记管理办法》第七条。"},{"id":"4_477","type":"judge","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人诚信等级评估工作由司法部负责。","answer":"×","ref":"《司法鉴定人登记管理办法》第八条、第九条。由省级司法行政机关负责。"},{"id":"4_478","type":"judge","chapter":"司法鉴定人登记管理办法","question":"个人不得兼职从事司法鉴定业务。","answer":"×","ref":"《司法鉴定人登记管理办法》第十四条。符合法律、法规的规定可以。"},{"id":"4_479","type":"judge","chapter":"司法鉴定人登记管理办法","question":"个人兼职从事司法鉴定业务的，应当符合法律、法规的规定，并提供所在单位同意其兼职从事司法鉴定业务的书面意见。","answer":"√","ref":"《司法鉴定人登记管理办法》第十四条。"},{"id":"4_480","type":"judge","chapter":"司法鉴定人登记管理办法","question":"《司法鉴定人执业证》由省级司法行政机关统一监制。","answer":"×","ref":"《司法鉴定人登记管理办法》第十七条，司法部。"},{"id":"4_481","type":"judge","chapter":"司法鉴定人登记管理办法","question":"不申请延续的司法鉴定人，《司法鉴定人执业证》使用期限届满后，由原负责登记的司法行政机关办理注销登记手续。","answer":"√","ref":"《司法鉴定人登记管理办法》第十九条。"},{"id":"4_482","type":"judge","chapter":"司法鉴定人登记管理办法","question":"接受岗前培训和继续教育既是司法鉴定人应当享有的权利，也是其应当履行的义务。","answer":"√","ref":"《司法鉴定人登记管理办法》第二十二条。"},{"id":"4_483","type":"judge","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人应当在所在司法鉴定机构接受司法行政机关统一部署的监督、检查。","answer":"√","ref":"《司法鉴定人登记管理办法》第二十三条。"},{"id":"4_484","type":"judge","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人在执业活动中，因故意或者过失行为给当事人造成损失的，其所在的司法鉴定机构依法承担赔偿责任后，可以向有过错行为的司法鉴定人追偿。","answer":"×","ref":"《司法鉴定人登记管理办法》第三十一条，重大过失。"},{"id":"4_485","type":"judge","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人可以在两个个司法鉴定机构中执业（ ）。","answer":"×","ref":"《司法鉴定人登记管理办法》第三条，应当在一个司法鉴定机构中执业。"},{"id":"4_486","type":"judge","chapter":"司法鉴定人登记管理办法","question":"司法鉴定管理实行行政管理与公共管理相结合的管理制度（ ）。","answer":"×","ref":"《司法鉴定人登记管理办法》第四条，行政管理与行业管理相结合。"},{"id":"4_487","type":"judge","chapter":"司法鉴定人登记管理办法","question":"全国实行统一司法鉴定机构及司法鉴定人审核登记、名册编制和名册公告制度（）。","answer":"√","ref":"《司法鉴定人登记管理办法》第五条。"},{"id":"4_488","type":"judge","chapter":"司法鉴定人登记管理办法","question":"省级司法行政机关组织司法鉴定人参加司法鉴定岗前培训和继续教育（ ）。","answer":"√","ref":"《司法鉴定人登记管理办法》第九条。"},{"id":"4_489","type":"judge","chapter":"司法鉴定人登记管理办法","question":"下一级司法行政机关可以受省级司法行政机关委托协助办理司法鉴定人的审核登记工作（）。","answer":"√","ref":"《司法鉴定人登记管理办法》第十条。"},{"id":"4_490","type":"judge","chapter":"司法鉴定人登记管理办法","question":"个人申请从事司法鉴定业务，应具有相关行业职业资格，从事相关工作两年以上（）。","answer":"×","ref":"《司法鉴定人登记管理办法》第十二条，从事相关工作五年以上。"},{"id":"4_491","type":"judge","chapter":"司法鉴定人登记管理办法","question":"申请从事经验鉴定型司法鉴定业务的，应当具备相关专业工作五年以上经历和较强的专业技能（）。","answer":"×","ref":"《司法鉴定人登记管理办法》第十二条，应当具备十年以上经历。"},{"id":"4_492","type":"judge","chapter":"司法鉴定人登记管理办法","question":"限制行为能力人不得申请从事司法鉴定业务（ ）。","answer":"√","ref":"《司法鉴定人登记管理办法》第十三条。"},{"id":"4_493","type":"judge","chapter":"司法鉴定人登记管理办法","question":"所在的司法鉴定机构受到停业处罚，处罚期已满，不得申请从事司法鉴定业务（）。","answer":"×","ref":"《司法鉴定人登记管理办法》第十三条，处罚期未满不得申请。"},{"id":"4_494","type":"judge","chapter":"司法鉴定人登记管理办法","question":"个人兼职从事司法鉴定业务的，应提供所在单位同意的书面意见（ ）。","answer":"√","ref":"《司法鉴定人登记管理办法》第十四条。"},{"id":"4_495","type":"judge","chapter":"司法鉴定人登记管理办法","question":"《司法鉴定人执业证》由司法部统一监制（ ）。","answer":"√","ref":"《司法鉴定人登记管理办法》第十七条。"},{"id":"4_496","type":"judge","chapter":"司法鉴定人登记管理办法","question":"《司法鉴定人执业证》使用期限为十年，自颁发之日起计算（ ）。","answer":"×","ref":"《司法鉴定人登记管理办法》第十七条，使用期限为五年。"},{"id":"4_497","type":"judge","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人要求变更有关登记事项的，应当通过所在司法鉴定机构向任一司法行政机关提交材料（）。","answer":"×","ref":"《司法鉴定人登记管理办法》第十八条，向原负责登记的司法行政机关提交。"},{"id":"4_498","type":"judge","chapter":"司法鉴定人登记管理办法","question":"《司法鉴定人执业证》应当载明执业机构和行业职业资格（ ）。","answer":"√","ref":"《司法鉴定人登记管理办法》第十七条。"},{"id":"4_499","type":"judge","chapter":"司法鉴定人登记管理办法","question":"《司法鉴定人执业证》使用期限届满后需延续申请的，之前提交的材料无需重复提交（）。","answer":"×","ref":"《司法鉴定人登记管理办法》第十九条，延续申请的条件和需提交材料按照初次申请执行。"},{"id":"4_500","type":"judge","chapter":"司法鉴定人登记管理办法","question":"《司法鉴定人执业证》使用期限届满后，不申请延续的司法鉴定人，由原负责登记的司法行政机关办理撤销手续（）。","answer":"×","ref":"《司法鉴定人登记管理办法》第十九条，办理注销登记手续。"},{"id":"4_501","type":"judge","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人所在司法机构注销，原负责登记的司法行政机关应当依法办理注销登记手续（）。","answer":"√","ref":"《司法鉴定人登记管理办法》第二十条。"},{"id":"4_502","type":"judge","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人享有要求鉴定委托人无偿提供鉴定所需要的鉴材、样本的权利 （ ）。","answer":"√","ref":"《司法鉴定人登记管理办法》第二十一条。"},{"id":"4_503","type":"judge","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人不可以拒绝超出鉴定登记的执业类别的鉴定委托（ ）。","answer":"×","ref":"《司法鉴定人登记管理办法》第二十一条，拒绝接受超出登记执业类别的委托。"},{"id":"4_504","type":"judge","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人应当保守在执业活动中知悉的国家秘密、商业秘密和个人隐私 （ ）。","answer":"√","ref":"《司法鉴定人登记管理办法》第二十二条。"},{"id":"4_505","type":"judge","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人应当在所在司法鉴定机构接受司法行政机关分别部署的监督、检查（）。","answer":"×","ref":"《司法鉴定人登记管理办法》第二十三条，统一部署的监督检查。"},{"id":"4_506","type":"judge","chapter":"司法鉴定人登记管理办法","question":"法人对司法鉴定人违反规定的行为进行投诉，司法行业协会应进行调查处理 （ ）。","answer":"×","ref":"《司法鉴定人登记管理办法》第二十五条，司法行政机关应及时进行调查处理。"},{"id":"4_507","type":"judge","chapter":"司法鉴定人登记管理办法","question":"司法行政机关对司法鉴定人根据举报进行调查时，司法鉴定人可以不提供有关情况和材料（）。","answer":"×","ref":"《司法鉴定人登记管理办法》第二十六条，司法鉴定人应如实提供有关情况和材料。"},{"id":"4_508","type":"judge","chapter":"司法鉴定人登记管理办法","question":"司法行政机关依法对司法鉴定人进行诚信等级评估，评估结果只向行业内公开（）。","answer":"×","ref":"《司法鉴定人登记管理办法》第二十七条，评估结果向社会公开。"},{"id":"4_509","type":"judge","chapter":"司法鉴定人登记管理办法","question":"未经登记的人员从事已纳入《司法鉴定人登记管理办法》调整范围司法鉴定业务的，省级司法行政机关可处以违法所得一至五倍的款，罚款总额最高不得超三万元（）。","answer":"×","ref":"《司法鉴定人登记管理办法》第二十八条，处违法所得一至三倍的款。"},{"id":"4_510","type":"judge","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人违反保密和回避规定的，省级司法行政机关给予停止执业三个月以上一年以下的处罚（）。","answer":"×","ref":"《司法鉴定人登记管理办法》第二十九条，依法给予警告并责令其改正。"},{"id":"4_511","type":"judge","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人经人民法院依法通知，非法定事由拒绝出庭作证，情节严重的，由省级司法行政机关撤销登记（）。","answer":"√","ref":"《司法鉴定人登记管理办法》第三十条。"},{"id":"4_512","type":"judge","chapter":"司法鉴定人登记管理办法","question":"司法行政机关工作人员在管理工作中滥用职权、玩忽职守造成严重后果的，依法追究相应的法律责任（）。","answer":"√","ref":"《司法鉴定人登记管理办法》第三十二条。"},{"id":"4_513","type":"judge","chapter":"司法鉴定人登记管理办法","question":"司法鉴定人对司法行政机关的行政许可和行政处罚有异议的，可以依法申请行政仲裁（）。","answer":"×","ref":"《司法鉴定人登记管理办法》第三十三条，可依法申请行政复议。"},{"id":"5_514","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定实行（ ）负责制度。","options":{"A":"鉴定机构","B":"鉴定人","C":"领导","D":"鉴定小组"},"answer":["B"],"ref":"司法鉴定程序通则第五条。"},{"id":"5_515","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定人可以在下列哪种地方会见诉讼当事人及其委托的人（ ）。","options":{"A":"鉴定机构","B":"鉴定人家中","C":"诉讼当事人家中","D":"任何地方"},"answer":["A"],"ref":"司法鉴定程序通则第五条。"},{"id":"5_516","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构和司法鉴定人进行司法鉴定活动应当依法接受监督，对于违反司法鉴定行业规范行为的，由（）给予相应的行业处分。","options":{"A":"司法行政机关","B":"法院","C":"司法鉴定协会","D":"医学会"},"answer":["C"],"ref":"司法鉴定程序通则第九条。"},{"id":"5_517","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"诉讼当事人对鉴定材料有异议的，应当向（ ）提出。","options":{"A":"鉴定机构","B":"鉴定人","C":"委托人","D":"法院"},"answer":["C"],"ref":"司法鉴定程序通则第十二条。"},{"id":"5_518","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构应当自收到委托之日起（ ）个工作日内作出是否受理的决定。","options":{"A":"5","B":"7","C":"10","D":"15"},"answer":["B"],"ref":"司法鉴定程序通则第十三条。"},{"id":"5_519","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"对于鉴定材料不完整、不充分，不能满足鉴定需要的，司法鉴定机构可以要求委托人补充；经补充后能够满足鉴定需要的，（）受理。","options":{"A":"可以","B":"可以不","C":"不予","D":"应当"},"answer":["D"],"ref":"司法鉴定程序通则第十四条。"},{"id":"5_520","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构对于同一鉴定事项，应当指定或者选择（ ）名司法鉴定人进行鉴定；对于疑难、复杂或者特殊鉴定事项，可以指定或者选择（）名司法鉴定人进行鉴定。","options":{"A":"二，三","B":"三，五","C":"三，七","D":"二，多"},"answer":["D"],"ref":"司法鉴定程序通则第十九条。"},{"id":"5_521","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"委托人对司法鉴定机构作出的司法鉴定人回避的决定有异议的，可以（ ）。","options":{"A":"撤销鉴定委托","B":"终止鉴定","C":"中止鉴定","D":"进行行政复议"},"answer":["A"],"ref":"司法鉴定程序通则第二十一条。"},{"id":"5_522","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定事项涉及复杂、疑难、特殊技术问题或者鉴定过程需要较长时间的，经本机构负责人批准，完成鉴定的时限可以延长，延长时限一般不得超过（）个工作日。","options":{"A":"10","B":"20","C":"30","D":"35"},"answer":["C"],"ref":"司法鉴定程序通则第二十八条。"},{"id":"5_523","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"最新修订的《司法鉴定程序通则》自（ ）起施行。","options":{"A":"2007 年 8 月 7 日","B":"2009 年 10 月 1 日","C":"2015 年 12 月 24 日","D":"2016 年 5 月 1 日"},"answer":["D"],"ref":"《司法鉴定程序通则》第五十条。"},{"id":"5_524","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定程序是指以下（ ）进行司法鉴定活动的方式、步骤以及相关规则 的总称。","options":{"A":"司法鉴定人和被鉴定人","B":"司法鉴定机构和司法鉴定人","C":"法官和司法鉴定人","D":"司法机关和司法鉴定机构"},"answer":["B"],"ref":"《司法鉴定程序通则》第二条。"},{"id":"5_525","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定是指在诉讼活动中鉴定人运用科学技术或者专门知识对诉讼涉及的专门性问题进行鉴别和判断并提供（）的活动。","options":{"A":"鉴定结论","B":"鉴定意见","C":"证据","D":"文书"},"answer":["B"],"ref":"《司法鉴定程序通则》第二条。"},{"id":"5_526","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《司法鉴定程序通则》，司法鉴定实行（ ）。","options":{"A":"司法鉴定机构负责制","B":"司法鉴定人负责制","C":"法官负责制","D":"司法局负责制"},"answer":["B"],"ref":"《司法鉴定程序通则》第五条。"},{"id":"5_527","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《司法鉴定程序通则》，下列哪一项说法错误（ ）。","options":{"A":"司法鉴定人在执业活动中应当依照有关诉讼法律和本通则规定实行回避","B":"司法鉴定实行鉴定人负责制度","C":"司法局应当加强对司法鉴定人执业活动的管理和监督","D":"司法鉴定机构和司法鉴定人进行司法鉴定活动应当依法接受监督"},"answer":["C"],"ref":"《司法鉴定程序通则》第七、九、十条，司法鉴定机构应当加强对司法鉴定人执业活动的管理和监督。"},{"id":"5_528","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《司法鉴定程序通则》、《刑事诉讼法》规定，为了查明案情，需要解决案件中某些专门性问题的时候，应当指派、聘请下列哪类人进行鉴定（）。","options":{"A":"侦查机关的人","B":"有法律知识的人","C":"有专门知识的人","D":"公安机关的"},"answer":["C"],"ref":"新刑事诉讼法第一百四十四条和《司法鉴定程序通则》第二条。"},{"id":"5_529","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于对司法鉴定活动的监督，下列哪项说法错误（ ）。","options":{"A":"对于有违反有关法律、法规、规章规定行为的，由司法行政机关依法给予相应的行政处罚","B":"对于有违反司法鉴定行业规范行为的，由司法鉴定协会给予相应的行业处分","C":"司法鉴定人违反《司法鉴定程序通则》规定的，司法机关应当予以纠正","D":"司法鉴定机构应当加强对司法鉴定人执业活动的管理和监督"},"answer":["C"],"ref":"《司法鉴定程序通则》第九、十条，司法鉴定人违反本通则规定的，司法鉴定机构应该予以纠正。"},{"id":"5_530","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于司法鉴定，下列哪一类人对鉴定材料的真实性、合法性负责（ ）。","options":{"A":"鉴定人","B":"鉴定机构","C":"司法机关","D":"委托人"},"answer":["D"],"ref":"《司法鉴定程序通则》第十二条第一款。"},{"id":"5_531","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"诉讼当事人对鉴定材料有异议的，应当向（ ）提出。","options":{"A":"委托人","B":"鉴定人","C":"法官","D":"鉴定机构"},"answer":["A"],"ref":"《司法鉴定程序通则》第十二条第二款。"},{"id":"5_532","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"最新修订的《司法鉴定程序通则》，有关司法鉴定的委托与受理，下列哪一项说法错误（）。","options":{"A":"司法鉴定机构应当统一受理办案机关的司法鉴定委托","B":"委托人委托鉴定的，应当向司法鉴定机构提供真实、完整、充分的鉴定材料","C":"司法鉴定人对鉴定材料的真实性、合法性、完整性负责","D":"司法鉴定机构应当核对并记录鉴定材料的名称、种类、数量、性状、保存状况、收到时间等"},"answer":["C"],"ref":"《司法鉴定程序通则》第十二条，委托人对鉴定材料的真实性、合法性负责。"},{"id":"5_533","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新《司法鉴定程序通则》，司法鉴定机构应当核对并记录鉴定材料不包括下列哪一项（）。","options":{"A":"名称","B":"来源","C":"性状","D":"保存状况"},"answer":["B"],"ref":"《司法鉴定程序通则》第十二条，应当核对并记录鉴定材料的名称、种类、数量、性状、保存状况、收到时间。"},{"id":"5_534","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构自收到委托之日起应当在（ ）内作出是否受理的决定。","options":{"A":"五个工作日","B":"五个自然日","C":"七个工作日","D":"七个自然日"},"answer":["C"],"ref":"《司法鉴定程序通则》第十三条。"},{"id":"5_536","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于鉴定委托，下列哪种情况司法鉴定机构可以受理（ ）。","options":{"A":"鉴定用途不合法或者违背社会公德的","B":"被鉴定人为限制行为能力人","C":"鉴定要求超出机构技术条件或者鉴定能力的","D":"委托人就同一鉴定事项同时委托其他司法鉴定机构进行鉴定的"},"answer":["B"],"ref":"《司法鉴定程序通则》第十五条。"},{"id":"5_537","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，下列哪种情况司法鉴定机构可以受理鉴定委托（）。","options":{"A":"被鉴定人为精神病人的","B":"委托鉴定事项超出本机构司法鉴定业务范围的","C":"鉴定材料不真实、不完整、不充分或者取得方式不合法的","D":"鉴定要求不符合司法鉴定执业规则或者相关鉴定技术规范的"},"answer":["A"],"ref":"《司法鉴定程序通则》第十五条。"},{"id":"5_538","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，下列哪一选项不属于司法鉴定机构不得受理鉴定委托的情形（）。","options":{"A":"被鉴定人不配合","B":"委托鉴定事项超出本机构司法鉴定业务范围的","C":"鉴定材料不真实、不完整、不充分或者取得方式不合法的","D":"委托人就同一鉴定事项同时委托其他司法鉴定机构进行鉴定的"},"answer":["A"],"ref":"《司法鉴定程序通则》第十五条。"},{"id":"5_539","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定机构决定受理鉴定委托的，应当与委托人签订司法鉴定下列哪项文书（）。","options":{"A":"司法鉴定意向书","B":"司法鉴定协议书","C":"司法鉴定材料书","D":"司法鉴定委托书"},"answer":["D"],"ref":"《司法鉴定程序通则》第十六条。"},{"id":"5_540","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"最新修订的《司法鉴定程序通则》，司法鉴定委托书应当载明的事项不包括下列哪一项（）。","options":{"A":"鉴定材料的提供和退还","B":"司法鉴定机构名称","C":"鉴定人姓名","D":"与鉴定有关的基本案情"},"answer":["C"],"ref":"《司法鉴定程序通则》第十六条，应当载明事项包括委托人名称，不包括鉴定人名称。"},{"id":"5_542","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定机构决定不予受理鉴定委托的，应当向（）说明理由，退还鉴定材料。","options":{"A":"被鉴定人","B":"法官","C":"检察官","D":"委托人"},"answer":["D"],"ref":"《司法鉴定程序通则》第十七条"},{"id":"5_543","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，关于司法鉴定的实施，下列哪项说法错误（）。","options":{"A":"司法鉴定机构受理鉴定委托后，应当指定本机构具有该鉴定事项执业资格的司法鉴定人进行鉴定","B":"委托人可直接从受托的司法鉴定机构中选择符合条件的司法鉴定人进行鉴定","C":"委托人不得要求或者暗示司法鉴定机构、司法鉴定人按其意图或者特定目的提供鉴定意见","D":"司法鉴定机构对同一鉴定事项，应当指定或者选择二名司法鉴定人进行鉴定"},"answer":["B"],"ref":"《司法鉴定程序通则》第十八、十九条"},{"id":"5_544","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定机构对同一鉴定事项，应当指定或者选择几名司法鉴定人进行鉴定（）。","options":{"A":"一名","B":"二名","C":"三名","D":"不超过三名"},"answer":["B"],"ref":"《司法鉴定程序通则》第十九条"},{"id":"5_545","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，关于司法鉴定人，下列哪项错误（）。","options":{"A":"司法鉴定机构对同一鉴定事项，应当指定或者选择二名司法鉴定人进行鉴定","B":"由委托人选择二名司法鉴定人进行","C":"对复杂、疑难或者特殊鉴定事项，可以指定或者选择多名司法鉴定人进行鉴定","D":"司法鉴定人与诉讼当事人、鉴事项涉及的案件有利害关系，可能影响其独立、客观、公正进行鉴定的，应当回避"},"answer":["B"],"ref":"《司法鉴定程序通则》第十九、二十条"},{"id":"5_546","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，下列哪种情况下司法鉴定人不需要回避（）。","options":{"A":"所在机构鉴定人曾参加过同一鉴定事项的","B":"鉴定人曾经作为专家提供过咨询意见","C":"鉴定人曾被聘请为有专门知识的人参与过同一鉴定事项法庭质证","D":"鉴定人曾经参加过同一鉴定事项鉴定"},"answer":["A"],"ref":"《司法鉴定程序通则》第十九、二十条。"},{"id":"5_547","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，委托人要求司法鉴定人回避的，应当向下列哪个机构提出（）。","options":{"A":"法院","B":"司法鉴定机构","C":"检察院","D":"司法局"},"answer":["B"],"ref":"《司法鉴定程序通则》第二十一条。"},{"id":"5_548","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定人回避，由下列哪个机构 决定（ ）。","options":{"A":"法院","B":"检察院","C":"司法局","D":"司法鉴定机构"},"answer":["D"],"ref":"《司法鉴定程序通则》第二十一条。"},{"id":"5_549","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，委托人对司法鉴定机构作出的司法鉴定人是否回避的决定有异议的，可以采取以下哪种行为（）。","options":{"A":"申诉","B":"复议","C":"撤销鉴定委托","D":"重新鉴定"},"answer":["C"],"ref":"《司法鉴定程序通则》第二十一条。"},{"id":"5_550","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，对于鉴定材料，下列哪一说法是错误的（）。","options":{"A":"司法鉴定机构应当建立鉴定材料管理制度","B":"司法鉴定人对鉴定材料负责","C":"司法鉴定机构和司法鉴定人在鉴定过程中应当严格依照技术规范保管和使用鉴定材料","D":"司法鉴定机构因严重不负责任造成鉴定材料损毁、遗失的，应当依法承担责任"},"answer":["B"],"ref":"《司法鉴定程序通则》第二十二条。"},{"id":"5_551","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定人进行鉴定，应当遵守和采用的标准和技术规范不包括下列哪一项（）。","options":{"A":"机构自行制定的技术方法","B":"国家标准","C":"行业标准","D":"该专业领域多数专家认可的技术方法"},"answer":["A"],"ref":"《司法鉴定程序通则》第二十三条。"},{"id":"5_552","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，关于司法鉴定人的权利，下列哪一项说法错误（）。","options":{"A":"司法鉴定人有权了解进行鉴定所需要的案件材料","B":"司法鉴定人可以调查取证","C":"司法鉴定人可以查阅、复制相关资料","D":"必要时司法鉴定人可以询问诉讼当事人、证人"},"answer":["B"],"ref":"《司法鉴定程序通则》第二十四条。"},{"id":"5_553","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"最新修订的《司法鉴定程序通则》，关于现场提取鉴定材料，下列哪一选项说法错误（）。","options":{"A":"经委托人同意，司法鉴定机构可以派员到现场提取鉴定材料","B":"现场提取鉴定材料应当由不少于二名司法鉴定机构的工作人员进行","C":"现场提取材料的工作人员均应为该鉴定事项的司法鉴定人","D":"现场提取鉴定材料时，应当有委托人指派或者委托的人员在场见证并在提取记录上签名"},"answer":["C"],"ref":"《司法鉴定程序通则》第二十四条，其中至少一名应为该鉴定事项的司法鉴定人。"},{"id":"5_554","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定过程中，需要对无民事行为能力人或者限制民事行为能力人进行身体检查的，应当采取以下哪种措施（）。","options":{"A":"应当通知委托人到场见证","B":"应当通知其监护人或者近亲属到场见证","C":"应当通知法官到场见证","D":"应当有女性鉴定人在场"},"answer":["B"],"ref":"《司法鉴定程序通则》第二十五条第一款。"},{"id":"5_555","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定过程中，需要被鉴定人进行法医精神病鉴定的，采取以下哪种措施是错误的（）。","options":{"A":"通知委托人到场见证","B":"通知被鉴定人的近亲属或者监护人到场见证","C":"到场见证人员应当在鉴定记录上签名","D":"女性鉴定人在场"},"answer":["D"],"ref":"《司法鉴定程序通则》第二十五条。"},{"id":"5_556","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，关于现场见证，下列哪项说法错误 （ ）。","options":{"A":"见证人员未到场的，司法鉴定人不得开展相关鉴定活动","B":"见证人员未到场的，延误时间不计入鉴定时限","C":"对需要进行尸体解剖的，应当通知委托人或者死者的近亲属或者监护人到场见证","D":"到场见证人员无需在鉴定记录上签名"},"answer":["D"],"ref":"《司法鉴定程序通则》第二十五条，到场见证人员应当在鉴定记录上签名。"},{"id":"5_557","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于鉴定过程记录，下列哪项说法错误（ ）。","options":{"A":"司法鉴定人应当在鉴定结束后两个工作日内记录鉴定过程","B":"记录可以采取笔记、录音、录像、拍照等方式","C":"记录应当载明主要的鉴定方法和过程，检查、检验、检测结果，以及仪器设备使用情况等","D":"记录的内容应当真实、客观、准确、完整、清晰"},"answer":["A"],"ref":"《司法鉴定程序通则》第二十七条，司法鉴定人应当对鉴定过程进行实时记录并签名。"},{"id":"5_558","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定机构应当（ ）完成鉴定。","options":{"A":"自司法鉴定委托书生效之日起三十个工作日内","B":"自司法鉴定委托书生效之日起三十个自然日","C":"自收到委托书之日起三十个工作日","D":"自司法鉴定委托书生效之日起六十个工作日内"},"answer":["A"],"ref":"《司法鉴定程序通则》第二十八条。"},{"id":"5_559","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定事项涉及复杂、疑难、特殊技术问题或者鉴定过程需要较长时间的，下列哪项说法错误（）。","options":{"A":"经司法鉴定机构负责人批准，完成鉴定的时限可以延长","B":"延长时限一般不得超过六十个工作日","C":"鉴定时限延长的，应当及时告知委托人。","D":"司法鉴定机构与委托人对鉴定时限另有约定的，从其约定"},"answer":["B"],"ref":"《司法鉴定程序通则》第二十八条，延长时限一般不得超过三十个工作日。"},{"id":"5_560","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，下列哪种选项，不属于司法鉴定机构可以根据委托人的要求进行补充鉴定（）。","options":{"A":"原委托鉴定事项有遗漏的","B":"委托人就原委托鉴定事项提供新的鉴定材料的","C":"原司法鉴定人应当回避没有回避的","D":"其他需要补充鉴定的情形"},"answer":["C"],"ref":"《司法鉴定程序通则》第三十条。"},{"id":"5_561","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，下列哪些情况不属于司法鉴定机构可以进行重新鉴定（）。","options":{"A":"原司法鉴定人不具有从事委托鉴定事项执业资格的","B":"原司法鉴定机构超出登记的业务范围组织鉴定的","C":"原司法鉴定人应当回避没有回避的","D":"司法鉴定人认为需要重新鉴定"},"answer":["D"],"ref":"《司法鉴定程序通则》第三十一条。"},{"id":"5_562","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，下列哪种情况下，司法鉴定机构可以接受办案机关委托进行重新鉴定（）。","options":{"A":"鉴定材料发生耗损，委托人不能补充提供的","B":"办案机关认为需要重新鉴定的","C":"发现鉴定材料不真实、不完整、不充分或者取得方式不合法的","D":"鉴定要求不符合司法鉴定执业规则或者相关鉴定技术规范的"},"answer":["B"],"ref":"《司法鉴定程序通则》第三十一条，其它三项属于终止鉴定。"},{"id":"5_563","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，下列哪种情况下，司法鉴定机构可以接受办案机关委托进行重新鉴定（）。","options":{"A":"原委托鉴定事项有遗漏的","B":"委托人就原委托鉴定事项提供新的鉴定材料的","C":"鉴定要求不符合司法鉴定执业规则或者相关鉴定技术规范的","D":"原司法鉴定人不具有从事委托鉴定事项执业资格的"},"answer":["D"],"ref":"《司法鉴定程序通则》第三十一条，AB 选项补充鉴定，C 选项终止鉴定。"},{"id":"5_564","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，关于重新鉴定，下列哪一说法不正确（）。","options":{"A":"重新鉴定必须委托原司法鉴定机构以外的其他司法鉴定机构进行","B":"接受重新鉴定委托的司法鉴定机构的资质条件应当不低于原司法鉴定机构","C":"进行重新鉴定的司法鉴定人中应当至少有一名具有相关专业高级专业技术职称","D":"重新鉴定不得指定原司法鉴定人进行"},"answer":["A"],"ref":"《司法鉴定程序通则》第三十二条，重新鉴定应当委托原司法鉴定机构以外的其他司法鉴定机构进行，因特殊原因，委托人也可以委托原司法鉴定机构进行。"},{"id":"5_565","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，关于专家意见，下列哪项说法不正确（）。","options":{"A":"鉴定过程中，涉及复杂、疑难、特殊技术问题的，可以向本机构以外的相关专业领域的专家进行咨询","B":"以专家的意见为最终鉴定意见","C":"专家提供咨询意见应当签名","D":"专家提供咨询意见应当存入鉴定档案"},"answer":["B"],"ref":"《司法鉴定程序通则》第三十三条，最终的鉴定意见应当由本机构的司法鉴定人出具。"},{"id":"5_566","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于鉴定意见复核，下列哪项说法错误（ ）。","options":{"A":"司法鉴定人完成鉴定后，司法鉴定机构应当指定具有相应资质的人员对鉴定程序和鉴定意见进行复核","B":"对于涉及复杂、疑难、特殊技术问题或者重新鉴定的鉴定事项，可以组织三名以上的专家进行复核","C":"复核人员完成复核后，应当提出复核意见","D":"复核意见要签名，并写入鉴定意见书"},"answer":["D"],"ref":"《司法鉴定程序通则》第三十五条，应当提出复核意见并签名，存入鉴定档案。"},{"id":"5_567","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，关于司法鉴定意见书，下列哪一项说法不正确（）。","options":{"A":"司法鉴定意见书应当加盖司法鉴定机构的司法鉴定专用章，司法鉴定人应当签名或盖章","B":"司法鉴定意见书应当一式四份，三份交委托人收执，一份由司法鉴定机构存档","C":"司法鉴定机构应当按照有关规定或者与委托人约定的方式，向委托人发送司法鉴定意见书","D":"多人参加的鉴定，对鉴定意见有不同意见的，应当注明"},"answer":["A"],"ref":"《司法鉴定程序通则》第三十七、三十八、三十九条。"},{"id":"5_568","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，委托人对鉴定过程、鉴定意见提出询问的，司法鉴定机构和司法鉴定人采取的措施有（）。","options":{"A":"应当给予解释或者说明","B":"可以给予解释或者说明","C":"应当补充鉴定","D":"可以补充鉴定"},"answer":["A"],"ref":"《司法鉴定程序通则》第四十条。"},{"id":"5_569","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于司法鉴定意见书补正，下列哪项说法不正确（ ）。","options":{"A":"补正应当在原司法鉴定意见书上进行","B":"原鉴定人均需在补正处签名","C":"对司法鉴定意见书进行补正，不得改变司法鉴定意见的原意","D":"必要时，可以出具补正书"},"answer":["B"],"ref":"《司法鉴定程序通则》第四十一条，由至少一名司法鉴定人在补正处签名。"},{"id":"5_570","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，下列哪些情况不属于司法鉴定机构可以对司法鉴定意见书进行补正的情况（）。","options":{"A":"图像、谱图、表格不清晰的","B":"签名、盖章或者编号不符合制作要求的","C":"文字表达有瑕疵或者错别字，但不影响司法鉴定意见的","D":"鉴定意见遗漏的"},"answer":["D"],"ref":"《司法鉴定程序通则》第四十一条。"},{"id":"5_571","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，关于司法鉴定人出庭，下列哪项说法不正确（）。","options":{"A":"经人民法院依法通知，司法鉴定人应当出庭作证","B":"司法鉴定机构接到出庭通知后，应当及时与人民法院确认司法鉴定人出庭的时间、地点、人数、费用、要求等","C":"司法鉴定机构应当支持司法鉴定人出庭作证，为司法鉴定人依法出庭提供必要条件","D":"人民法院认为鉴定人有必要出庭的，鉴定人不出庭作证的，经鉴定机构说明，仍可作为定案的根据"},"answer":["D"],"ref":"《司法鉴定程序通则》四十三、四十四、四十五条。"},{"id":"5_572","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《司法鉴定程序通则》、《刑事诉讼法》规定，人民法院认为鉴定人有必要出庭的，鉴定人拒不出庭作证的，关于鉴定意见下列哪项目说法正确（）。 572 《司法鉴定程序通则》第四十一条，由至少一名司法鉴定人在补正处签名。","options":{"A":"可以可以作为定案的根据","B":"不得作为定案的根据","C":"经鉴定机构书面说明可以作为定案根据","D":"经侦查机关同意可以作为定案根据"},"answer":["B"],"ref":"新刑事诉讼法第一百八十七条； 《司法鉴定程序通则》四十三条。"},{"id":"5_575","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"诉讼当事人对鉴定材料有异议的，应当向（ ）提出。","options":{"A":"司法鉴定机构","B":"司法鉴定人","C":"委托方","D":"行政机关"},"answer":["C"],"ref":"《司法鉴定程序通则》第十二条。"},{"id":"5_576","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构决定受理鉴定委托的，应当与委托人签订（ ）。","options":{"A":"合同","B":"司法鉴定委托书","C":"司法鉴定协议书","D":"协议"},"answer":["B"],"ref":"《司法鉴定程序通则》第十六条。"},{"id":"5_579","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"委托人要求司法鉴定人回避的，应当向该司法鉴定人所属的（）提出，并由其决定。","options":{"A":"司法鉴定机构","B":"司法行政管理机构","C":"司法鉴定机构及司法行政管理机构","D":"司法监管部门"},"answer":["A"],"ref":"《司法鉴定程序通则》第二十一条。"},{"id":"5_583","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定事项涉及复杂、疑难、特殊技术问题或者鉴定过程需要较长时间的，经本机构负责人批准，完成鉴定的时限可以延长，延长时限一般不得超过（）。","options":{"A":"十五个工作日","B":"二十个工作日","C":"三十个工作日","D":"六十天"},"answer":["C"],"ref":"《司法鉴定程序通则》第二十八条。"},{"id":"5_584","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"因哪些情形司法鉴定机构可以接受委托，进行补充鉴定（ ）。","options":{"A":"诉讼当事人对原鉴定结论有异议的","B":"原司法鉴定人不具有从事委托事项执业资格的","C":"委托人有更换司法鉴定人要求的","D":"委托人就原委托鉴定事项提供新的鉴定材料的"},"answer":["D"],"ref":"《司法鉴定程序通则》第三十条。"},{"id":"5_585","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定过程中，下列哪项是错误的（ ）。","options":{"A":"司法鉴定人应当对鉴定过程进行实时记录并存入鉴定档案","B":"无民事行为能力人或限制民事行为能力人进行身体检查的，需近亲属或监护人到场见证","C":"需要进行尸体解剖的，需近亲属或监护人到场见证","D":"到场见证人员未到场的，延误时间可不计入鉴定时限"},"answer":["B"],"ref":"《司法鉴定程序通则》第二十五、第二十七条。"},{"id":"5_586","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"重新鉴定应在（）进行鉴定。","options":{"A":"原司法鉴定机构","B":"其他司法鉴定机构","C":"具有该委托鉴定事项执业资格的司法鉴定机构","D":"资质条件不低于原司法鉴定机构的司法鉴定机构"},"answer":["D"],"ref":"《司法鉴定程序通则》第三十二条。"},{"id":"5_587","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"进行重新鉴定的司法鉴定人中应当至少有（）名具有相关专业高级专业技术职称。","options":{"A":"一","B":"二","C":"三","D":"多名"},"answer":["A"],"ref":"《司法鉴定程序通则》第三十二条。"},{"id":"5_588","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定过程中涉及疑难、复杂的案件，可以向本机构以外的相关专业领域的专家进行咨询，最终的鉴定意见由（）出具。","options":{"A":"司法鉴定机构","B":"本机构的司法鉴定人","C":"专家","D":"司法鉴定人和专家"},"answer":["B"],"ref":"《司法鉴定程序通则》第三十三条。"},{"id":"5_589","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"对于涉及重大案件或者特别复杂、疑难、特殊技术问题或者多个鉴定类别的鉴定事项，办案机关可以委托司法鉴定行业协会组织协调（）司法鉴定机构进行鉴定。","options":{"A":"一个","B":"二个","C":"三个","D":"多个"},"answer":["D"],"ref":"《司法鉴定程序通则》第三十四条。"},{"id":"5_590","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定人完成鉴定后，司法鉴定机构应当指定具有相应资质的人员对（）进行复核。","options":{"A":"检验记录","B":"鉴定结论","C":"鉴定程序和鉴定意见","D":"鉴定日期"},"answer":["C"],"ref":"《司法鉴定程序通则》第三十五条。"},{"id":"5_591","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定意见书应当一式（ ）份。","options":{"A":"二","B":"三","C":"四","D":"五"},"answer":["C"],"ref":"《司法鉴定程序通则》第三十九条。"},{"id":"5_592","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定意见书出具后，如需补正，由（ ）名司法鉴定人在补正处签名。","options":{"A":"一","B":"二","C":"三","D":"至少二名以上"},"answer":["A"],"ref":"《司法鉴定程序通则》第四十一条。"},{"id":"5_594","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于《司法鉴定程序通则》总则的规定，下列正确的是（ ）。","options":{"A":"司法鉴定是指在诉讼活动中鉴定人运用科学技术或者专门知识对诉讼涉及的专门性问题进行鉴别和判断并提供鉴定意见的活动","B":"司法鉴定程序是指司法鉴定机构和司法鉴定人进行司法鉴定活动的方式、步骤以及相关规则的总称","C":"本通则适用于司法鉴定机构和司法鉴定人从事各类司法鉴定业务的活动","D":"本通则是根据《国家发展改革委、司法部关于印发〈司法鉴定收费管理办法〉的通知》和相关法律、法规的规定制定的"},"answer":["A","B","C"],"ref":"司法鉴定程序通则第一、二、三条。"},{"id":"5_595","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"具有下列哪些情形之一的鉴定委托，司法鉴定机构不得受理（ ）。","options":{"A":"委托事项超过本机构司法鉴定业务范围的","B":"发现鉴定材料不真实、不完整、不充分或者取得方式不合法的","C":"鉴定用途不合法或者违背社会公德的","D":"鉴定要求超出本机构技术条件或者鉴定能力的"},"answer":["A","B","C","D"],"ref":"司法鉴定程序通则第十五条。"},{"id":"5_596","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"《司法鉴定程序通则》中关于司法鉴定的委托与受理，下列说法正确的是（）。","options":{"A":"诉讼当事人对鉴定材料有异议的，应当向法院提出","B":"本通则所称鉴定材料包括生物检材和非生物检材、对比样本材料以及其他与鉴定事项有关的鉴定材料","C":"司法鉴定机构应当自收到委托之日起 10 个工作日内作出是否受理的决定","D":"司法鉴定机构应当统一受理办案机关的司法鉴定委托"},"answer":["B","D"],"ref":"司法鉴定程序通则第十一、十二、十三条。"},{"id":"5_597","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"下列哪些属于司法鉴定委托书中应当载明的内容（ ）。","options":{"A":"委托人姓名","B":"是否重新鉴定","C":"加害人姓名","D":"与鉴定有关的基本案情"},"answer":["A","B","D"],"ref":"司法鉴定程序通则第十六条。"},{"id":"5_598","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于司法鉴定的实施，下列符合《司法鉴定程序通则》的是（ ）。","options":{"A":"司法鉴定机构受理鉴定委托后，应当指定本机构具有该鉴定事项执业资格的司法鉴定人进行鉴定","B":"司法鉴定机构对同一鉴定事项，应当指定或者选择至少三名司法鉴定人进行鉴定","C":"委托人可以要求司法鉴定机构、司法鉴定人按其意图或者特定目的提供鉴定意见","D":"委托人有特殊要求的，经双方协商一致，也可以从本机构中选择符合条件的司法鉴定人进行鉴定"},"answer":["A","D"],"ref":"司法鉴定程序通则第十八、十九条。"},{"id":"5_599","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于司法鉴定人的回避，下列说法错误的是（ ）。","options":{"A":"司法鉴定人自行提出回避的，由鉴定小组负责人决定","B":"委托人要求司法鉴定人回避的，应当向鉴定人所属鉴定机构提出，由司法局决定","C":"委托人对鉴定机构作出的司法鉴定人是否回避决定有异议的，可以撤销鉴定委托","D":"司法鉴定人曾参加过同一鉴定事项鉴定的，应当回避"},"answer":["A","B"],"ref":"司法鉴定程序通则第二十、二十一条。"},{"id":"5_600","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定人进行鉴定，应当遵守和采用的技术标准、技术规范和技术方法有哪些（）。","options":{"A":"国家标准","B":"行业标准和技术规范","C":"专家意见","D":"该领域多数专家认可的技术方法"},"answer":["A","B","D"],"ref":"司法鉴定程序通则第二十三条。"},{"id":"5_601","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构派员到现场提取鉴定材料，下列符合规定的是（ ）。","options":{"A":"现场提取鉴定材料应当由不少于二名司法鉴定机构的工作人员进行","B":"至少一名应为该鉴定事项的司法鉴定人","C":"现场提取鉴定材料应当由不少于二名司法鉴定机构的鉴定人进行","D":"至少二名应为该鉴定事项的司法鉴定人"},"answer":["A","B"],"ref":"司法鉴定程序通则第二十四条。"},{"id":"5_602","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定过程中，需要对无民事行为能力或者限制民事行为能力进行身体检查时，应当通知（）到场见证。","options":{"A":"委托人","B":"法官","C":"监护人","D":"近亲属"},"answer":["C","D"],"ref":"司法鉴定程序通则第二十五条。"},{"id":"5_603","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定机构在鉴定过程中，有下列哪些情形的可以终止鉴定（ ）。","options":{"A":"鉴定材料发生耗损，委托人不能补充提供的","B":"委托人主动撤销鉴定委托","C":"委托人、诉讼当事人拒绝支付鉴定费用的","D":"因不可抗力致使鉴定无法继续进行的"},"answer":["A","B","C","D"],"ref":"司法鉴定程序通则第二十九条。"},{"id":"5_604","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"有下列哪些情形的，司法鉴定机构可以根据委托人的要求进行补充鉴定（）。","options":{"A":"因不可抗力致使鉴定无法继续进行的","B":"原委托鉴定事项有遗漏的","C":"委托人就原委托鉴定事项提供新的鉴定材料的","D":"其他需要补充鉴定的情形"},"answer":["B","C","D"],"ref":"司法鉴定程序通则第三十条。"},{"id":"5_605","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"有下列情形之一的司法鉴定机构可以接受办案机关委托进行重新鉴定的是 （ ）。","options":{"A":"原司法鉴定人不具有从事委托鉴定事项执业资格的","B":"原司法鉴定机构超出登记的业务范围组织鉴定的","C":"原司法鉴定人应当回避没有回避的","D":"办案机关认为需要重新鉴定的"},"answer":["A","B","C","D"],"ref":"司法鉴定程序通则第三十一条。"},{"id":"5_606","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于司法鉴定机构的鉴定时限，下列说法错误的是（ ）。","options":{"A":"司法鉴定机构应当自司法鉴定委托书生效之日起三十个工作日内完成鉴定","B":"司法鉴定机构应当自司法鉴定委托书生效之日起六十个工作日内完成鉴定","C":"鉴定时限需要延长的，延长时限一般不得超过三十个工作日","D":"特殊情况下，鉴定时限可以无限延长"},"answer":["B","D"],"ref":"司法鉴定程序通则第二十八条。"},{"id":"5_607","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于重新鉴定，下列说法正确的是（ ）。","options":{"A":"应当委托原司法鉴定机构以外的其他司法鉴定机构进行","B":"因特殊原因，委托人也可以委托原司法鉴定机构进行，原鉴定人不需要回避","C":"任何情况下，都不能委托原司法鉴定机构进行重新鉴定","D":"因特殊原因，委托人也可以委托原司法鉴定机构进行，但原司法鉴定机构应当指定原司法鉴定人以外的其他符合条件的司法鉴定人进行"},"answer":["A","D"],"ref":"司法鉴定程序通则第三十二条。"},{"id":"5_608","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定过程中，本机构以外的相关专业领域的专家提供咨询意见后（ ）。","options":{"A":"最终的鉴定意见应当由本机构的司法鉴定人出具","B":"专家提供咨询意见应当签名，不需要存入鉴定档案","C":"专家提供咨询意见应当签名，并存入鉴定档案","D":"专家咨询意见具有鉴定意见的效力"},"answer":["A","C"],"ref":"司法鉴定程序通则第三十三条。"},{"id":"5_609","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"对于涉及重大案件或者特别复杂、疑难、特殊技术问题或者多个鉴定类别的鉴定事项，（）。","options":{"A":"办案机关可以委托司法鉴定行业协会组织协调多个司法鉴定机构进行鉴定","B":"应当组织三名以上的专家进行复核","C":"可以组织三名以上的专家进行复核","D":"办案机关必须委托司法鉴定行业协会组织协调多个司法鉴定机构进行鉴定"},"answer":["A","C"],"ref":"司法鉴定程序通则第三十四条、三十五条。"},{"id":"5_610","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于司法鉴定意见书的出具，下列不正确的是（ ）。","options":{"A":"多人参加的鉴定，对鉴定意见有不同意见的，不需要注明","B":"司法鉴定意见书应当加盖司法鉴定机构的司法鉴定专用章和司法鉴定人名章","C":"司法鉴定意见书应当一式四份，两份交委托人收执，两份由司法鉴定机构存档","D":"司法鉴定机构和司法鉴定人应当按照统一规定的文本格式制作司法鉴定意见书"},"answer":["A","B","C"],"ref":"司法鉴定程序通则第三十六、三十七、三十八、三十九条。"},{"id":"5_611","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于鉴定时限延长的有关规定，正确的是（ ）。","options":{"A":"复杂、疑难、特殊技术问题或者鉴定过程需要较长时间的案件","B":"须经本机构负责人批准","C":"延长时限一般不得超过六十日","D":"鉴定时限延长的，应当及时告知委托人"},"answer":["A","B","D"],"ref":"司法鉴定程序通则第二十八条。"},{"id":"5_612","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定过程中，出现下列哪些情形，鉴定机构既可以不受理也可以终止鉴定（）。","options":{"A":"鉴定用途不合法或者违背社会公德的","B":"鉴定要求超出本机构技术条件或者鉴定能力的","C":"委托人就同一鉴定事项同时委托其他司法鉴定机构进行鉴定的","D":"发现鉴定材料不真实、不完整、不充分或者取得方式不合法的"},"answer":["A","B","C","D"],"ref":"司法鉴定程序通则第十五、二十九条。"},{"id":"5_613","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于司法鉴定人出庭作证，下列说法正确的是（ ）。","options":{"A":"经人民法院依法通知，司法鉴定人应当出庭作证，回答与鉴定事项有关的问题","B":"司法鉴定机构接到出庭通知后，应当及时与人民法院确认司法鉴定人出庭的时间、地点、人数、费用、要求等","C":"司法鉴定机构应当支持司法鉴定人出庭作证，为司法鉴定人依法出庭提供必要条件","D":"司法鉴定人出庭作证，应当举止文明，遵守法庭纪律"},"answer":["A","B","C","D"],"ref":"司法鉴定程序通则第四十三、四十四、四十五、四十六条。"},{"id":"5_614","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定意见书出具后，出现下列哪些情况，司法鉴定机构可以进行补正 （ ）。","options":{"A":"鉴定意见错误的","B":"图像、谱图、表格不清晰的","C":"签名、盖章或者编号不符合制作要求的","D":"文字表达有瑕疵或者错别字，影响司法鉴定意见的"},"answer":["B","C"],"ref":"司法鉴定程序通则第四十一条。"},{"id":"5_615","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于司法鉴定意见书的补正，符合要求的是（ ）。","options":{"A":"应当至少一名司法鉴定人在补正处签名","B":"应当出具补正书","C":"必要时可以出具补正书","D":"对司法鉴定意见书进行补正，不得改变司法鉴定意见的原意"},"answer":["A","C","D"],"ref":"司法鉴定程序通则第四十一条。"},{"id":"5_616","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"对于重新鉴定的司法鉴定机构和司法鉴定人的资质要求正确的是（ ）。","options":{"A":"接受重新鉴定委托的司法鉴定机构的资质条件应当不低于原司法鉴定机构","B":"接受重新鉴定委托的司法鉴定机构的资质条件可以低于原司法鉴定机构","C":"进行重新鉴定的司法鉴定人中应当至少有二名具有相关专业高级专业技术职称","D":"进行重新鉴定的司法鉴定人中应当至少有一名具有相关专业高级专业技术职称"},"answer":["A","D"],"ref":"司法鉴定程序通则第三十二条。"},{"id":"5_617","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定人应当对鉴定过程进行实时记录并签名，可以采取的记录方式有 （ ）。","options":{"A":"笔记","B":"录音","C":"录像","D":"拍照"},"answer":["A","B","C","D"],"ref":"司法鉴定程序通则第二十七条。"},{"id":"5_618","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"下列鉴定过程中，应当有或者应当通知见证人在场的是（ ）。","options":{"A":"现场提取检材时","B":"进行法医精神病鉴定时","C":"需要进行尸体解剖的","D":"鉴定程序的全过程"},"answer":["A","B","C"],"ref":"司法鉴定程序通则第二十四、二十五条。"},{"id":"5_619","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定过程中，应当通知委托人或者被鉴定人的近亲属或者监护人到场的是（）。","options":{"A":"对被鉴定人进行法医精神病鉴定时","B":"需要进行解剖的鉴定时","C":"对无民事行为能力人或者限制民事行为能力人进行身体检查时","D":"对完全民事行为能力人进行身体检查时"},"answer":["A","B","C"],"ref":"司法鉴定程序通则第二十五条。"},{"id":"5_620","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"《司法鉴定程序通则》中所指的办案机关主要是指哪些机关（ ）。","options":{"A":"侦查机关","B":"审查起诉机关","C":"司法行政机关","D":"审判机关"},"answer":["A","B","D"],"ref":"司法鉴定程序通则第四十八条。"},{"id":"5_621","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"在鉴定过程中，司法鉴定机构的下列做法符合规定的是（ ）。","options":{"A":"司法鉴定机构收取司法鉴定费，应当出具合法票据","B":"委托人就同一鉴定事项同时委托其他司法鉴定机构进行鉴定的，司法鉴定机构不得受理","C":"对于符合法律援助条件的缴费当事人，可以按照国家和本市法律援助的相关规定减免司法鉴定费用","D":"鉴定要求不符合司法鉴定执业规则或者相关鉴定技术规范的，司法鉴定机构不得受理"},"answer":["A","B","D"],"ref":"北京市司法鉴定收费管理办法第十、十一条，司法鉴定程序通则第十五条。"},{"id":"5_622","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构需要对鉴定材料的哪些情况进行核对并记录（ ）。","options":{"A":"鉴定材料的种类、性状","B":"鉴定材料的名称、数量","C":"鉴定材料的保存状况","D":"鉴定材料的收到时间"},"answer":["A","B","C","D"],"ref":"司法鉴定程序通则第十二条。"},{"id":"5_623","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"在鉴定材料的提取和检验检查过程中，以下说法正确的是（ ）。","options":{"A":"司法鉴定机构根据当事人或人民法院需要，外出提取应当由当事人提供的鉴定材料所发生的相关费用由缴费当事人另行支付","B":"经委托人同意，司法鉴定机构可以派员到现场提取鉴定材料","C":"司法鉴定机构应当建立鉴定材料管理制度，严格监控鉴定材料的接收、保管、使用和退还","D":"鉴定材料的提取不需要见证人在场"},"answer":["A","B","C"],"ref":"北京市司法鉴定收费管理办法第七条，司法鉴定程序通则第二十二、二十四条。"},{"id":"5_624","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"在司法鉴定过程中，下列情况需要签字确认的是（ ）。","options":{"A":"司法鉴定机构收取鉴定费用时，需要缴费当事人签字确认","B":"专家提供咨询意见应当签名确认","C":"一些需要缴费当事人另行支付的费用，需要其签字确认","D":"复核人员完成复核后，应当提出复核意见并签名，存入鉴定档案"},"answer":["A","B","C","D"],"ref":"北京市司法鉴定收费管理办法第七条，司法鉴定程序通则第三十三、三十五条。"},{"id":"5_625","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"下列哪些人应当在鉴定过程中回避（ ）。","options":{"A":"甲三年前曾在某项鉴定中作为专家提供过咨询意见，现甲又对此案进行鉴定","B":"乙曾被聘为有专门知识的人参与过某一鉴定事项，现乙作为此鉴定机构的工作人员对此案进行重新鉴定","C":"某案被委托于 A","D":"丁鉴定人接收了一项鉴定人为其老家所在地的与其无任何利害关系的鉴定"},"answer":["A","B","C"],"ref":"司法鉴定程序通则第二十条。"},{"id":"5_626","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定过程中出现的下列书面材料，应当计入鉴定档案的是（ ）。","options":{"A":"专家提供的咨询意见","B":"鉴定机构收费人员的个人信息","C":"复核人员提出的复核意见","D":"鉴定机构建立、发展情况"},"answer":["A","C"],"ref":"司法鉴定程序通则第三十三、三十五条。"},{"id":"5_627","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定委托书应当载明的内容主要有（ ）。","options":{"A":"委托人名称、司法鉴定机构名称","B":"委托鉴定事项","C":"是否属于重新鉴定","D":"鉴定风险"},"answer":["A","B","C","D"],"ref":"司法鉴定程序通则第十六条。"},{"id":"5_628","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于物证类鉴定，下列说法正确的是（ ）。","options":{"A":"此类鉴定收费实行政府指导价管理","B":"司法鉴定机构应当自收到委托之日起七个工作日内作出是否受理的决定","C":"需要鉴定人出庭作证的，出庭作证发生的费用，缴费当事人应当另行支付","D":"鉴定材料不完整、不充分的，司法鉴定机构不能要求委托人补充材料，应当直接拒绝鉴定"},"answer":["A","B","C"],"ref":"司法鉴定程序通则第十三、十四条，北京市司法鉴定管理办法第三、七条。"},{"id":"5_629","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于鉴定资料的管理，下列说法正确的是（ ）。","options":{"A":"司法鉴定机构应当严格监控鉴定材料的接收、保管、使用和退还","B":"司法鉴定机构及司法鉴定人在鉴定过程中应当严格依照技术规范保管和使用鉴定材料","C":"司法鉴定机构对于鉴定材料的原件不需要退还当事人","D":"司法鉴定机构因严重不负责任造成鉴定材料损毁、遗失的，应当依法承担责任"},"answer":["A","B","D"],"ref":"司法鉴定程序通则第二十二条。"},{"id":"5_630","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"下列说法正确的是（ ）。","options":{"A":"司法鉴定人有权了解进行鉴定所需要的案件材料，可以查阅、复制相关资料，必要时可以询问诉讼当事人、证人","B":"司法鉴定费以及其他相关费用由司法鉴定机构统一收取，司法鉴定人不得私自收取任何费用","C":"声像资料类司法鉴定收费实行政府指导价管理","D":"在鉴定过程中补充或者重新提取鉴定材料所需的时间，计入鉴定时限"},"answer":["A","B","C"],"ref":"北京市司法鉴定收费管理办法第三、九条，司法鉴定程序通则第二十四、二十八条。"},{"id":"5_631","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定过程中，下列做法不正确的是（ ）。","options":{"A":"需要由缴费当事人另行支付的费用，司法鉴定机构应当向当事人提供费用清单和合法票据","B":"被鉴定人应当对鉴定材料的真实性、合法性负责","C":"鉴定费用应由被鉴定人缴纳","D":"当鉴定人之间对鉴定意见有分歧的，应当记录不同鉴定人的意见"},"answer":["B","C"],"ref":"北京市司法鉴定收费管理办法第十条，司法鉴定程序通则第十二、三十七条。"},{"id":"5_632","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"在鉴定过程中，涉及何种类型的案件可以向本机构以外的相关专业领域的专家进行询问（）。","options":{"A":"复杂","B":"专业性强","C":"疑难","D":"特殊技术问题"},"answer":["A","C","D"],"ref":"司法鉴定程序通则第三十三条。"},{"id":"5_633","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"哪些案件办案机关可以委托司法鉴定行业协会组织协调多个司法鉴定机构进行鉴定（）。","options":{"A":"重大案件","B":"特别复杂、疑难、特殊技术问题案件","C":"涉及多个鉴定类别的鉴定事项","D":"重新鉴定的案件"},"answer":["A","B","C"],"ref":"司法鉴定程序通则第三十四条。"},{"id":"5_634","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"下列说法中，符合《司法鉴定程序通则》或《北京市司法鉴定收费管理办法》的是（）。","options":{"A":"对于涉及复杂问题的鉴定事项，应当组织三名以上的专家进行复核","B":"收费争议解决办法是司法鉴定机构应当书面告知缴费当事人的事项","C":"对司法鉴定意见进行补正，不得改变司法鉴定意见的原意","D":"司法鉴定收费金额一经确定，不再进行调整"},"answer":["B","C"],"ref":"司法鉴定程序通则第三十五、四十一条，北京市司法鉴定收费管理办法第四、六条。"},{"id":"5_635","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，该通则制定的主要目的包括以下哪几项（）。","options":{"A":"规范司法鉴定机构和司法鉴定人的司法鉴定活动","B":"保障司法鉴定质量","C":"保障诉讼活动的顺利进行","D":"保障鉴定人的权利"},"answer":["A","B","C"],"ref":"《司法鉴定程序通则》第一条。"},{"id":"5_636","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定程序是（ ）进行司法鉴定活动的方式、步骤以及相关规则的总称。","options":{"A":"司法鉴定人","B":"司法鉴定机构","C":"法官","D":"司法机关"},"answer":["A","B"],"ref":"《司法鉴定程序通则》第二条。"},{"id":"5_637","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于司法鉴定人，下列哪些说法正确（ ）。","options":{"A":"司法鉴定人应当依法独立、客观、公正地进行鉴定","B":"司法鉴定人并对自己作出的鉴定意见负责","C":"司法鉴定人不得违反规定会见诉讼当事人及其委托的人","D":"司法鉴定人应当保守在执业活动中知悉的国家秘密、商业秘密，不得泄露个人隐私"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第四、五、六条。"},{"id":"5_638","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"在司法鉴定活动中，下列哪项说法正确（ ）。","options":{"A":"司法鉴定人应当依法独立、客观、公正地进行鉴定","B":"司法鉴定人不得违反规定会见诉讼当事人及其委托的人","C":"司法鉴定机构和司法鉴定人应当保守在执业活动中知悉的国家秘密、商业秘","D":"司法鉴定机构和司法鉴定人进行司法鉴定活动，应当遵守法律、法规、规章，遵守职业道德和执业纪律"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第四、五、六条。"},{"id":"5_639","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《司法鉴定程序通则》，关于司法鉴定，下列哪项说法错误（ ）。","options":{"A":"司法鉴定人应当依法独立、客观、公正地进行鉴定","B":"司法鉴定人不得违反规定会见诉讼当事人及其委托的人","C":"司法鉴定机构和司法鉴定人应当保守在执业活动中知悉的国家秘密、商业秘密，不得泄露个人隐私","D":"司法鉴定收费执行司法鉴定机构有关规定"},"answer":["D"],"ref":"《司法鉴定程序通则》第四、五、六条。"},{"id":"5_640","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于对司法鉴定活动的监督，下列哪项说法正确（ ）。","options":{"A":"对于有违反有关法律、法规、规章规定行为的，由司法行政机关依法给予相应的行政处罚","B":"对于有违反司法鉴定行业规范行为的，由司法鉴定协会给予相应的行业处分","C":"司法鉴定人违反《司法鉴定程序通则》规定的，司法机关应当予以纠正","D":"司法鉴定人违反《司法鉴定程序通则》规定的，司法鉴定机构应当予以纠正"},"answer":["A","B","D"],"ref":"《司法鉴定程序通则》第九、十条。"},{"id":"5_641","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，鉴定材料包括下列哪几项（ ）。","options":{"A":"生物检材","B":"非生物检材","C":"物证","D":"比对样本材料"},"answer":["A","B","D"],"ref":"《司法鉴定程序通则》第十二条。"},{"id":"5_643","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，委托人提供的鉴定材料应满足以下哪些条件（）。","options":{"A":"真实","B":"准确","C":"完整","D":"充分"},"answer":["A","C","D"],"ref":"《司法鉴定程序通则》第十二条。"},{"id":"5_644","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新《司法鉴定程序通则》，司法鉴定机构应当核对并记录鉴定材料包括以下哪些内容（）。","options":{"A":"名称","B":"重量","C":"性状","D":"保存状况"},"answer":["A","C","D"],"ref":"《司法鉴定程序通则》第十二条，应当核对并记录鉴定材料的名称、种类、数量、性状、保存状况、收到时间。"},{"id":"5_645","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"具有下列哪些情况的鉴定委托，司法鉴定机构不得受理（ ）。","options":{"A":"委托鉴定事项超出本机构司法鉴定业务范围的","B":"鉴定材料不真实、不完整、不充分或者取得方式不合法的","C":"鉴定用途不合法或者违背社会公德的","D":"委托人就同一鉴定事项同时委托其他司法鉴定机构进行鉴定的"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第十五条。"},{"id":"5_646","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"具有下列哪些的鉴定委托，司法鉴定机构不得受理（ ）。","options":{"A":"被鉴定人不配合的","B":"鉴定要求不符合司法鉴定执业规则或者相关鉴定技术规范的","C":"鉴定要求超出本机构技术条件或者鉴定能力的","D":"不符合法律、法规、规章规定的情形"},"answer":["B","C","D"],"ref":"《司法鉴定程序通则》第十五条。"},{"id":"5_648","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"对于鉴定材料不完整、不充分，不能满足鉴定需要的，司法鉴定机构可以采取下列哪些措施（）。","options":{"A":"应当要求委托人补充","B":"可以要求委托人补充","C":"不受理","D":"应当先受理，后补充鉴定"},"answer":["B","C"],"ref":"《司法鉴定程序通则》第十四、十五条。"},{"id":"5_649","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，满足下列哪些条件时，司法鉴定机构应当受理委托（）。","options":{"A":"属于鉴定机构司法鉴定业务范围","B":"鉴定用途合法","C":"提供的鉴定材料能够满足鉴定需要","D":"被鉴定人同意"},"answer":["A","B","C"],"ref":"《司法鉴定程序通则》第十四条。"},{"id":"5_650","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"最新修订的《司法鉴定程序通则》，有关司法鉴定的委托与受理，下列哪些说法正确（）。","options":{"A":"司法鉴定机构应当统一受理办案机关的司法鉴定委托","B":"委托人委托鉴定的，应当向司法鉴定机构提供真实、完整、充分的鉴定材料","C":"司法鉴定人对鉴定材料的真实性、合法性、完整性负责","D":"司法鉴定机构应当核对并记录鉴定材料的名称、种类、数量、性状、保存状况、收到时间等"},"answer":["A","B","D"],"ref":"《司法鉴定程序通则》第十二条，委托人对鉴定材料的真实性、合法性负责。"},{"id":"5_651","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定委托书应当载明以下哪些事项（）。","options":{"A":"委托人名称","B":"司法鉴定机构名称","C":"鉴定用途","D":"鉴定风险"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第十六条。"},{"id":"5_652","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"最新修订的《司法鉴定程序通则》，司法鉴定委托书应当载明的事项包括下列哪几项（）。","options":{"A":"委托鉴定事项","B":"是否属于重新鉴定","C":"与鉴定有关的基本案情","D":"双方商定的鉴定时限、鉴定费用及收取方式"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第十六条。"},{"id":"5_653","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定机构决定不予受理鉴定委托的，应当采取以下哪些行为（）。","options":{"A":"退还鉴定材料","B":"保留鉴定材料","C":"说明理由","D":"出具不予受理通知书"},"answer":["A","C"],"ref":"《司法鉴定程序通则》第十七条。"},{"id":"5_654","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，关于司法鉴定的实施，下列哪项说法正确（）。","options":{"A":"司法鉴定机构受理鉴定委托后，应当指定本机构具有该鉴定事项执业资格的司法鉴定人进行鉴定","B":"委托人可直接从受托的司法鉴定机构中选择符合条件的司法鉴定人进行鉴定","C":"委托人不得要求或者暗示司法鉴定机构、司法鉴定人按其意图或者特定目的提供鉴定意见","D":"司法鉴定机构对同一鉴定事项，应当指定或者选择二名司法鉴定人进行鉴定"},"answer":["A","C","D"],"ref":"《司法鉴定程序通则》第十八、十九条，委托人有特殊要求的，经双方协商一致，也可以从本机构中选择符合条件的司法鉴定人进行鉴定。"},{"id":"5_655","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，关于司法鉴定人，下列哪项说法正确（）。","options":{"A":"司法鉴定机构对同一鉴定事项，应当指定或者选择二名司法鉴定人进行鉴定","B":"司法鉴定机构对同一鉴定事项，应当指定二名以上司法鉴定人进行鉴定","C":"对同一鉴定事项，由委托人选择二名司法鉴定人进行","D":"对复杂、疑难或者特殊鉴定事项，可以指定或者选择多名司法鉴定人进行鉴定"},"answer":["A","D"],"ref":"《司法鉴定程序通则》第十九、二十条。"},{"id":"5_656","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，下列哪些情况下司法鉴定人应当回避（）。","options":{"A":"司法鉴定人曾经参加过同一鉴定事项鉴定的","B":"司法鉴定人曾经作为专家提供过咨询意见的","C":"司法鉴定人本人与诉讼当事人有利害关系的","D":"司法鉴定人曾被聘请为有专门知识的人参与过同一鉴定事项法庭质证的"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第二十、二十一条。"},{"id":"5_657","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于司法鉴定人回避，下列哪些说法正确（ ）。","options":{"A":"司法鉴定人可以自行提出回避","B":"委托人要求司法鉴定人回避的，应当向该司法鉴定人所属的司法鉴定机构提出","C":"司法鉴定人的回避由司法鉴定机构决定","D":"委托人对司法鉴定机构作出的司法鉴定人是否回避的决定有异议的，可以撤销鉴定委托"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第二十一条。"},{"id":"5_658","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，关于鉴定材料，下列哪项说法正确 （ ）。","options":{"A":"司法鉴定机构应当建立鉴定材料管理制度","B":"司法鉴定机构决定不予受理鉴定委托的，应当退还鉴定材料","C":"司法鉴定机构因严重不负责任造成鉴定材料损毁、遗失的，应当依法承担责任","D":"司法鉴定机构和司法鉴定人在鉴定过程中应当严格依照技术规范保管和使用鉴定材料"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第二十二条。"},{"id":"5_659","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定人进行鉴定，应当遵守和采用下列那些标准和技术规范（ ）。","options":{"A":"机构自行制定的技术方法","B":"国家标准","C":"行业标准","D":"该专业领域多数专家认可的技术方法"},"answer":["B","C","D"],"ref":"《司法鉴定程序通则》第二十三条。"},{"id":"5_660","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，关于司法鉴定人的权利，下列哪些项说法正确（）。","options":{"A":"司法鉴定人有权了解进行鉴定所需要的案件材料","B":"司法鉴定人可以调查取证","C":"司法鉴定人可以查阅、复制相关资料","D":"必要时司法鉴定人可以询问诉讼当事人、证人"},"answer":["A","C","D"],"ref":"《司法鉴定程序通则》第二十四条。"},{"id":"5_661","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，在鉴定过程中，司法鉴定人有下列哪些权利（）。","options":{"A":"有权了解进行鉴定所需要的案件材料","B":"可以查阅、复制相关资料","C":"对鉴定过程进行实时记录","D":"到现场提取鉴定材料"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第二十四条。"},{"id":"5_662","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，关于案件材料，下列哪些选项说法正确（）。","options":{"A":"司法鉴定人有权了解进行鉴定所需要的案件材料","B":"鉴定人可以查阅、复制相关资料","C":"经委托人同意，司法鉴定机构可以派员到现场提取鉴定材料","D":"现场提取鉴定材料应当由不少于二名该鉴定事项的司法鉴定人进行"},"answer":["A","B","C"],"ref":"《司法鉴定程序通则》第二十四条，不少于二名司法鉴定机构的工作人员进行，其中至少一名应为该鉴定事项的司法鉴定人。"},{"id":"5_663","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，关于现场提取鉴定材料，下列哪些选项说法正确（）。","options":{"A":"经委托人同意，司法鉴定机构可以派员到现场提取鉴定材料","B":"现场提取鉴定材料应当由不少于二名司法鉴定机构的工作人员进行，其中至少一名应为该鉴定事项的司法鉴定人","C":"现场提取材料的工作人员应当均为该鉴定事项的司法鉴定人","D":"现场提取鉴定材料时，应当有委托人指派或者委托的人员在场见证并在提取记录上签名"},"answer":["A","B","D"],"ref":"《司法鉴定程序通则》第二十四条，其中至少一名应为该鉴定事项的司法鉴定人。"},{"id":"5_664","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，关于到场见证，下列哪些选项说法正确（）。","options":{"A":"鉴定过程中，需要对无民事行为能力人或者限制民事行为能力人进行身体检","B":"对被鉴定人进行法医精神病鉴定的，应当通知委托人或者被鉴定人的近亲属或者监护人到场见证","C":"对需要进行尸体解剖的，应当通知委托人或者死者的近亲属或者监护人到场见证","D":"到场见证人员应当在鉴定记录上签名"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第二十五条。"},{"id":"5_665","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定过程中，需要对无民事行为能力人或者限制民事行为能力人进行身体检查的，应当采取以下哪种措施（）。","options":{"A":"应当通知委托人到场见证","B":"应当通知其监护人或者近亲属到场见证","C":"必要时，可以通知委托人到场见证","D":"应当采取必要措施保护其隐私"},"answer":["B","C","D"],"ref":"《司法鉴定程序通则》第二十五条第一款、第二十六条。"},{"id":"5_666","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定过程中，需要被鉴定人进行法医精神病鉴定的，可以采取以下哪些措施 （ ）。","options":{"A":"通知委托人到场见证","B":"通知被鉴定人的近亲属或者监护人到场见证","C":"到场见证人员应当在鉴定记录上签名","D":"女性鉴定人在场"},"answer":["A","B","C"],"ref":"《司法鉴定程序通则》第二十五条。"},{"id":"5_667","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，关于现场见证，下列哪些说法正确 （ ）。","options":{"A":"见证人员未到场的，司法鉴定人不得开展相关鉴定活动","B":"见证人员未到场的，延误时间不计入鉴定时限","C":"对需要进行尸体解剖的，应当通知委托人或者死者的近亲属或者监护人到场见证","D":"到场见证人员无需在鉴定记录上签名"},"answer":["A","B","C"],"ref":"《司法鉴定程序通则》第二十五条，到场见证人员应当在鉴定记录上签名。"},{"id":"5_668","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于鉴定过程记录，下列哪项说法正确（ ）。","options":{"A":"司法鉴定人应当在鉴定结束后两个工作日内记录鉴定过程","B":"记录可以采取笔记、录音、录像、拍照等方式","C":"记录应当载明主要的鉴定方法和过程，检查、检验、检测结果，以及仪器设备使用情况等","D":"记录的内容应当真实、客观、准确、完整、清晰"},"answer":["B","C","D"],"ref":"《司法鉴定程序通则》第二十七条，司法鉴定人应当对鉴定过程进行实时记录并签名。"},{"id":"5_669","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定人对鉴定过程进行记录可采取的方式包括（）。","options":{"A":"笔记","B":"录音","C":"录像","D":"拍照"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第二十七条。"},{"id":"5_670","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定事项涉及复杂、疑难、特殊技术问题或者鉴定过程需要较长时间的，下列哪项说法正确（）。","options":{"A":"经委托人同意，完成鉴定的时限可以延长","B":"延长时限一般不得超过六十个工作日","C":"鉴定时限延长的，应当及时告知委托人。","D":"司法鉴定机构与委托人对鉴定时限另有约定的，从其约定"},"answer":["C","D"],"ref":"《司法鉴定程序通则》第二十八条，延长时限一般不得超过三十个工作日。"},{"id":"5_671","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于鉴定时限，下列哪些选项说法正确（ ）。","options":{"A":"司法鉴定机构应当自司法鉴定委托书生效之日起三十个工作日内完成鉴定","B":"鉴定时限延长的，应当及时告知委托人。","C":"经本机构负责人批准，完成鉴定的时限可以延长","D":"在鉴定过程中补充或者重新提取鉴定材料所需的时间，不计入鉴定时限"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第二十八条。"},{"id":"5_672","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定机构在鉴定过程中，出现下列哪些情形是需要终止鉴定（）。","options":{"A":"发现鉴定材料不真实、不完整、不充分或者取得方式不合法的","B":"鉴定要求超出本机构技术条件或者鉴定能力的","C":"委托人、诉讼当事人拒绝支付鉴定费用的","D":"因不可抗力致使鉴定无法继续进行的"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第十五、二十九条。"},{"id":"5_673","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，下列哪些情况下，司法鉴定机构可以根据委托人的要求进行补充鉴定（）。","options":{"A":"司法鉴定人不具有从事委托鉴定事项执业资格的","B":"原委托鉴定事项有遗漏","C":"委托人就原委托鉴定事项提供新的鉴定材料的","D":"司法鉴定人应当回避没有回避的"},"answer":["B","C"],"ref":"《司法鉴定程序通则》第三十条。"},{"id":"5_674","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，下列哪些情况下，司法鉴定机构可以接受办案机关委托进行重新鉴定（）。","options":{"A":"原司法鉴定机构超出登记的业务范围组织鉴定的","B":"原司法鉴定人不具有从事委托鉴定事项执业资格的","C":"原司法鉴定人应当回避没有回避的","D":"办案机关认为需要重新鉴定的"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第三十一条。"},{"id":"5_675","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，下列哪些情况，不属于司法鉴定机构可以接受办案机关委托进行重新鉴定（）。","options":{"A":"鉴定材料发生耗损，委托人不能补充提供的","B":"办案机关认为需要重新鉴定的","C":"发现鉴定材料不真实、不完整、不充分或者取得方式不合法的","D":"鉴定要求不符合司法鉴定执业规则或者相关鉴定技术规范的"},"answer":["A","C","D"],"ref":"《司法鉴定程序通则》第三十一条，其它三项属于终止鉴定。"},{"id":"5_676","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，下列哪种情况下，司法鉴定机构可以接受办案机关委托进行重新鉴定（）。","options":{"A":"原委托鉴定事项有遗漏的","B":"办案机关认为需要重新鉴定的","C":"鉴定要求不符合司法鉴定执业规则或者相关鉴定技术规范的","D":"原司法鉴定人不具有从事委托鉴定事项执业资格的"},"answer":["B","D"],"ref":"《司法鉴定程序通则》第三十一条，A 选项补充鉴定，C 选项终止鉴定。"},{"id":"5_677","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，关于重新鉴定，下列哪项说法正确 （ ）。677 选项终止鉴定。 《司法鉴定程序通则》第三十二条，重新鉴定应当委托原司法鉴定机构以外的其他司法鉴定机","options":{"A":"重新鉴定必须委托原司法鉴定机构以外的其他司法鉴定机构进行","B":"接受重新鉴定委托的司法鉴定机构的资质条件应当不低于原司法鉴定机构","C":"进行重新鉴定的司法鉴定人中应当至少有一名具有相关专业高级专业技术职称","D":"重新鉴定不得指定原司法鉴定人进行"},"answer":["B","C","D"],"ref":"《司法鉴定程序通则》第三十二条，重新鉴定应当委托原司法鉴定机构以外的其他司法鉴定机"},{"id":"5_678","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，关于鉴定意见复核，下列哪项正确 （ ）。","options":{"A":"司法鉴定人完成鉴定后，司法鉴定机构应当指定具有相应资质的人员对鉴定程序和鉴定意见进行复核","B":"对于涉及复杂、疑难、特殊技术问题或者重新鉴定的鉴定事项，可以组织三名以上的专家进行复核","C":"复核人员完成复核后，应当提出复核意见","D":"复核意见要签名，并存入鉴定档案"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第三十五条。"},{"id":"5_679","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，下列关于司法鉴定意见书正确的有 （ ）。","options":{"A":"司法鉴定机构和司法鉴定人应当按照统一规定的文本格式制作司法鉴定意见书","B":"司法鉴定意见书应当由司法鉴定人签名","C":"多人参加的鉴定，对鉴定意见有不同意见的，应当注明","D":"司法鉴定意见书应当加盖司法鉴定机构的司法鉴定专用章"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第三十七、三十八条。"},{"id":"5_680","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定意见书出具后，下列哪些情况下，司法鉴定机构可以进行补正（）。","options":{"A":"图像、谱图、表格不清晰的","B":"签名、盖章或者编号不符合制作要求的","C":"鉴定意见遗漏的","D":"文字表达有瑕疵或者错别字，但不影响司法鉴定意见的"},"answer":["A","B","D"],"ref":"《司法鉴定程序通则》第四十一条。"},{"id":"5_681","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于司法鉴定意见书补正，下列说法正确的有（ ）。","options":{"A":"补正应当在原司法鉴定意见书上进行","B":"由至少一名司法鉴定人在补正处签名","C":"对司法鉴定意见书进行补正，不得改变司法鉴定意见的原意","D":"必要时，可以出具补正书"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第四十一条。"},{"id":"5_682","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"最新修订的《司法鉴定程序通则》，关于司法鉴定人出庭，下列哪项说法正确（）。","options":{"A":"经人民法院依法通知，司法鉴定人应当出庭作证","B":"司法鉴定机构接到出庭通知后，应当及时与人民法院确认司法鉴定人出庭的时间、地点、人数、费用、要求等","C":"司法鉴定机构应当支持司法鉴定人出庭作证，为司法鉴定人依法出庭提供必要条件","D":"人民法院认为鉴定人有必要出庭的，鉴定人不出庭作证的，经鉴定机构说明，仍可作为定案的根据"},"answer":["A","B","C"],"ref":"《司法鉴定程序通则》四十三、四十四、四十五条。"},{"id":"5_683","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《司法鉴定程序通则》、《刑事诉讼法》规定，人民法院认为鉴定人有必要出庭的，鉴定人拒不出庭作证的，关于鉴定意见下列哪项目说法错误（）。","options":{"A":"可以作为定案的根据","B":"不得作为定案的根据","C":"经鉴定机构书面说明可以作为定案根据","D":"经侦查机关同意可以作为定案根据"},"answer":["A","C","D"],"ref":"新刑事诉讼法第一百八十七条； 《司法鉴定程序通则》四十三条。"},{"id":"5_684","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定程序是指司法鉴定机构和司法鉴定人进行司法鉴定活动的（）的总称。","options":{"A":"方式","B":"方法","C":"步骤","D":"相关规则"},"answer":["A","C","D"],"ref":"《司法鉴定程序通则》第二条。"},{"id":"5_685","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定人应当依法（ ）地进行鉴定，并对自己作出的鉴定意见负责。","options":{"A":"独立","B":"公正","C":"客观","D":"无误"},"answer":["A","B","C"],"ref":"《司法鉴定程序通则》第五条。"},{"id":"5_686","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构和司法鉴定人进行司法鉴定活动，应当遵守（），遵守职业道德和执业纪律，尊重科学，遵守技术操作规范。","options":{"A":"法律","B":"法规","C":"规章","D":"规则"},"answer":["A","B","C"],"ref":"《司法鉴定程序通则》第四条。"},{"id":"5_687","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"对于有违反有关法律、法规、规章规定行为的司法鉴定机构和司法鉴定人，由（ ）依法给予相应的行政处罚；对于有违反司法鉴定行业规范行为的，由（）给予相应的行业处分。","options":{"A":"司法鉴定协会","B":"司法局","C":"司法行政机关","D":"法院"},"answer":["A","C"],"ref":"《司法鉴定程序通则》第九条。"},{"id":"5_688","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构应当加强对司法鉴定人执业活动的（ ）和（ ）。","options":{"A":"监督","B":"视察","C":"管理","D":"评定"},"answer":["A","C"],"ref":"《司法鉴定程序通则》第十条。"},{"id":"5_689","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"委托人委托鉴定的，应当向司法鉴定机构提供（）的鉴定材料，并对鉴定材料的真实性、合法性负责。","options":{"A":"真实","B":"完整","C":"充分","D":"全面"},"answer":["A","B","C"],"ref":"《司法鉴定程序通则》第十二条。"},{"id":"5_690","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定人具有下列哪些情形的，应当自行回避，不自行回避的，委托人、当事人及利害关系人有权要求回避（）。","options":{"A":"是本案的当事人，或是当事人近亲属的","B":"本人或者其近亲属与本案有利害关系的","C":"担任过本案的证人、勘查人、辨护人、诉讼代理人的","D":"与本案当事人有其他关系可能影响司法鉴定公正的"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第七条。"},{"id":"5_691","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下哪些属于鉴定材料（ ）。","options":{"A":"生物检材","B":"非生物检材","C":"比对样本材料","D":"病历及影像学片"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第十二条。"},{"id":"5_692","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构应当自收到委托之日起（ ）内作出是否受理的决定（ ）。","options":{"A":"十天","B":"七个工作日","C":"十个工作日","D":"七天"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第十三条。"},{"id":"5_693","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"具有下列哪些情况，司法鉴定机构不得受理（ ）。","options":{"A":"委托鉴定事项超出本机构司法鉴定业务范围的","B":"发现鉴定材料不真实、不完整、不充分或者取得方式不合法的","C":"鉴定要求超出本机构技术条件或者鉴定能力的","D":"鉴定用途不合法或者违背社会公德的"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第十五条。"},{"id":"5_694","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定委托书应当载明的内容有哪些（ ）。","options":{"A":"委托人名称","B":"司法鉴定机构名称","C":"委托鉴定事项","D":"当事人家庭住址"},"answer":["A","B","C"],"ref":"《司法鉴定程序通则》第十六条。"},{"id":"5_695","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定委托书应当载明的内容有哪些（ ）。","options":{"A":"鉴定有关的基本案情","B":"鉴定材料的提供及退还","C":"双方商定的鉴定时限","D":"鉴定费用及收取方式"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第十六条。"},{"id":"5_696","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构决定不予受理鉴定委托的，应当（ ）。","options":{"A":"向委托人出具不予受理的理由","B":"退回鉴定材料","C":"将鉴定材料作归档处理","D":"收取鉴定费用"},"answer":["A","B"],"ref":"《司法鉴定程序通则》第十七条。"},{"id":"5_697","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定实行（ ）制度。","options":{"A":"回避","B":"保密","C":"时限","D":"错鉴责任追究"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第二十条、二十二。"},{"id":"5_698","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"下列哪些情况，司法鉴定人应当回避（ ）。","options":{"A":"近亲属与诉讼当事人有利害关系的","B":"曾作为专家提供过咨询意见的","C":"曾被聘请参与过同一鉴定事项法庭质证的","D":"委托人要求回避的"},"answer":["A","B","C"],"ref":"《司法鉴定程序通则》第二十条。"},{"id":"5_699","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构应当建立鉴定材料管理制度，严格监控鉴定材料的（ ）。","options":{"A":"接收","B":"保管","C":"使用","D":"退还"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第二十二条。"},{"id":"5_700","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定人进行鉴定，应当依下列顺序遵守和采用该专业领域的（ ）。","options":{"A":"技术标准","B":"行业标准和技术规范","C":"地方适用标准","D":"该专业领域多数专家认可的技术方法"},"answer":["A","B","D"],"ref":"《司法鉴定程序通则》第二十三条。"},{"id":"5_701","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"下列哪些情况，需通知近亲属或监护人到场见证（ ）。","options":{"A":"无民事行为能力人","B":"限制民事行为能力人","C":"被鉴定人进行法医精神病鉴定的","D":"需要进行尸体解剖的"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第二十五条。"},{"id":"5_702","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"有下列情形之一的，可以终止鉴定（ ）。","options":{"A":"发现鉴定材料不真实、不完整、不充分或者取得方式不合法的","B":"鉴定要求超出本机构技术条件或者鉴定能力的","C":"委托人拒不履行司法鉴定委托书规定的义务、被鉴定人拒不配合","D":"鉴定活动受到严重干扰，致使

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>司法鉴定刷题</title>
<style>
:root {
  --ink: #1a1208;
  --paper: #faf7f0;
  --seal: #c0392b;
  --seal-light: #fdf0ee;
  --gold: #b8860b;
  --gold-light: #fdf6e0;
  --jade: #2d6a4f;
  --jade-light: #eaf5ef;
  --mist: #8a8a8a;
  --border: #e8e0d0;
  --card: #ffffff;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.hdr {
  background: var(--ink);
  color: white;
  padding: 14px 16px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 200;
}
.hdr-seal {
  width: 36px; height: 36px;
  background: var(--seal);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 900; color: white;
  line-height: 1.3; text-align: center;
  transform: rotate(-4deg);
  flex-shrink: 0;
}
.hdr-title { font-size: 16px; font-weight: 700; letter-spacing: 1px; flex: 1; }
.hdr-sub { font-size: 10px; color: rgba(255,255,255,0.45); margin-top: 1px; }

/* progress bar under header */
.hdr-prog {
  height: 3px;
  background: rgba(255,255,255,0.12);
  position: sticky;
  top: 62px;
  z-index: 199;
}
.hdr-prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--seal));
  transition: width 0.35s ease;
  width: 0%;
}

/* ── SCREENS ── */
.screen { padding-bottom: calc(20px + var(--safe-bottom)); }

/* ── HOME ── */
.home-top {
  background: var(--ink);
  color: white;
  padding: 24px 18px 28px;
  text-align: center;
}
.home-top h2 {
  font-size: 26px; font-weight: 900; letter-spacing: 3px; margin-bottom: 6px;
}
.home-top p { font-size: 13px; color: rgba(255,255,255,0.5); }
.home-body { padding: 16px; }

.sec-label {
  font-size: 11px; font-weight: 700; color: var(--mist);
  letter-spacing: 1.5px; text-transform: uppercase;
  margin: 20px 0 10px;
}
.sec-label:first-child { margin-top: 0; }

/* Resume bar */
.resume-bar {
  display: none;
  background: var(--card);
  border: 1.5px solid var(--gold);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 16px;
  align-items: center;
  gap: 10px;
}
.resume-bar.show { display: flex; }
.resume-txt { flex: 1; }
.resume-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.resume-info { font-size: 12px; color: var(--mist); }
.resume-btns { display: flex; gap: 8px; flex-shrink: 0; }

/* Chapter list */
.ch-list { display: flex; flex-direction: column; gap: 8px; }
.ch-item {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-user-select: none; user-select: none;
}
.ch-item:active { transform: scale(0.98); }
.ch-item.sel {
  border-color: var(--seal);
  background: var(--seal-light);
}
.ch-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: transparent;
  transition: all 0.15s;
}
.ch-item.sel .ch-check {
  background: var(--seal); border-color: var(--seal); color: white;
}
.ch-info { flex: 1; }
.ch-name { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
.ch-badges { display: flex; gap: 5px; flex-wrap: wrap; }
.bdg { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.bdg-s { background: var(--gold-light); color: var(--gold); }
.bdg-m { background: #eef0fb; color: #3949ab; }
.bdg-j { background: var(--jade-light); color: var(--jade); }

/* Pill toggle groups */
.pill-row { display: flex; gap: 8px; flex-wrap: wrap; }
.pill {
  padding: 8px 16px; border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--card); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; color: var(--mist);
  font-family: inherit;
  -webkit-user-select: none; user-select: none;
}
.pill:active { transform: scale(0.96); }
.pill.active { background: var(--ink); color: white; border-color: var(--ink); }

/* Start button */
.start-btn {
  width: 100%; padding: 16px;
  background: var(--seal); color: white; border: none;
  border-radius: 14px; font-size: 17px; font-weight: 700;
  letter-spacing: 3px; font-family: inherit;
  cursor: pointer; margin-top: 24px;
  box-shadow: 0 4px 20px rgba(192,57,43,0.35);
  -webkit-user-select: none; user-select: none;
}
.start-btn:active { transform: scale(0.98); background: #a93226; }

/* ── QUIZ ── */
.q-header {
  padding: 12px 16px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  flex-wrap: wrap;
}
.q-tag {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  padding: 3px 9px; border-radius: 4px;
}
.tag-s { background: var(--gold-light); color: var(--gold); }
.tag-m { background: #eef0fb; color: #3949ab; }
.tag-j { background: var(--jade-light); color: var(--jade); }
.q-ch {
  font-size: 11px; color: var(--mist);
  background: var(--paper); border: 1px solid var(--border);
  padding: 2px 8px; border-radius: 4px;
  max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.q-ctr { font-size: 12px; color: var(--mist); margin-left: auto; font-weight: 600; }

.q-body { padding: 16px; }
.q-text {
  font-size: 16px; line-height: 1.9; color: var(--ink);
  margin-bottom: 20px; font-weight: 400;
}
.q-hint { font-size: 12px; color: var(--mist); margin-bottom: 12px; font-style: italic; }

/* Options */
.opts { display: flex; flex-direction: column; gap: 10px; }
.opt {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 14px; border-radius: 12px;
  border: 1.5px solid var(--border); background: var(--card);
  cursor: pointer; text-align: left; transition: all 0.15s;
  font-family: inherit; font-size: 14px; line-height: 1.65; color: var(--ink);
  width: 100%; -webkit-user-select: none; user-select: none;
}
.opt:active { transform: scale(0.99); }
.opt.picked { border-color: var(--gold); background: var(--gold-light); }
.opt-ltr {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 12px; flex-shrink: 0;
  margin-top: 1px; transition: all 0.15s;
  background: var(--paper);
}
.opt.picked .opt-ltr { background: var(--gold); border-color: var(--gold); color: white; }
.opt.ans-ok { border-color: var(--jade) !important; background: var(--jade-light) !important; }
.opt.ans-ok .opt-ltr { background: var(--jade) !important; border-color: var(--jade) !important; color: white !important; }
.opt.ans-bad { border-color: var(--seal) !important; background: var(--seal-light) !important; }
.opt.ans-bad .opt-ltr { background: var(--seal) !important; border-color: var(--seal) !important; color: white !important; }
.opt:disabled { cursor: default; }

/* Judge buttons */
.judge-row { display: flex; gap: 14px; padding: 8px 0 4px; }
.j-btn {
  flex: 1; padding: 20px 0; border-radius: 16px;
  border: 1.5px solid var(--border); background: var(--card);
  font-size: 36px; cursor: pointer; transition: all 0.15s;
  -webkit-user-select: none; user-select: none;
}
.j-btn:active { transform: scale(0.95); }
.j-btn.j-ok { border-color: var(--jade); background: var(--jade-light); }
.j-btn.j-bad { border-color: var(--seal); background: var(--seal-light); }
.j-btn:disabled { cursor: default; }

/* Feedback */
.feedback {
  margin-top: 14px; padding: 14px 16px; border-radius: 12px;
  animation: fadeUp 0.2s ease;
}
.fb-ok { background: var(--jade-light); border: 1.5px solid rgba(45,106,79,0.2); }
.fb-bad { background: var(--seal-light); border: 1.5px solid rgba(192,57,43,0.2); }
.fb-show { background: var(--gold-light); border: 1.5px solid rgba(184,134,11,0.2); }
.fb-skip { background: #f5f5f0; border: 1.5px solid var(--border); }
.fb-title { font-weight: 700; font-size: 14px; margin-bottom: 5px; }
.fb-ok .fb-title { color: var(--jade); }
.fb-bad .fb-title { color: var(--seal); }
.fb-show .fb-title { color: var(--gold); }
.fb-ans { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.fb-ref { font-size: 12px; color: var(--mist); line-height: 1.7; }
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  padding: 10px 12px calc(10px + var(--safe-bottom));
  display: flex; gap: 8px; align-items: center;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.07);
  z-index: 100;
}
.nav-btn {
  padding: 11px 0; border-radius: 10px;
  border: 1.5px solid var(--border); background: var(--card);
  font-size: 13px; font-family: inherit; font-weight: 500;
  cursor: pointer; transition: all 0.15s; color: var(--ink);
  flex: 1; text-align: center;
  -webkit-user-select: none; user-select: none;
}
.nav-btn:active { transform: scale(0.97); background: var(--gold-light); border-color: var(--gold); }
.nav-btn:disabled { opacity: 0.3; pointer-events: none; }
.nav-btn.primary {
  background: var(--ink); color: white; border-color: var(--ink);
}
.nav-btn.primary:active { background: #2d2416; transform: scale(0.97); }
.nav-btn.danger { color: var(--seal); }
/* Spacer so content doesn't hide behind fixed nav */
.nav-spacer { height: calc(68px + var(--safe-bottom)); }

/* Stats row in quiz */
.stats-row {
  display: flex; gap: 0;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}
.stat-item {
  flex: 1; text-align: center; padding: 10px 0;
  border-right: 1px solid var(--border);
}
.stat-item:last-child { border-right: none; }
.stat-n { font-size: 20px; font-weight: 700; }
.stat-n.c { color: #27ae60; }
.stat-n.w { color: var(--seal); }
.stat-n.s { color: var(--gold); }
.stat-l { font-size: 10px; color: var(--mist); margin-top: 1px; }

/* ── RESULTS ── */
.res-body { padding: 24px 16px; text-align: center; }
.res-title { font-size: 22px; font-weight: 900; letter-spacing: 3px; margin-bottom: 6px; }
.res-sub { font-size: 13px; color: var(--mist); margin-bottom: 28px; }
.res-circle {
  width: 120px; height: 120px; border-radius: 50%;
  border: 4px solid var(--seal);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  margin: 0 auto 24px;
  background: white; box-shadow: 0 4px 20px rgba(192,57,43,0.15);
}
.res-pct { font-size: 30px; font-weight: 900; color: var(--seal); line-height: 1; }
.res-lbl { font-size: 11px; color: var(--mist); margin-top: 3px; }
.res-stats { display: flex; justify-content: center; gap: 32px; margin-bottom: 28px; }
.rs { text-align: center; }
.rs-n { font-size: 24px; font-weight: 700; }
.rs-n.c { color: var(--jade); }
.rs-n.w { color: var(--seal); }
.rs-n.s { color: var(--gold); }
.rs-l { font-size: 12px; color: var(--mist); margin-top: 2px; }
.res-btn-col { display: flex; flex-direction: column; gap: 10px; padding: 0 16px; }
.res-btn {
  width: 100%; padding: 15px; border-radius: 12px;
  border: 1.5px solid var(--border); background: var(--card);
  font-size: 15px; font-family: inherit; font-weight: 500;
  cursor: pointer; transition: all 0.15s; color: var(--ink);
  -webkit-user-select: none; user-select: none;
}
.res-btn:active { transform: scale(0.98); }
.res-btn.primary {
  background: var(--seal); color: white; border-color: var(--seal);
  box-shadow: 0 4px 14px rgba(192,57,43,0.3);
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-seal">司法<br>鉴定</div>
  <div style="flex:1">
    <div class="hdr-title">司法鉴定刷题</div>
    <div class="hdr-sub">JUDICIAL AUTHENTICATION EXAM</div>
  </div>
  <div id="hdr-ctr" style="font-size:13px;color:rgba(255,255,255,0.6);display:none"></div>
</div>
<div class="hdr-prog" id="hdr-prog" style="display:none"><div class="hdr-prog-fill" id="hdr-prog-fill"></div></div>

<!-- ══ HOME ══ -->
<div id="S-home" class="screen">
  <div class="home-top">
    <h2>开始刷题</h2>
    <p id="total-n"></p>
  </div>
  <div class="home-body">

    <div id="resume-bar" class="resume-bar">
      <div class="resume-txt">
        <div class="resume-title">📌 上次练习进度</div>
        <div class="resume-info" id="resume-info"></div>
      </div>
      <div class="resume-btns">
        <button class="nav-btn primary" style="flex:none;padding:10px 16px;font-size:13px" onclick="resumeQuiz()">继续</button>
        <button class="nav-btn" style="flex:none;padding:10px 12px;font-size:12px" onclick="clearProgress();showResumeBar()">清除</button>
      </div>
    </div>

    <div class="sec-label">选择章节</div>
    <div class="ch-list" id="ch-list"></div>

    <div class="sec-label">题型筛选</div>
    <div class="pill-row" id="type-row">
      <button class="pill active" data-v="all">全部</button>
      <button class="pill" data-v="single">单选题</button>
      <button class="pill" data-v="multi">多选题</button>
      <button class="pill" data-v="judge">判断题</button>
    </div>

    <div class="sec-label">练习模式</div>
    <div class="pill-row" id="mode-row">
      <button class="pill active" data-v="seq">顺序练习</button>
      <button class="pill" data-v="random">随机刷题</button>
      <button class="pill" data-v="wrong">错题复习</button>
    </div>

    <button class="start-btn" id="btn-start">开始新练习</button>
    <div style="height:20px"></div>
  </div>
</div>

<!-- ══ QUIZ ══ -->
<div id="S-quiz" style="display:none" class="screen">
  <div class="q-header">
    <span class="q-tag" id="q-tag">单选</span>
    <span class="q-ch" id="q-ch"></span>
    <span class="q-ctr" id="q-ctr"></span>
  </div>
  <div class="stats-row">
    <div class="stat-item"><div class="stat-n c" id="sc">0</div><div class="stat-l">正确</div></div>
    <div class="stat-item"><div class="stat-n w" id="sw">0</div><div class="stat-l">错误</div></div>
    <div class="stat-item"><div class="stat-n s" id="ss">0</div><div class="stat-l">跳过</div></div>
  </div>
  <div class="q-body">
    <div class="q-text" id="q-text"></div>
    <div class="q-hint" id="q-hint" style="display:none"></div>
    <div id="q-opts"></div>
    <div id="q-fb" style="display:none"></div>
  </div>
  <div class="nav-spacer"></div>
  <div class="bottom-nav">
    <button class="nav-btn" id="btn-prev" style="flex:none;width:44px;padding:11px 0">←</button>
    <button class="nav-btn" id="btn-show-ans" style="font-size:12px">答案</button>
    <button class="nav-btn" id="btn-skip" style="font-size:12px">跳过</button>
    <button class="nav-btn danger" id="btn-quit" style="flex:none;font-size:12px;padding:11px 10px">🏠</button>
    <button class="nav-btn primary" id="btn-next">下一题 →</button>
  </div>
</div>

<!-- ══ RESULTS ══ -->
<div id="S-res" style="display:none" class="screen">
  <div class="res-body">
    <div class="res-title">练习完成</div>
    <div class="res-sub">坚持每日刷题，备考必胜</div>
    <div class="res-circle">
      <div class="res-pct" id="res-pct">0%</div>
      <div class="res-lbl">正确率</div>
    </div>
    <div class="res-stats">
      <div class="rs"><div class="rs-n c" id="res-c">0</div><div class="rs-l">✓ 正确</div></div>
      <div class="rs"><div class="rs-n w" id="res-w">0</div><div class="rs-l">✗ 错误</div></div>
      <div class="rs"><div class="rs-n s" id="res-s">0</div><div class="rs-l">— 跳过</div></div>
    </div>
  </div>
  <div class="res-btn-col">
    <button class="res-btn primary" id="btn-home">返回主页</button>
    <button class="res-btn" id="btn-review-wrong">复习错题 (<span id="wrong-n">0</span>)</button>
    <button class="res-btn" id="btn-restart">再来一遍</button>
    <div style="height:10px"></div>
  </div>
</div>

<script>

法鉴定管理问题的决定》第七条。"},{"id":"2_9","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"各鉴定机构之间的关系是（）。","options":{"A":"领导与被领导关系","B":"管理与被管理关系","C":"监督与被监督关系","D":"无隶属关系"},"answer":["D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第八条。"},{"id":"2_10","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下说法正确的是（ ）。","options":{"A":"各鉴定机构之间没有隶属关系","B":"下级侦查机关设立的鉴定机构隶属于上级侦查机关设立的鉴定机构","C":"鉴定机构接受委托从事司法鉴定业务，受该鉴定机构所在地的限制。","D":"鉴定机构接受委托从事司法鉴定业务，不受该鉴定机构业务范围限制。"},"answer":["A"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第八条。"},{"id":"2_11","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"在以下情况下，鉴定人可在两个或以上鉴定机构中从事司法鉴定业务（ ）。","options":{"A":"经鉴定人与鉴定机构协商并签订书面协议","B":"经当地司法行政部门书面同意","C":"经委托单位或个人书面同意","D":"以上都不允许"},"answer":["D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第八条。"},{"id":"2_12","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》的规定，受理司法鉴定业务委托的是（）。","options":{"A":"第一鉴定人","B":"参与该案件的所有鉴定人","C":"鉴定人所在鉴定机构","D":"参与该案件的鉴定人之一"},"answer":["C"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第九条。"},{"id":"2_13","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人陈某在鉴定人名册注明的执业类别为法医病理鉴定、法医临床鉴定，其所在鉴定机构注明的业务范围为法医临床鉴定、声像资料鉴定、法医物证鉴定。陈某可接受的委托为（）。","options":{"A":"法医病理鉴定委托","B":"法医临床鉴定委托","C":"声像资料鉴定委托","D":"DNA"},"answer":["B"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第九条。"},{"id":"2_14","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据我相关法律法规规定，以下需要实行回避的人不包括（ ）。","options":{"A":"法官","B":"翻译","C":"鉴定人","D":"证人"},"answer":["D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第九条，《中华人民共和国民事诉讼法》第四十四条。"},{"id":"2_15","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"当鉴定人对鉴定意见持不同意见时，鉴定书中的鉴定意见以（ ）为准。","options":{"A":"第一鉴定人意见","B":"多数鉴定人意见","C":"其中职称最高的鉴定人意见","D":"以上都不是"},"answer":["D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十条。"},{"id":"2_16","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下单位或个人，对鉴定意见负责的是（ ）。","options":{"A":"鉴定机构","B":"鉴定人","C":"委托单位","D":"聘请鉴定人的单位、组织或个人"},"answer":["B"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十条。"},{"id":"2_17","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"在诉讼中，当事人对鉴定意见有异议的，经人民法院依法通知，鉴定人（）。","options":{"A":"可因实行回避免除出庭作证","B":"可经申请免除出庭作证","C":"不出庭作证的，鉴定意见应予排除","D":"可因公务原因以其他方式作证"},"answer":["C"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十一条。"},{"id":"2_18","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人或者鉴定机构有违反《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》规定行为的，由（）予以警告，责令改正。","options":{"A":"省级人民政府","B":"省级人民政府司法行政部门","C":"省级人民法院","D":"省公安厅"},"answer":["B"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十三条。"},{"id":"2_19","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人或者鉴定机构有下列哪一项不属于由省级人民政府司法行政部门给予停止从事司法鉴定业务三个月以上一年以下处罚的情形（）。","options":{"A":"因严重不负责任给当事人合法权益造成重大损失的","B":"提供虚假证明文件或者采取其他欺诈手段，骗取登记的","C":"经人民法院依法通知，拒绝出庭作证的","D":"鉴定人故意作虚假鉴定，构成犯罪的"},"answer":["D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十三条。"},{"id":"2_20","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"确定鉴定人和鉴定机构进行登记、名册编制和公告的具体办法，由（ ）。","options":{"A":"国务院司法行政部门制定，报国务院批准","B":"国务院法制办制定，报国务院批准","C":"国务院成立临时工作组，报国务院批准","D":"国务院司法行政部门制定，报国务院法制办批准"},"answer":["A"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十六条。"},{"id":"2_21","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"法医类鉴定，不包括以下哪一项（ ）。","options":{"A":"法医病理鉴定","B":"法医物证鉴定","C":"声像资料鉴定","D":"法医毒物鉴定"},"answer":["C"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十七条。"},{"id":"2_22","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"物证类鉴定，不包括以下哪一项（）。","options":{"A":"文书鉴定","B":"法医物证鉴定","C":"痕迹鉴定","D":"微量鉴定"},"answer":["B"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十七条。"},{"id":"2_23","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下说法不正确的是（ ）。","options":{"A":"司法鉴定是指在诉讼活动中鉴定人运用科学技术或者专门知识对诉讼涉及的专门性问题进行鉴别和判断并提供鉴定意见的活动","B":"国务院司法行政部门主管全国鉴定人和鉴定机构的登记管理工作","C":"省级人民政府司法行政部门依照《全国人大常委会关于司法鉴定管理问题的决定》的规定，负责对鉴定人和鉴定机构的登记、名册编制和公告","D":"具有与所申请从事的司法鉴定业务相关的初级专业技术职称"},"answer":["D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第一、三、四条。"},{"id":"2_24","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下说法正确的是（ ）。","options":{"A":"因故意犯罪或或过失犯罪受过刑事处罚的人员，不得从事司法鉴定业务","B":"受过开除处分的人员，不得从事司法鉴定业务","C":"被撤销鉴定人登记的人员，不得从事司法鉴定业务","D":"具有与所申请从事的司法鉴定业务相关工作十年以上经历，具有较强的专业技能，尚未获得登记的人员，可以从事司法鉴定业务"},"answer":["C"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第四条。"},{"id":"2_25","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下哪些不是法人或者其他组织申请从事司法鉴定业务的必要条件（ ）。","options":{"A":"有明确的业务范围","B":"有在业务范围内进行司法鉴定所必需的仪器、设备","C":"有机构运营的具体章程","D":"每项司法鉴定业务有三名以上鉴定人"},"answer":["C"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第五条。"},{"id":"2_26","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下说法正确的是（ ）。","options":{"A":"人民法院和司法行政部门不得设立鉴定机构","B":"公安机关不得设立鉴定机构","C":"营利法人不得设立鉴定机构","D":"检察机关不得设立鉴定机构"},"answer":["A"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第七条。"},{"id":"2_27","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下说法错误的是（ ）。","options":{"A":"侦查机关根据侦查工作的需要设立的鉴定机构，不得面向社会接受委托从事司法鉴定业务","B":"申请从事司法鉴定业务的个人、法人或者其他组织，由国务院司法行政部门审核，对符合条件的予以登记，编入鉴定人和鉴定机构名册并公告","C":"各鉴定机构之间没有隶属关系；鉴定机构接受委托从事司法鉴定业务，不受地域范围的限制","D":"鉴定机构应当有在业务范围内进行司法鉴定所必需的依法通过计量认证或者实验室认可的检测实验室"},"answer":["B"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第五、六、七、八条。"},{"id":"2_28","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下说法错误的是（ ）。","options":{"A":"鉴定人从事司法鉴定业务，由所在的鉴定机构统一接受委托","B":"司法鉴定实行鉴定人负责制度","C":"任何情况下鉴定机构对鉴定意见不承担责任","D":"多人参加的鉴定，对鉴定意见有不同意见的，应当注明"},"answer":["C"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第九、十条。"},{"id":"2_29","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下有关时间的说法错误的是（ ）。","options":{"A":"具有与所申请从事的司法鉴定业务相关的专业执业资格或者高等院校相关专业本科以上学历，从事相关工作三年以上的，可申请从事司法鉴定业务","B":"具有与所申请从事的司法鉴定业务相关工作十年以上经历，具有较强的专业技能的，可申请从事司法鉴定业务","C":"省级人民政府司法行政部门可以对鉴定人或鉴定机构给予停止从事司法鉴定业务三个月以上一年以下的处罚","D":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》自 2005 年 10"},"answer":["A"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第四、十三、十八条。"},{"id":"2_30","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下案例中，做法正确的是（ ）。","options":{"A":"某 A","B":"某 B","C":"鉴定人某 C","D":"鉴定人某 D,由于目前未在任何鉴定机构从业，遂以个人名义接受了鉴定委托"},"answer":["A"],"ref":"《中华人民共和国民事诉讼法》第七十六条，《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第九条。"},{"id":"2_31","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下说法错误的是（ ）。","options":{"A":"在诉讼中，当事人对鉴定意见有异议的，经人民法院依法通知，鉴定人应当出庭作证","B":"鉴定人和鉴定机构从事司法鉴定业务，应当遵守法律、法规，遵守职业道德和职业纪律，尊重科学，遵守技术操作规范","C":"鉴定人或者鉴定机构有违反《全国人大常委会关于司法鉴定管理问题的决定》规定行为的，由省级人民政府司法行政部门予以警告，责令改正","D":"鉴定人故意作虚假鉴定的，依法追究行政责任"},"answer":["D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十一、十二、十三条。"},{"id":"2_32","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下不属于声像资料鉴定目的的是（ ）。","options":{"A":"录音带是否经过剪切","B":"录像带记录的声音与光盘记录的是否属于同一人","C":"图片信息是否经过修改","D":"光盘上的划痕是否经过掩饰"},"answer":["D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十七条。"},{"id":"2_33","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"出现以下情形，不得为鉴定人或鉴定机构注册登记的有（ ）。","options":{"A":"业务范围仅法医临床学一项","B":"进行司法鉴定所必需的仪器、设备价格高于市场价","C":"业务范围内进行司法鉴定所必需的实验室尚未进行计量认证或者实验室认可","D":"每项司法鉴定业务有五名鉴定人"},"answer":["C"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第五条。"},{"id":"2_34","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下说法错误的是（ ）。","options":{"A":"司法行政部门在鉴定人和鉴定机构的登记管理工作中，应当严格依法办事，积极推进司法鉴定的规范化、法制化","B":"对于滥用职权、玩忽职守，造成严重后果的直接责任人员，可以追究相应的法律责任","C":"司法鉴定的收费项目和收费标准由国务院司法行政部门商国务院价格主管部门确定","D":"对鉴定人和鉴定机构进行登记、名册编制和公告的具体办法，由国务院司法行政部门制定，报国务院批准"},"answer":["B"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十四、十五、十六条。"},{"id":"2_35","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法行政部门在鉴定人和鉴定机构的登记管理工作中，应当严格依法办事。对于滥用职权、玩忽职守，造成严重后果的直接责任人员（）。","options":{"A":"可以追究相应的法律责任","B":"应当追究相应的法律责任","C":"应当追究刑事责任","D":"可以追究刑事责任"},"answer":["B"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十四、十五、十六条。"},{"id":"2_36","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"具有与所申请从事的司法鉴定业务相关的（）专业技术职称的人员，可以申请登记从事司法鉴定业务。","options":{"A":"无","B":"初级","C":"中级","D":"高级"},"answer":["D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第四条。"},{"id":"2_37","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定机构接受委托从事司法鉴定业务，不受（ ）的限制。","options":{"A":"鉴定业务范围","B":"鉴定人资格","C":"地域范围","D":"当事人选择鉴定机构的意见"},"answer":["C"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第八条。"},{"id":"2_38","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"法人或者其他组织申请从事司法鉴定业务，每项司法鉴定业务应有（）以上鉴定人。","options":{"A":"一名","B":"两名","C":"三名","D":"四名"},"answer":["C"],"ref":"第五条。"},{"id":"2_39","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"申请从事司法鉴定业务的个人、法人或者其他组织，由（）审核，对符合条件的予以登记，编入鉴定人和鉴定机构名册并公告。","options":{"A":"县级人民政府司法行政部门","B":"市级人民政府司法行政部门","C":"省级人民政府司法行政部门","D":"司法部"},"answer":["C"],"ref":"第六条。"},{"id":"2_40","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"（）应当根据鉴定人或者鉴定机构的增加和撤销登记情况，定期更新所编制的鉴定人和鉴定机构名册并公告。","options":{"A":"县级人民政府司法行政部门","B":"市级人民政府司法行政部门","C":"省级人民政府司法行政部门","D":"司法部"},"answer":["C"],"ref":"第六条。"},{"id":"2_41","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人应当在（ ）鉴定机构中从事司法鉴定业务。","options":{"A":"一个","B":"两个","C":"三个","D":"四个"},"answer":["A"],"ref":"第八条。"},{"id":"2_42","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"在诉讼中，需要委托鉴定的，应当委托列入鉴定人名册的鉴定人进行鉴定。鉴定人从事司法鉴定业务，由（）接受委托。","options":{"A":"司法鉴定人直接","B":"所在的鉴定机构统一","C":"司法鉴定人或所在的鉴定机构","D":"司法鉴定人和所在的鉴定机构同时"},"answer":["B"],"ref":"第九条。"},{"id":"2_43","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"经人民法院依法通知，拒绝出庭作证的鉴定人应由省级人民政府司法行政部门给予其停止从事司法鉴定业务（）的处罚，情节严重的，撤销登记。","options":{"A":"一个月以上三个月以下","B":"三个月以上半年以下","C":"六个月以上一年以下","D":"三个月以上一年以下"},"answer":["D"],"ref":"第十三条。"},{"id":"2_44","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"因严重不负责任给当事人合法权益造成重大损失的鉴定人和鉴定机构应由省级人民政府司法行政部门给予其停止从事司法鉴定业务（）的处罚，情节严重的，撤销登记。","options":{"A":"一个月以上三个月以下","B":"三个月以上半年以下","C":"六个月以上一年以下","D":"三个月以上一年以下"},"answer":["D"],"ref":"第十三条。"},{"id":"2_45","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"提供虚假证明文件或者采取其他欺诈手段，骗取登记的鉴定人和鉴定机构应由省级人民政府司法行政部门给予其停止从事司法鉴定业务（）的处罚，情节严重的，撤销登记。","options":{"A":"一个月以上三个月以下","B":"三个月以上半年以下","C":"六个月以上一年以下","D":"三个月以上一年以下"},"answer":["D"],"ref":"第十三条。"},{"id":"2_46","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"国家对从事下列司法鉴定业务的鉴定人和鉴定机构实行登记管理制度（ ）。","options":{"A":"法医类鉴定","B":"物证类鉴定","C":"声像资料鉴定","D":"国务院司法行政部门商最高人民法院、最高人民检察院确定的其他应当对鉴定人和鉴定机构实行登记管理的鉴定事项"},"answer":["A","B","C","D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第二条。"},{"id":"2_47","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"具备下列条件之一的人员，可以申请登记从事司法鉴定业务（ ）。","options":{"A":"具有与所申请从事的司法鉴定业务相关的高级专业技术职称","B":"具有与所申请从事的司法鉴定业务相关的专业执业资格或者高等院校相关专业本科以上学历，从事相关工作五年以上","C":"具有与所申请从事的司法鉴定业务相关的专业执业资格或者高等院校相关专业本科以上学历，从事相关工作三年以上","D":"具有与所申请从事的司法鉴定业务相关工作十年以上经历，具有较强的专业技能"},"answer":["A","B","D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第四条。"},{"id":"2_48","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"法人或者其他组织申请从事司法鉴定业务的，应当具备下列条件（ ）。","options":{"A":"有明确的业务范围","B":"有在业务范围内进行司法鉴定所必需的仪器、设备","C":"有在业务范围内进行司法鉴定所必需的依法通过计量认证或者实验室认可的检测实验室","D":"每项司法鉴定业务有两名以上鉴定人"},"answer":["A","B","C"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第五条。"},{"id":"2_49","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下可以设立司法鉴定机构的是（ ）。","options":{"A":"公安机关","B":"人民检察院","C":"人民法院","D":"司法行政部门"},"answer":["A","B"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第七条。"},{"id":"2_50","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据我相关法律法规规定，以下需要实行回避的人包括（ ）。","options":{"A":"法官","B":"翻译","C":"鉴定人","D":"证人"},"answer":["A","B","C"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第九条，《中华人民共和国民事诉讼法》第四十四条。"},{"id":"2_51","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人或者鉴定机构有下列哪些情形的，由省级人民政府司法行政部门给予停止从事司法鉴定业务三个月以上一年以下的处罚（）。","options":{"A":"因严重不负责任给当事人合法权益造成重大损失的","B":"提供虚假证明文件或者采取其他欺诈手段，骗取登记的","C":"经人民法院依法通知，拒绝出庭作证的","D":"鉴定人故意作虚假鉴定，构成犯罪的"},"answer":["A","B","C"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十三条。"},{"id":"2_52","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于确定鉴定人和鉴定机构进行登记、名册编制和公告的具体办法 ，说法错误的有（ ）。","options":{"A":"国务院司法行政部门制定，报国务院批准","B":"国务院法制办制定，报国务院批准","C":"国务院成立临时工作组，报国务院批准","D":"国务院司法行政部门制定，报国务院法制办批准"},"answer":["B","C","D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十六条。"},{"id":"2_53","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下说法正确的有（）。","options":{"A":"鉴定人因严重不负责任给当事人合法权益造成重大损失的，由省级人民政府司法行政部门给予停止从事司法鉴定业务三个月以上一年以下的处罚，情节严重的，撤销登记","B":"鉴定人故意作虚假鉴定，构成犯罪的，依法追究刑事责任，尚不构成犯罪的，依照《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》规定处罚","C":"声像资料鉴定，包括对录音带、录像带、磁盘、光盘、图片等载体上记录的声音、图像信息的真实性、完整性及其所反映的情况过程进行的鉴定和对记录的","D":"司法行政部门在鉴定人和鉴定机构的登记管理工作中，应当严格依法办事，积极推进司法鉴定的规范化、法制化"},"answer":["A","B","C","D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十三、十四、十七条。"},{"id":"2_54","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下说法错误的是（ ）。","options":{"A":"人民法院和司法行政部门不得设立鉴定机构","B":"公安机关不得设立鉴定机构","C":"营利法人不得设立鉴定机构","D":"检察机关不得设立鉴定机构"},"answer":["B","C","D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第七条。"},{"id":"2_55","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下说法正确的是（ ）。","options":{"A":"鉴定人从事司法鉴定业务，由所在的鉴定机构统一接受委托","B":"司法鉴定实行鉴定人负责制度","C":"任何情况下鉴定机构对鉴定意见不承担责任","D":"多人参加的鉴定，对鉴定意见有不同意见的，应当注明"},"answer":["A","B","D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第九、十条。"},{"id":"2_56","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"法医类鉴定，包括以下哪一项（ ）。","options":{"A":"法医病理鉴定","B":"法医物证鉴定","C":"法医临床鉴定","D":"法医毒物鉴定"},"answer":["A","B","C","D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十七条。"},{"id":"2_57","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"物证类鉴定，包括以下哪一项（ ）。","options":{"A":"文书鉴定","B":"法医物证鉴定","C":"痕迹鉴定","D":"微量鉴定"},"answer":["A","C","D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十七条。"},{"id":"2_58","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下说法正确的有（ ）。","options":{"A":"具有与所申请从事的司法鉴定业务相关的专业执业资格或者高等院校相关专业本科以上学历，从事相关工作三年以上的，可申请从事司法鉴定业务","B":"具有与所申请从事的司法鉴定业务相关工作十年以上经历，具有较强的专业技能的，可申请从事司法鉴定业务","C":"省级人民政府司法行政部门可以对鉴定人或鉴定机构给予停止从事司法鉴定业务三个月以上一年以下的处罚","D":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》自 2005 年 10"},"answer":["B","C","D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第四、十三、十八条。"},{"id":"2_59","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下说法正确的是（ ）。","options":{"A":"在诉讼中，当事人对鉴定意见有异议的，经人民法院依法通知，鉴定人应当出庭作证","B":"鉴定人和鉴定机构从事司法鉴定业务，应当遵守法律、法规，遵守职业道德和职业纪律，尊重科学，遵守技术操作规范","C":"鉴定人或者鉴定机构有违反《全国人大常委会关于司法鉴定管理问题的决定》规定行为的，由省级人民政府司法行政部门予以警告，责令改正","D":"鉴定人故意作虚假鉴定的，依法追究行政责任"},"answer":["A","B","C"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十一、十二、十三条。"},{"id":"2_60","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"出现以下情形，不得为鉴定机构注册登记的有（ ）。","options":{"A":"业务范围仅法医临床学一项","B":"进行司法鉴定所必需的仪器、设备不足","C":"业务范围内进行司法鉴定所必需的实验室尚未进行计量认证或者实验室认可","D":"每项司法鉴定业务有五名鉴定人"},"answer":["B","C"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第五条。"},{"id":"2_61","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下说法正确的是（ ）。","options":{"A":"司法行政部门在鉴定人和鉴定机构的登记管理工作中，应当严格依法办事，积极推进司法鉴定的规范化、法制化","B":"对于滥用职权、玩忽职守，造成严重后果的直接责任人员，应当追究相应的法律责任","C":"司法鉴定的收费项目和收费标准由国务院司法行政部门商省级人民政府部门确定","D":"对鉴定人和鉴定机构进行登记、名册编制和公告的具体办法，由国务院司法行政部门制定，报国务院批准"},"answer":["A","B","D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十四、十五、十六条。"},{"id":"2_64","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定机构接受委托从事司法鉴定业务，受（ ）的限制。","options":{"A":"鉴定业务范围","B":"鉴定人资格","C":"地域范围","D":"当事人选择鉴定机构的意见"},"answer":["A","B","D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第八条。"},{"id":"2_65","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"省级人民政府司法行政部门的职责包括以下哪些（ ）。","options":{"A":"定期更新鉴定人和鉴定机构名册","B":"定期对鉴定机构业务能力进行考核","C":"对违反法律规定骗取鉴定人资质的人员予以处罚","D":"定期抽查鉴定机构受理鉴定案件的程序合法性"},"answer":["A","C"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第六、十三条。"},{"id":"2_66","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于侦查机关设立的鉴定机构，以下说法正确的是（ ）。","options":{"A":"从事每项鉴定业务的鉴定人可不足三人","B":"不得面向社会接受委托从事司法鉴定业务","C":"其鉴定人身份为侦查机关工作人员","D":"受上级鉴定机构的领导和管理"},"answer":["B","C"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第七条。"},{"id":"2_67","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"具有与所申请从事的司法鉴定业务相关的专业执业资格或者高等院校相关专业（）学历，从事相关工作五年以上，可申请登记从事司法鉴定业务。","options":{"A":"大专","B":"本科","C":"硕士","D":"博士"},"answer":["B","C","D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第四条。"},{"id":"2_68","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据我相关法律法规规定，以下需要实行回避的人包括（ ）。","options":{"A":"法官","B":"书记员","C":"鉴定人","D":"勘验人"},"answer":["A","B","C","D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第九条，《中华人民共和国民事诉讼法》第四十四条。"},{"id":"2_70","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"不可以成为鉴定人在两个或以上鉴定机构中从事司法鉴定业务原因的有 （ ）。","options":{"A":"经鉴定人与鉴定机构协商并签订书面协议","B":"经当地司法行政部门书面同意","C":"经委托单位或个人书面同意","D":"经委托单位与鉴定构协商并签订书面协议"},"answer":["A","B","C","D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第八条。"},{"id":"2_71","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"国家对从事下列司法鉴定业务的鉴定人和鉴定机构实行登记管理制度（ ）。","options":{"A":"法医类鉴定","B":"物证类鉴定","C":"声像资料鉴定","D":"根据诉讼需要由国务院司法行政部门商最高人民法院、最高人民检察院确定的其他应当对鉴定人和鉴定机构实行登记管理的鉴定事项"},"answer":["A","B","C","D"],"ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第二条。"},{"id":"2_79","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"申请登记从事司法鉴定业务的人员应具备的条件包括（ ）","options":{"A":"具有与所申请从事的司法鉴定业务相关的高级专业技术职称","B":"具有与所申请从事的司法鉴定业务相关的中级专业技术职称","C":"具有与所申请从事的司法鉴定业务相关的专业执业资格或者高等院校相关专业专科以上学历，从事相关工作五年以上","D":"具有与所申请从事的司法鉴定业务相关工作十年以上经历，具有较强的专业技能"},"answer":["A","D"],"ref":"第四条。B 为高级，C 为本科。"},{"id":"2_80","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"下列哪些人员不得从事司法鉴定业务（ ）","options":{"A":"因故意犯罪受过刑事处罚的人员","B":"受过开除公职处分的人员","C":"被撤销鉴定人登记的人员","D":"因过失犯罪受过刑事处罚的人员"},"answer":["A","B","C"],"ref":"第四条。D 为职务过失。"},{"id":"2_81","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"申请从事司法鉴定业务的法人或其他组织应当具备的条件包括（ ）。","options":{"A":"有明确的业务范围","B":"有在业务范围内进行司法鉴定所必需的仪器、设备","C":"有在业务范围内进行司法鉴定所必需的依法通过计量认证或者实验室认可的检测实验室","D":"每项司法鉴定业务有两名以上鉴定人"},"answer":["A","B","C"],"ref":"第五条。D 为三名。"},{"id":"2_82","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》，不得设立鉴定机构的有（）。","options":{"A":"公安机关","B":"人民检察院","C":"人民法院","D":"司法行政部门"},"answer":["C","D"],"ref":"第七条。"},{"id":"2_83","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人或者鉴定机构违反下列哪些情形，由省级人民政府司法行政部门给予停止从事司法鉴定业务三个月以上一年以下的处罚；情节严重的，撤销登记 （ ）。","options":{"A":"因严重不负责任给当事人合法权益造成重大损失的","B":"提供虚假证明文件或者采取其他欺诈手段，骗取登记的","C":"按照法律规律应该回避而未回避的","D":"经当事人依法申请，拒绝出庭作证的"},"answer":["A","B"],"ref":"第十三条。D 应为经人民法院依法通知。"},{"id":"2_84","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人或者鉴定机构违反下列哪些情形，由省级人民政府司法行政部门给予停止从事司法鉴定业务三个月以上一年以下的处罚；情节严重的，撤销登记 （ ）。","options":{"A":"提供虚假证明文件或者采取其他欺诈手段，骗取登记的","B":"因不负责任给当事人合法权益造成损失的","C":"鉴定人故意作虚假鉴定的","D":"经人民法院依法通知，拒绝出庭作证的"},"answer":["A","D"],"ref":"第十三条。B 应为严重不负责任，C 应为如果构成犯罪的，依法追究刑事责任。"},{"id":"2_85","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》，物证类鉴定包括（）。","options":{"A":"毒物鉴定","B":"文书鉴定","C":"痕迹鉴定","D":"微量鉴定"},"answer":["B","C","D"],"ref":"第十七条。A 为法医类鉴定。"},{"id":"2_86","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》，法医类鉴定包括（）。","options":{"A":"法医病理鉴定","B":"法医临床鉴定","C":"法医精神病鉴定","D":"法医物证鉴定"},"answer":["A","B","C","D"],"ref":"第十七条。"},{"id":"2_96","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"在诉讼中，当事人对鉴定意见有异议的，经鉴定机构依法通知，鉴定人应当出庭作证。","answer":"×","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十一条。经人民法院依法通知。"},{"id":"2_97","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法行政部门在鉴定人和鉴定机构的登记管理工作中，应当严格依法办事，积极推进司法鉴定的规范化、法制化。对于滥用职权、玩忽职守，造成严重后果的直接责任人员，应当追究相应的法律责任。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十四条。"},{"id":"2_98","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"对鉴定人和鉴定机构进行登记、名册编制和公告的具体办法，由国务院司法行政部门制定，报国务院批准。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十六条。"},{"id":"2_99","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"法人或者其他组织申请从事司法鉴定业务的，每项司法鉴定业务应当有两名以上鉴定人。","answer":"×","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第五条。"},{"id":"2_100","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"省级人民政府司法行政部门应当根据鉴定人或者鉴定机构的增加和撤销登记情况，定期更新所编制的鉴定人和鉴定机构名册并公告。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第六条。"},{"id":"2_101","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"侦查机关根据侦查工作的需要设立的鉴定机构，可以面向社会接受委托从事司法鉴定业务。","answer":"×","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第七条。"},{"id":"2_102","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"各鉴定机构之间没有隶属关系。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第八条。"},{"id":"2_103","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定机构接受委托从事司法鉴定业务，不受地域范围的限制。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第八条。"},{"id":"2_104","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定机构接受委托从事司法鉴定业务，仅限于该鉴定机构注册地当地业务。","answer":"×","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第八条。"},{"id":"2_105","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"与鉴定机构协商并取得书面协议后，鉴定人可以在两个或以上鉴定机构中从事司法鉴定业务。","answer":"×","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第八条。"},{"id":"2_106","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人应当在一个鉴定机构中从事司法鉴定业务。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第八条。"},{"id":"2_107","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"在诉讼中，对鉴定事项发生争议，需要鉴定的，应当委托列入鉴定人名册的 司法鉴定业务。 中从事司法鉴定业务。 鉴定人进行鉴定。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第九条。"},{"id":"2_108","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人从事司法鉴定业务，由所在的鉴定机构统一接受委托。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第九条。"},{"id":"2_109","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"多人参加的鉴定，对鉴定意见有不同意见的，应当注明。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十条。"},{"id":"2_110","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"多人参加的鉴定，对鉴定意见有不同意见的，应当以多数意见为准。","answer":"×","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十条。"},{"id":"2_111","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人应当独立进行鉴定，对鉴定意见负责并在鉴定书上签名。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十条。"},{"id":"2_112","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定实行鉴定人负责制度，因此鉴定意见只需鉴定人签名或盖章，不需鉴定机构盖章。","answer":"×","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十条。"},{"id":"2_113","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"在诉讼中，当事人对鉴定意见有异议的，经人民法院通知，鉴定人应当出庭作证。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十一条。"},{"id":"2_114","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人和鉴定机构从事司法鉴定业务，应当遵守法律、法规，遵守职业道德和职业纪律，尊重科学，遵守技术操作规范。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十二条。"},{"id":"2_115","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人或者鉴定提供虚假证明文件或者采取其他欺诈手段，骗取登记的，由省级人民政府司法行政部门给予停止从事司法鉴定业务一年以上三年以下的处罚。","answer":"×","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十三条,三个月以上一年以下的处罚。"},{"id":"2_116","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人经人民法院依法通知，拒绝出庭作证，情节严重的，由国务院司法行政部门予以撤销登记。","answer":"×","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十三条，由省级人民政府司法行政部门。"},{"id":"2_117","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"在鉴定人和鉴定机构的登记管理工作中，由于滥用职权、玩忽职守，造成严重后果的司法部门直接责任人员，应当追究相应的法律责任。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十四条。"},{"id":"2_118","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"对鉴定人和鉴定机构进行登记、名册编制和公告的具体办法，由国务院司法行政部门制定，报国务院批准。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十六条。"},{"id":"2_119","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"经人民法院依法通知，鉴定人拒绝出庭作证的，由省级人民政府司法行政部门给予停止从事司法鉴定业务三个月以上一年以下的处罚；情节严重的，撤销登记。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十三条。"},{"id":"2_120","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"法医类鉴定，包括法医病理鉴定、法医临床鉴定、法医精神病鉴定、法医物证鉴定和法医毒物鉴定。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十七条。"},{"id":"2_121","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"物证类鉴定，包括文书鉴定、痕迹鉴定和微量鉴定。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十七条。"},{"id":"2_122","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"物证类鉴定，包括法医物证鉴定、文书鉴定、痕迹鉴定和微量鉴定。","answer":"×","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十七条。"},{"id":"2_123","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"声像资料鉴定，包括对录音带、录像带、磁盘、光盘、图片等载体上记录的声音、图像信息的真实性、完整性及其所反映的情况过程进行的鉴定和对记录的 声音、图像中的语言、人体、物体作出种类或者同一认定。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十七条。"},{"id":"2_124","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人从事司法鉴定业务，在特殊情况下，可以个人名义接受委托。","answer":"×","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第九条。"},{"id":"2_125","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"侦查机关根据侦查工作的需要设立的鉴定机构，不得面向社会接受委托从事司法鉴定业务。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第七条。"},{"id":"2_126","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"多人参加的鉴定，对鉴定意见有不同意见的，应当以第一鉴定人的意见为准。","answer":"×","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十条。"},{"id":"2_127","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"因故意犯罪受过刑事处罚的，受过开除公职处分的，以及被撤销鉴定人登记的人员，不得从事司法鉴定业务。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第四条。"},{"id":"2_128","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"国务院司法行政部门应当根据鉴定人或者鉴定机构的增加和撤销登记情况，定期更新所编制的鉴定人和鉴定机构名册并公告。","answer":"×","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第六条。"},{"id":"2_129","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"在诉讼中，经人民法院通知，非因不可抗力，鉴定人应当出庭作证。","answer":"√","ref":"《全国人民代表大会常务委员会关于司法鉴定管理问题的决定》第十一条。"},{"id":"2_130","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"具有与所申请从事的司法鉴定业务相关的专业执业资格或者高等院校相关专业本科以上学历，从事相关工作五年以上的人员可以申请登记从事司法鉴定业务。","answer":"√","ref":"第四条。"},{"id":"2_131","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"具有与所申请从事的司法鉴定业务相关工作五年以上经历，具有较强的专业技能的人员可以申请登记从事司法鉴定业务。","answer":"×","ref":"第四条。十年。"},{"id":"2_132","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"因故意犯罪或者过失犯罪受过刑事处罚的，不得从事司法鉴定业务。","answer":"×","ref":"第四条，职务过失。"},{"id":"2_133","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"受过开除公职处分的人员不得从事司法鉴定业务。","answer":"√","ref":"第四条。"},{"id":"2_134","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"被撤销鉴定人登记的人员不得从事司法鉴定业务。","answer":"√","ref":"第四条。"},{"id":"2_135","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"受过严重警告处分的人员不得从事司法鉴定业务。","answer":"×","ref":"第四条。"},{"id":"2_136","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"申请从事司法鉴定业务的个人、法人或者其他组织，由市级人民政府司法行政部门审核，对符合条件的予以登记，编入鉴定人和鉴定机构名册并公告。","answer":"×","ref":"第六条，省级。"},{"id":"2_137","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"省级人民政府司法行政部门应当根据鉴定人或者鉴定机构的增加和撤销登记情况，定期更新所编制的鉴定人和鉴定机构名册并公告。","answer":"√","ref":"第六条。"},{"id":"2_138","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"侦查机关根据侦查工作的需要设立的鉴定机构，可以面向社会接受委托从事司法鉴定业务。","answer":"×","ref":"第七条。不得面向。"},{"id":"2_139","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"各鉴定机构之间没有隶属关系。","answer":"√","ref":"第八条。"},{"id":"2_140","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定机构接受委托从事司法鉴定业务，受到地域范围的限制。","answer":"×","ref":"第八条。不受地域限制。"},{"id":"2_141","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人最多只能在两个鉴定机构中从事司法鉴定业务。","answer":"×","ref":"第八条。应当在一个鉴定机构从事司法鉴定业务。"},{"id":"2_142","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人从事司法鉴定业务，由所在的鉴定机构统一接受委托。","answer":"√","ref":"第八条。"},{"id":"2_143","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人故意作虚假鉴定的，由省级人民政府司法行政部门给予停止从事司法鉴定业务三个月以上一年以下的处罚；情节严重的，撤销登记。","answer":"×","ref":"第十三条。构成犯罪的，依法追究刑事责任。"},{"id":"2_144","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定的收费项目和收费标准由国务院司法行政部门商国务院价格主管部门确定。 新刑事诉讼法及司法解释试题库","answer":"√","ref":"第十五条。"},{"id":"2_145","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"《刑事诉讼法》关于回避的规定，不适用于下列（ ）人员。","options":{"A":"证人","B":"审判人员","C":"检察人员","D":"鉴定人"},"answer":["A"],"ref":"刑事诉讼法第二十八条。"},{"id":"2_146","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，下列（ ）不是证据。","options":{"A":"被害人陈述","B":"视听资料","C":"专家辅助人意见","D":"鉴定意见"},"answer":["C"],"ref":"刑事诉讼法第四十八条。"},{"id":"2_147","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《刑事诉讼法》规定，为了查明案情，需要解决案件中某些专门性问题的时候，应当指派、聘请下列（）进行鉴定。","options":{"A":"侦查机关的人","B":"有法律知识的人","C":"有专门知识的人","D":"公安机关的人"},"answer":["C"],"ref":"刑事诉讼法第一百四十四条。"},{"id":"2_148","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》规定，下列（）在诉讼中作证，本人或者其近亲属的人身安全面临危险的，不可以向人民法院、人民检察院、公安机关请求予以保护。","options":{"A":"证人及其近亲属","B":"鉴定人及其近亲属","C":"被害人及其近亲属","D":"侦查人员及其近亲属"},"answer":["D"],"ref":"刑事诉讼法第六十二条。"},{"id":"2_149","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，鉴定人因在诉讼中作证，本人或者其近亲属的人身安全面临危险的，人民法院、人民检察院和公安机关不可以采取（）保护措施。","options":{"A":"不公开真实姓名、住址和工作单位等个人信息","B":"采取不暴露外貌、真实声音等出庭作证措施","C":"禁止特定的人员接触鉴定人及其近亲属","D":"公安机关对鉴定人及其近亲属监视居住"},"answer":["D"],"ref":"刑事诉讼法第六十二条。"},{"id":"2_150","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，鉴定人认为因在诉讼中作证，本人或者其近亲属的人身安全面临危险的，可以向下列机关请求予以保护，其中错误的是 （ ）。","options":{"A":"人民法院","B":"人民检察院","C":"公安机关","D":"鉴定机构"},"answer":["D"],"ref":"刑事诉讼法第六十二条。"},{"id":"2_151","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》规定，鉴定人进行鉴定后，应当写出（），并且签名。","options":{"A":"鉴定结论","B":"专家结论","C":"鉴定意见","D":"专家意见"},"answer":["C"],"ref":"刑事诉讼法第一百四十五条。"},{"id":"2_152","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》规定，（）应当将用作证据的鉴定意见告知犯罪嫌疑人、被害人。","options":{"A":"人民法院","B":"人民检察院","C":"公安机关","D":"侦查机关"},"answer":["D"],"ref":"刑事诉讼法第一百四十六条。"},{"id":"2_153","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》规定，对于用作证据的鉴定意见，如果犯罪嫌疑人、被害人提出申请，可以（）。","options":{"A":"补充鉴定或者重新鉴定","B":"再次鉴定","C":"补充鉴定或二次鉴定","D":"自行鉴定"},"answer":["A"],"ref":"刑事诉讼法第一百四十六条。"},{"id":"2_154","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"对犯罪嫌疑人作精神病鉴定的期间（ ）计入办案期限。","options":{"A":"必要时","B":"可以不","C":"应当不","D":"经办案机关批准"},"answer":["C"],"ref":"刑事诉讼法第一百四十七条。"},{"id":"2_155","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"公诉人、当事人或者辩护人、诉讼代理人对鉴定意见有异议，人民法院认为鉴定人有必要出庭的，鉴定人（）出庭作证。","options":{"A":"应当","B":"经人民检察院批准","C":"可以","D":"经鉴定机构同意"},"answer":["A"],"ref":"刑事诉讼法第一百八十七条。"},{"id":"2_156","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"公诉人、当事人或者辩护人、诉讼代理人对鉴定意见有异议，在下列哪种情况下鉴定人应当出庭作证（）。","options":{"A":"人民检察院认为鉴定人有必要出庭的","B":"人民法院认为鉴定人有必要出庭的","C":"公安机关认为鉴定人有必要出庭的","D":"律师认为鉴定人有必要出庭的"},"answer":["B"],"ref":"刑事诉讼法第一百八十七条。"},{"id":"2_157","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》规定，人民法院认为鉴定人有必要出庭的，鉴 定人拒不出庭作证的，关于鉴定意见下列哪项目说法正确（ ）。","options":{"A":"可以作为定案的根据","B":"不得作为定案的根据","C":"经鉴定机构书面说明可以作为定案根据","D":"经侦查机关同意可以作为定案根据"},"answer":["B"],"ref":"刑事诉讼法第一百八十七条。"},{"id":"2_158","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，下列哪些人员可以自行询问鉴定人（）。","options":{"A":"公诉人","B":"当事人和辩护人","C":"诉讼代理人","D":"审判人员"},"answer":["D"],"ref":"刑事诉讼法第一百八十九条。"},{"id":"2_159","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，公诉人、当事人和辩护人、诉讼代理人在什么情况下可以对鉴定人发问（）。","options":{"A":"经鉴定人同意","B":"经鉴定机构同意","C":"经审判长许可","D":"经侦查机关同意"},"answer":["C"],"ref":"刑事诉讼法第一百八十九条。"},{"id":"2_161","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，公诉人、当事人和辩护人、诉讼代理人可以申请法庭通知有专门知识的人出庭，有专门知识的人出庭，适用（）有关规定。","options":{"A":"专家辅助人","B":"侦查人员","C":"鉴定人","D":"勘验人员"},"answer":["C"],"ref":"刑事诉讼法第一百九十一条。"},{"id":"2_162","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"下列哪种说法是错误的（ ）。","options":{"A":"鉴定人进行鉴定后，应当写出鉴定意见","B":"鉴定人故意作虚假鉴定的，应当承担法律责任","C":"对犯罪嫌疑人作精神病鉴定的期间计入办案期限","D":"经人民法院通知，鉴定人拒不出庭作证的，鉴定意见不得作为定案的根据。"},"answer":["C"],"ref":"刑事诉讼法第一百四十四条、一百四十五条。"},{"id":"2_163","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，为了查明案情，需要解决案件中某些 专门性问题的时候，应当指派、聘请有专门知识的人进行（ ）。","options":{"A":"鉴定","B":"勘验","C":"侦查","D":"检查"},"answer":["A"],"ref":"刑事诉讼法第一百四十四条。"},{"id":"2_164","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据新《刑事诉讼法》第一百四十四条的规定，为了查明案情，需要解决案件中某些专门性问题的时候，应当指派、聘请（）进行鉴定。","options":{"A":"具备高级专业技术职称的人员","B":"具备中级专业技术职称的人员","C":"专家、教授","D":"有专门知识的人"},"answer":["D"],"ref":"新刑事诉讼法第一百四十四条，有专门知识的人。"},{"id":"2_165","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据新《刑事诉讼法》第一百九十八条的规定，在法庭审判过程中，遇有需要重新鉴定的情形，影响审判进行的，可以（）","options":{"A":"终止审理","B":"延期审理","C":"中止审理","D":"继续审理"},"answer":["B"],"ref":"新刑事诉讼法第一百九十八条。"},{"id":"2_167","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，下列哪些说法是正确的（ ）。","options":{"A":"可以用于证明案件事实的材料，都是证据","B":"证据必须经过查证属实，才能作为定案的根据","C":"鉴定意见是证据的一种","D":"犯罪嫌疑人、被告人供述和辩解不属于证据"},"answer":["A","B","C"],"ref":"刑事诉讼法第四十八条。"},{"id":"2_168","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，对于危害国家安全犯罪、恐怖活动犯罪、黑社会性质的组织犯罪、毒品犯罪等案件，鉴定人因在诉讼中作证，本人或者其近亲属的人身安全面临危险的，人民法院、人民检察院和公安机关应当采取的保护措施包括（）。","options":{"A":"不公开真实姓名、住址和工作单位等个人信息","B":"采取不暴露外貌、真实声音等出庭作证措施","C":"禁止特定的人员接触鉴定人及其近亲属","D":"对人身和住宅采取专门性保护措施"},"answer":["A","B","C","D"],"ref":"刑事诉讼法第六十二条第一款。"},{"id":"2_169","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，下列哪些人员认为在诉讼中作证，本人或者其近亲属的人身安全面临危险的，可以向人民法院、人民检察院、公安机关请求予以保护（）。","options":{"A":"证人","B":"翻译人员","C":"鉴定人","D":"被害人"},"answer":["A","C","D"],"ref":"刑事诉讼法第六十二条。"},{"id":"2_171","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，为了查明案情，需要解决案件中某些专门性问题的时候，应当（）有专门知识的人进行鉴定。","options":{"A":"选择","B":"指派","C":"聘请","D":"派遣"},"answer":["B","C"],"ref":"刑事诉讼法第一百四十四条。"},{"id":"2_173","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，鉴定人进行鉴定后，应当（ ）。","options":{"A":"写出鉴定意见","B":"写出鉴定结论","C":"签名","D":"盖章"},"answer":["A","C"],"ref":"刑事诉讼法第一百四十五条。"},{"id":"2_174","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，如果犯罪嫌疑人、被害人对用作证据的 鉴定意见有意见，犯罪嫌疑人、被害人提出申请，可以（ ）。","options":{"A":"补充鉴定","B":"申诉","C":"二次鉴定","D":"重新鉴定"},"answer":["A","D"],"ref":"刑事诉讼法第一百四十六条。"},{"id":"2_176","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，关于鉴定人出庭，下列哪些说法正确 （ ）。","options":{"A":"人民法院认为鉴定人有必要出庭的，鉴定人应当出庭作证","B":"人民检察院认为鉴定人有必要出庭的，鉴定人应当出庭作证","C":"鉴定人拒不出庭作证的，鉴定意见不得作为定案的根据","D":"鉴定人拒不出庭作证的，鉴定机构需要出具相关证明"},"answer":["A","B","C"],"ref":"刑事诉讼法第一百八十七条。"},{"id":"2_177","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"在庭审中，下列哪些人经审判长许可，可以对鉴定人发问（ ）。","options":{"A":"公诉人","B":"当事人和辩护人","C":"法定代理人","D":"诉讼代理人"},"answer":["A","B","D"],"ref":"刑事诉讼法第一百八十九条。"},{"id":"2_178","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，法庭审理过程中，关于鉴定人，下列哪些选项正确（）。","options":{"A":"公诉人、当事人和辩护人、诉讼代理人经鉴定人同意，可以对证人、鉴定人发问","B":"公诉人、当事人和辩护人、诉讼代理人经审判长许可，可以对证人、鉴定人发问","C":"审判人员可以询问鉴定人","D":"审判人员应当询问鉴定人"},"answer":["B","C"],"ref":"刑事诉讼法第一百八十九条。"},{"id":"2_179","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》，关于鉴定制度下列哪些说法正确（ ）。","options":{"A":"对未到庭的鉴定人的鉴定意见，应当当庭宣读","B":"人民法院调查核实证据，可以进行勘验、检查、鉴定","C":"法庭审理过程中，当事人和辩护人、诉讼代理人有权申请申请重新鉴定","D":"对犯罪嫌疑人作精神病鉴定的期间应当计入办案期限"},"answer":["A","B","C"],"ref":"刑事诉讼法第一百四十七条、一百九十一条、一百九十二条。"},{"id":"2_180","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"下列哪些人可以申请法庭通知有专门知识的人出庭，就鉴定人作出的鉴定意见提出意见（）。","options":{"A":"公诉人","B":"当事人和辩护人","C":"律师","D":"诉讼代理人"},"answer":["A","B","D"],"ref":"刑事诉讼法第一百九十一条。"},{"id":"2_181","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，遇到下列哪种情况，可以延期审理（）。","options":{"A":"查明当事人是否到庭，宣布案由","B":"检察人员发现提起公诉的案件需要补充侦查，提出建议的","C":"由于申请回避而不能进行审判的 22 开庭的时候，审判长（ ）。¹⁸⁷","D":"查询、冻结"},"answer":["B","C","D"],"ref":"刑事诉讼法第一百九十八条。"},{"id":"2_189","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，担任过案件的鉴定人，不可以再担任审判人员、检察人员、侦查人员。","answer":"√","ref":"刑事诉讼法第二十八条。"},{"id":"2_190","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"2012 年《刑事诉讼法》关于回避的规定适用于鉴定人。","answer":"√","ref":"刑事诉讼法第三十一条。"},{"id":"2_191","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，鉴定意见为法定证据的种类之一","answer":"√","ref":"刑事诉讼法第四十八条。"},{"id":"2_192","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，证据包括物证、书证、证人证言、专家意见、鉴定意见等。","answer":"×","ref":"刑事诉讼法第第四十八条，专家意见不属于证据。"},{"id":"2_193","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人认为因在诉讼中作证，本人或者其近亲属的人身安全面临危险的，可以向人民法院、人民检察院、公安机关请求予以保护。","answer":"√","ref":"刑事诉讼法第六十二条第二款。"},{"id":"2_194","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人因在诉讼中作证，本人或者其近亲属的人身安全面临危险的，人民法院、人民检察院和公安机关应当采取保护措施。","answer":"×","ref":"刑事诉讼法第第六十二条，对于危害国家安全犯罪、恐怖活动犯罪、黑社会性质的组织犯罪、毒品犯罪等案件，应当保护。"},{"id":"2_195","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，为保护鉴定人，本人或者其近亲属的人身安全面临危险的，可以禁止特定的人员接触鉴定人及其近亲属。","answer":"√","ref":"刑事诉讼法第六十二条。"},{"id":"2_196","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"为了查明案情，需要解决案件中某些专门性问题的时候，应当指派、聘请有专门知识的人进行鉴定","answer":"√","ref":"刑事诉讼法第一百四十四条。"},{"id":"2_197","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人进行鉴定后，应当写出鉴定意见，但不需要签名。","answer":"×","ref":"刑事诉讼法第一百四十五条鉴定人进行鉴定后，应当写出鉴定意见，并且签名。"},{"id":"2_198","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人故意作虚假鉴定的，应当承担法律责任。","answer":"√","ref":"刑事诉讼法第一百四十四条。"},{"id":"2_199","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"侦查机关应当将用作证据的鉴定意见告知犯罪嫌疑人、被害人。","answer":"√","ref":"刑事诉讼法第一百四十六条。"},{"id":"2_201","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"对犯罪嫌疑人作精神病鉴定的期间应计入办案期限","answer":"×","ref":"刑事诉讼法第一百四十七条。"},{"id":"2_202","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"人民法院确定开庭日期后，应当将开庭的时间、地点通知鉴定人，传票和通知书至迟在开庭三日以前送达。","answer":"√","ref":"刑事诉讼法第一百八十二条。"},{"id":"2_203","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》，开庭的时候，宣布合议庭的组成人员、书记员、公诉人、辩护人、诉讼代理人的名单，但不需要宣布鉴定人和翻译人员的名单。","answer":"×","ref":"刑事诉讼法第一百八十五条。"},{"id":"2_204","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》，开庭的时候，当事人有权对鉴定人员申请回避","answer":"√","ref":"刑事诉讼法第第一百八十二条。"},{"id":"2_205","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》规定，人民法院认为鉴定人有必要出庭的，鉴定人拒不出庭作证的，鉴定意见不得作为定案的根据。","answer":"√","ref":"刑事诉讼法第一百八十七条。"},{"id":"2_206","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，当公诉人、当事人或者辩护人、诉讼代理人对鉴定意见有异议时，鉴定人应当出庭作证。","answer":"×","ref":"刑事诉讼法第一百八十七条，人民法院认为鉴定人有必要出庭的，鉴定人应当出庭作证。"},{"id":"2_207","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人故意作虚假鉴定的，应当承担法律责任。","answer":"√","ref":"刑事诉讼法第一百四十五条。"},{"id":"2_208","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"庭审中公诉人、当事人和辩护人、诉讼代理人经鉴定人同意，可以对鉴定人发问。","answer":"×","ref":"刑事诉讼法第一百八十九条，经审判长许可。"},{"id":"2_209","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，在庭审中审判人员可以询问鉴定人。","answer":"√","ref":"刑事诉讼法第一百八十九条。"},{"id":"2_210","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，在庭审中公诉人、当事人和辩护人、诉讼代理人，可以自行对鉴定人询问。","answer":"×","ref":"刑事诉讼法第一百八十九条，审判人员可以询问，其它人员经审判长许可，发问。"},{"id":"2_211","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，公诉人应当当庭宣读未到庭鉴定人的鉴定意见。","answer":"√","ref":"刑事诉讼法第一百九十条。"},{"id":"2_212","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，法庭审理过程中，当事人和辩护人、诉讼代理人有权申请重新鉴定。","answer":"√","ref":"刑事诉讼法第一百九十一条。"},{"id":"2_213","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"公诉人、当事人和辩护人、诉讼代理人可以申请法庭通知有专门知识的人出庭，就鉴定人作出的鉴定意见提出意见。","answer":"√","ref":"刑事诉讼法第一百九十二条。"},{"id":"2_214","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》的规定，公诉人、当事人和辩护人、诉讼代理人可以申请法庭通知有专门知识的人出庭，有关专门知识的人出庭，适用鉴定人的有关规定。","answer":"√","ref":"刑事诉讼法第一百九十二条。"},{"id":"2_215","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"在法庭审判过程中，需要重新鉴定，影响审判进行的，应当延期审理。","answer":"×","ref":"刑事诉讼法第一百九十八条，可以延期审理。"},{"id":"2_216","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"在法庭审判过程中，需要重新鉴定或者勘验的，影响审判进行的，应当中止审理。216 200 ×，刑事诉讼法第第一百四十六条，可以补充鉴定或者重新鉴定 201 ×，刑事诉讼法第一百四十七条。 202 √，刑事诉讼法第一百八十二条。 203 ×，刑事诉讼法第一百八十五条。 204 √，刑事诉讼法第第一百八十二条。 205 √，刑事诉讼法第一百八十七条。 206 ×，刑事诉讼法第一百八十七条，人民法院认为鉴定人有必要出庭的，鉴定人应当出庭作证。 207 √，刑事诉讼法第一百四十五条。 208 ×，刑事诉讼法第一百八十九条，经审判长许可。 209 √，刑事诉讼法第一百八十九条。 210 ×，刑事诉讼法第一百八十九条，审判人员可以询问，其它人员经审判长许可，发问。 211 √，刑事诉讼法第一百九十条。 212 √，刑事诉讼法第一百九十一条。 213 √，刑事诉讼法第一百九十二条。 214 √，刑事诉讼法第一百九十二条。 215 ×，刑事诉讼法第一百九十八条，可以延期审理。","answer":"×","ref":"刑事诉讼法第一百九十八条，可以延期审理。"},{"id":"2_217","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据 2012 年《刑事诉讼法》规定，人民法院认为鉴定人有必要出庭的，鉴定人拒不出庭作证的，鉴定机构对鉴定意见出具证明后才可作为定案的根据。","answer":"×","ref":"刑事诉讼法第一百八十七条。"},{"id":"2_218","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人进行鉴定后，应当写出鉴定意见，并且盖章。","answer":"×","ref":"刑事诉讼法第一百四十五条。"},{"id":"2_219","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"可以用于证明案件的材料，都是证据。","answer":"×","ref":"刑事诉讼法第四十八条。证明案件事实的材料。"},{"id":"2_220","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"证据必须经过查证属实，才能作为定案的根据。","answer":"√","ref":"刑事诉讼法第四十八条。"},{"id":"2_221","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于回避的规定只适用于书记员、翻译人员，不适用于鉴定人。","answer":"×","ref":"刑事诉讼法第三十一条。适用于鉴定人。"},{"id":"2_222","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"“侦查”是指人民法院、公安机关、人民检察院在办理案件过程中，依照法律进行的专门调查工作和有关的强制性措施。","answer":"×","ref":"刑事诉讼法第一百零六条。没有人民法院。"},{"id":"2_223","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"“诉讼参与人”是指当事人、法定代理人、诉讼代理人、辩护人、证人、鉴定人和翻译人员；","answer":"√","ref":"刑事诉讼法第一百零六条。"},{"id":"2_224","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"“诉讼代理人”是指公诉案件的被害人及其法定代理人或者近亲属、自诉案件的自诉人及其法定代理人委托代为参加诉讼的人和附带民事诉讼的当事人及其法定代理人委托代为参加诉讼的人；","answer":"√","ref":"刑事诉讼法第一百零六条。"},{"id":"2_225","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"为了查明案情，需要解决案件中某些专门性问题的时候，应当指派、聘请鉴定人进行鉴定。","answer":"×","ref":"刑事诉讼法第一百四十四条。有专门知识的人"},{"id":"2_226","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人进行鉴定后，应当写出鉴定意见，可不签名。","answer":"×","ref":"刑事诉讼法第一百四十五条。并且签名。"},{"id":"2_227","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"人民法院应当将用作证据的鉴定意见告知犯罪嫌疑人、被害人。","answer":"×","ref":"刑事诉讼法第一百四十六条。侦查机关。"},{"id":"2_228","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"对犯罪嫌疑人作精神病鉴定的期间计入办案期限。","answer":"×","ref":"刑事诉讼法第一百四十七条。不计入。"},{"id":"2_229","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"人民法院认为鉴定人有必要出庭的，鉴定人应当出庭作证。","answer":"√","ref":"刑事诉讼法第一百八十七条。"},{"id":"2_230","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"经人民法院通知，鉴定人拒不出庭作证的，鉴定意见也可作为定案的根据。","answer":"×","ref":"刑事诉讼法第一百八十七条。不得。"},{"id":"2_231","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"公诉人、当事人和辩护人、诉讼代理人经审判长许可，应当对证人、鉴定人发问。","answer":"×","ref":"刑事诉讼法第一百八十九条。可以。"},{"id":"2_232","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"审判人员可以询问证人、鉴定人。","answer":"√","ref":"刑事诉讼法第一百八十九条。"},{"id":"2_233","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"公诉人、辩护人应当向法庭出示物证，让当事人辨认，对未到庭的证人的证言笔录、鉴定人的鉴定意见、勘验笔录和其他作为证据的文书，应当当庭宣读。","answer":"√","ref":"刑事诉讼法第一百九十条。"},{"id":"2_234","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"法庭审理过程中，当事人和辩护人、诉讼代理人无权申请通知新的证人到庭，调取新的物证，申请重新鉴定或者勘验。","answer":"×","ref":"刑事诉讼法第一百九十二条。有权。"},{"id":"2_235","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"公诉人、当事人和辩护人、诉讼代理人可以申请法庭通知鉴定人出庭，就鉴 217 ×，刑事诉讼法第一百八十七条。 218 ×，刑事诉讼法第一百四十五条。 219 ×，刑事诉讼法第四十八条。证明案件事实的材料。 定人作出的鉴定意见提出意见。","answer":"×","ref":"刑事诉讼法第一百九十二条。通知有专门知识的人出庭。"},{"id":"2_237","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人本人或者他的近亲属和本案有利害关系的，可以自行回避。","answer":"×","ref":"新刑事诉讼法第二十八条，应当自行回避，当事人及其法定代理人也有权要求他们回避。"},{"id":"2_239","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"2012 年《刑事诉讼法》修改将作为法定证据种类之一的鉴定结论改为鉴定意见。","answer":"√","ref":"新刑事诉讼法第四十八条。"},{"id":"2_240","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"为了查明案情，需要解决案件中某些专门性问题的时候，应当指派、聘请具备高级专业技术职称的专业人员进行鉴定。","answer":"×","ref":"新刑事诉讼法第一百四十四条，有专门知识的人。"},{"id":"2_243","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"未到庭的鉴定人的鉴定意见不具有证据效力。","answer":"×","ref":"新刑事诉讼法第一百九十条。应当当庭宣读。"},{"id":"2_244","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"在法庭审判过程中，遇有需要重新鉴定的情形，影响审判进行的，可以中止审理。244 新《民事诉讼法》及司法解释试题库","answer":"×","ref":"新刑事诉讼法第一百九十八条。延期审理。"},{"id":"2_248","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"当事人可以就查明事实的（ ）向人民法院申请鉴定。","options":{"A":"科学性问题","B":"专门性问题","C":"理论性问题","D":"技术性问题"},"answer":["B"],"ref":"《民事诉讼法》第七十六条。"},{"id":"2_249","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"当事人申请鉴定的，由（ ）确定具备资格的鉴定人。","options":{"A":"双方当事人协商","B":"人民法院指定","C":"双方当事人和人民法院共同协商指定","D":"先由双方当事人协商确定具备资格的鉴定人；协商不成的，由人民法院指定"},"answer":["D"],"ref":"《民事诉讼法》第七十六条。"},{"id":"2_250","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"当事人未申请鉴定，人民法院对专门性问题认为需要鉴定的，（）委托具备资格的鉴定人进行鉴定。","options":{"A":"可以","B":"应当","C":"必须","D":"应该"},"answer":["B"],"ref":"《民事诉讼法》第七十六条。"},{"id":"2_251","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人有权了解进行鉴定所需要的案件材料，必要时（）询问当事人、证人。","options":{"A":"可以","B":"应当","C":"必须","D":"应该"},"answer":["A"],"ref":"《民事诉讼法》第七十七条。"},{"id":"2_252","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"有下列何种情形时（ ），鉴定人应当出庭作证。","options":{"A":"当事人对鉴定意见有疑惑","B":"当事人对鉴定意见有异议","C":"人民法院对鉴定意见有异议","D":"当事人认为鉴定人有必要出庭的"},"answer":["B"],"ref":"《民事诉讼法》第七十八条。"},{"id":"2_253","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《民事诉讼法》规定，下列说法正确的是（ ）。","options":{"A":"当事人对鉴定意见有疑惑时，鉴定人应当出庭","B":"人民法院对鉴定意见有异议的，鉴定人应当出庭","C":"经人民法院通知，鉴定人拒不出庭作证的，鉴定意见不得作为认定事实的根据","D":"经人民法院通知，鉴定人拒不出庭作证的，鉴定人应当返还鉴定费用"},"answer":["C"],"ref":"《民事诉讼法》第七十八条。"},{"id":"2_257","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于人民法院认定公民无民事行为能力、限制民事行为能力的案件，下列说法错误的是（）。","options":{"A":"人民法院受理申请后，必要时应当对被请求认定为无民事行为能力或者限制民事行为能力的公民进行鉴定","B":"申请人已提供鉴定意见的，应当对鉴定意见进行审查","C":"人民法院受理申请后，应当对被请求认定为无民事行为能力或者限制民事行为能力的公民进行鉴定","D":"申请人提供的鉴定意见，经人民法院审查后才可做为认定公民为无民事行为能力人或者限制民事行为能力人的依据"},"answer":["D"],"ref":"《民事诉讼法》第一百八十八条。"},{"id":"2_258","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据新《民事诉讼法》第四十四条的规定，鉴定人有下列哪种（）情形的，可以不回避。","options":{"A":"是本案当事人或者当事人、诉讼代理人近亲属的","B":"与本案有利害关系的","C":"与本案当事人、诉讼代理人有其他关系，可能影响对案件公正审理的","D":"因鉴定需要会见当事人、诉讼代理人的"},"answer":["D"],"ref":"《民事诉讼法》第四十四条。"},{"id":"2_259","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《民事诉讼法》，下列说法不正确的是（ ）。","options":{"A":"鉴定意见是法定证据的一种","B":"鉴定意见必须经过查证属实，才能作为认定事实的依据","C":"案件当事人可以就查明事实的专门性问题向人民法院申请鉴定","D":"当事人申请鉴定的，由人民法院指定鉴定人"},"answer":["D"],"ref":"《民事诉讼法》第六十三条和第七十六条。"},{"id":"2_260","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《民事诉讼法》，下列说法正确的是（ ）。","options":{"A":"当事人未申请鉴定的，人民法院无权委托鉴定人进行鉴定","B":"鉴定人有权了解进行鉴定所需要的案件材料，必要时可以询问当事人、证人","C":"鉴定人可以提出口头或书面鉴定意见，在鉴定书上应当签名或者盖章","D":"经人民法院通知，鉴定人拒不出庭作证的，鉴定意见不得作为认定事实的根据；已支付的鉴定费用应当返还"},"answer":["B"],"ref":"《民事诉讼法》第七十六条、第七十七条和第七十八条。"},{"id":"2_261","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《民事诉讼法》第一百四十六条的规定，在法庭审理过程中，需要重新鉴定的，可以（）。","options":{"A":"中止审理","B":"终止审理","C":"延期审理","D":"继续审理"},"answer":["C"],"ref":"《民事诉讼法》第一百四十六条。"},{"id":"2_262","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《民事诉讼法》第一百三十八条的规定，法庭调查的顺序为（ ） (a)当事人陈述；(b)告知证人的权利义务，证人作证，宣读未到庭的证人证言； (c)出示书证、物证、视听资料和电子数据；(d)宣读鉴定意见；(e)宣读勘验笔录。","options":{"A":"abcde","B":"abced","C":"abdec","D":"acbde"},"answer":["A"],"ref":"《民事诉讼法》第一百三十八条。"},{"id":"2_263","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《民事诉讼法》的规定，下列说法不正确的是（ ）。","options":{"A":"鉴定人有需要回避情形的，应当自行回避，当事人也可以口头或者书面方式申请他们回避","B":"鉴定人是本案当事人的亲属的，应当自行回避","C":"鉴定人与案件有利害关系的，应当回避","D":"鉴定人接受当事人、诉讼代理人请客送礼的，当事人有权要求其回避"},"answer":["B"],"ref":"《民事诉讼法》第四十四条。"},{"id":"2_264","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《民事诉讼法》第一百三十九条的规定，下列说法正确的是（ ）。","options":{"A":"当事人在法庭上不能提出新的证据","B":"当事人在法庭上可随意向鉴定人发问","C":"当事人要求重新鉴定的，是否准许由人民法院决定","D":"当事人要求重新鉴定的，人民法院应当准许"},"answer":["C"],"ref":"《民事诉讼法》第一百三十九条。"},{"id":"2_265","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人有下列哪些（ ）情形的，应当自行回避。","options":{"A":"鉴定人因鉴定需要会见当事人、诉讼代理人的","B":"鉴定人与当事人、诉讼代理人有其他关系，可能影响案件公正审理的","C":"鉴定人与本案有利害关系","D":"鉴定人是本案当事人的近亲属"},"answer":["B","C","D"],"ref":"《民事诉讼法》第四十四条。"},{"id":"2_266","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"有下列哪些情形时（ ），鉴定人应当出庭作证。","options":{"A":"当事人对鉴定意见有异议","B":"人民法院认为鉴定人有必要出庭的","C":"人民法院对鉴定意见有异议","D":"当事人认为鉴定人有必要出庭的"},"answer":["A","B"],"ref":"《民事诉讼法》第七十八条。"},{"id":"2_267","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《民事诉讼法》的规定，下列说法正确的有（ ）。","options":{"A":"当事人可以就查明事实的专门性问题向人民法院申请鉴定","B":"当事人申请鉴定的，先由当事人协商确定具备资格的鉴定人","C":"协商不成的，再由人民法院指定","D":"当事人未申请鉴定的，人民法院不得委托鉴定人进行鉴定"},"answer":["A","B","C"],"ref":"《民事诉讼法》第七十六条。"},{"id":"2_268","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于鉴定人出庭作证，下列说法不正确的有（ ）。","options":{"A":"当事人对鉴定意见有异议时，鉴定人应当出庭作证","B":"人民法院认为有必要时，鉴定人应当出庭作证","C":"经法院通知，鉴定人拒不出庭作证的，鉴定人要承担相应法律责任，但其出具的鉴定意见仍可作为证据使用","D":"经法院通知，鉴定人拒不出庭作证的，鉴定人应当返还鉴定费用"},"answer":["C","D"],"ref":"《民事诉讼法》第七十八条。"},{"id":"2_269","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于重新鉴定，下列说法正确的有（ ）。","options":{"A":"当事人有权要求重新鉴定","B":"当事人请求重新鉴定的，人民法院决定是否准许","C":"案件审理中重新鉴定的，可以延期开庭审理","D":"对有缺陷的鉴定结论，可以通过补充鉴定、重新质证或者补充质证等方法解决的，不予重新鉴定"},"answer":["A","B","C","D"],"ref":"《民事诉讼法》第一百三十九条和第一百四十六条。"},{"id":"2_270","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"关于人民法院认定公民无民事行为能力、限制行为能力的案件，下列说法错误的有（）。","options":{"A":"人民法院受理申请后，应当对被请求认定为无民事行为能力或者限制民事行为能力的公民进行鉴定","B":"人民法院受理申请后，必要时应当对被请求认定为无民事行为能力或者限制民事行为能力的公民进行鉴定","C":"申请人提供的鉴定意见，经人民法院审查后才可做为认定公民为无民事行为能力人或者限制民事行为能力人的依据。","D":"人民法院受理申请后，申请人已提供鉴定意见的，无需再对鉴定意见进行审查"},"answer":["A","D"],"ref":"《民事诉讼法》第一百八十八条。"},{"id":"2_271","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《民事诉讼法》的规定，下列说法正确的有（ ）。","options":{"A":"鉴定人是案件诉讼代理人亲属的，应当自行回避","B":"鉴定人与案件有利害关系的，应当自行回避","C":"鉴定人有需要回避的情形的，当事人可以口头申请其回避","D":"鉴定人有需要回避的情形的，当事人只能书面申请其回避"},"answer":["B","C"],"ref":"《民事诉讼法》第四十四条。"},{"id":"2_272","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《民事诉讼法》第一百三十九条的规定，下列说法不正确的是（ ）。","options":{"A":"当事人在法庭上可以提出新的证据","B":"当事人向鉴定人发问无需经法庭许可","C":"当事人要求重新鉴定的，人民法院应当准许","D":"当事人要求重新鉴定的，由人民法院决定是否准许"},"answer":["B","C"],"ref":"《民事诉讼法》第一百三十九条。"},{"id":"2_273","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《民事诉讼法》的规定，下列说法正确的是（ ）。 271 BC,《民事诉讼法》第四十四条。","options":{"A":"鉴定人有应当回避情形的，应当自行回避，当事人有权用口头或书面方式申请他们回避","B":"鉴定人所出具的鉴定意见为法定证据的一种","C":"当事人未申请鉴定，人民法院对专门性问题认为需要鉴定的，应当委托具备资格的鉴定人进行鉴定","D":"当事人可以申请人民法院通知有专门知识的人出庭，就鉴定人作出的鉴定意见或者专业问题提出意见"},"answer":["A","B","C","D"],"ref":"《民事诉讼法》第四十四条、第六十三条、第七十六条、第七十九条。"},{"id":"2_274","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《民事诉讼法》的规定，下列说法错误的有（ ）。","options":{"A":"当事人可以就查明事实的专门性问题向人民法院申请鉴定","B":"鉴定人有权了解进行鉴定所需要的案件材料，必要时可以询问当事人、证人","C":"当事人可以申请人民法院通知有专门知识的人出庭，就鉴定人是否应当回避提出意见","D":"单位对鉴定人进行侮辱、诽谤、诬陷、殴打或者打击报复的，人民法院可以对单位予以罚款"},"answer":["C","D"],"ref":"《民事诉讼法》第七十六条、第七十七条、第七十九条、第一百一十一条。"},{"id":"2_275","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"证据包括（ ）。","options":{"A":"当事人的陈述","B":"书证、物证","C":"视听资料；电子数据；证人证言","D":"鉴定意见；勘验笔录"},"answer":["A","B","C","D"],"ref":"《民事诉讼法》第六十三条。"},{"id":"2_276","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"诉讼参与人或者其他人有下列行为之一的，人民法院可以根据情节轻重予以罚款、拘留；构成犯罪的，依法追究刑事责任（）。","options":{"A":"伪造、毁灭证据，妨碍人民法院审理案件的","B":"以暴力、威胁、贿买方法阻止证人作证或者指使、贿买、胁迫他人作伪证的","C":"隐藏、转移、变卖、毁损已被查封、扣押的财产","D":"对司法工作人员、诉讼参与人、证人、翻译人员、鉴定人、勘验人、协助执行的人，进行侮辱诽谤、诬陷、殴打或打击报复的"},"answer":["B","D"],"ref":"《民事诉讼法》第一百一十一条。A 重要证据，C 已被查封、扣押的财产。"},{"id":"2_277","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"可以延期开庭审理的情形包括（ ）。","options":{"A":"必须到庭的当事人和其他诉讼参与人没有到庭的","B":"当事人临时提出回避申请的","C":"需要通知新的证人到庭，调取新的证据，重新鉴定、勘验，或者需要补充调查的","D":"其他应当延期的情形"},"answer":["B","C","D"],"ref":"《民事诉讼法》第一百四十六条。A 有正当理由没有到庭的。"},{"id":"2_278","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人需要回避的，应当自行回避，当事人有权用口头或书面的方式请求其回避。","answer":"√","ref":"《民事诉讼法》第四十四条。"},{"id":"2_279","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人与本案有利害关系的，应当自行回避，当事人也有权请求其回避。","answer":"√","ref":"《民事诉讼法》第四十四条。"},{"id":"2_280","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人因鉴定需要会见当事人、诉讼代理人的，当事人有权要求其回避。","answer":"×","ref":"《民事诉讼法》第四十四条，鉴定人违反规定会见当事人、诉讼代理人的才应当回避。"},{"id":"2_281","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定意见必须经过查证属实，才能作为认定事实的依据。","answer":"√","ref":"《民事诉讼法》第六十三条。"},{"id":"2_282","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"当事人可以就查明事实的专门性问题向人民法院申请鉴定。当事人未申请鉴 已被查封、扣押的财产。 278 √，《民事诉讼法》第四十四条。 279 √，《民事诉讼法》第四十四条。 定，人民法院无权委托鉴定人进行鉴定。","answer":"×","ref":"《民事诉讼法》第七十六条，当事人未申请鉴定，人民法院对专门性问题认为需要鉴定的，应当委托具备资格的鉴定人进行鉴定。"},{"id":"2_283","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人有权了解进行鉴定所需要的案件材料，必要时可以询问当事人、证人。","answer":"√","ref":"《民事诉讼法》第七十七条。"},{"id":"2_284","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"人民法院对鉴定意见有异议时，鉴定人应当出庭作证。","answer":"×","ref":"《民事诉讼法》第七十八条，当事人对鉴定意见有异议或者人民法院认为鉴定人有必要出庭的，鉴定人应当出庭作证。"},{"id":"2_285","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"当事人认为鉴定人有必要出庭的，鉴定人应当出庭作证。","answer":"×","ref":"《民事诉讼法》第七十八条，当事人对鉴定意见有异议或者人民法院认为鉴定人有必要出庭的，鉴"},{"id":"2_286","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"经法院通知，鉴定人拒不出庭作证的，鉴定人要承担相应法律责任，但其出具的鉴定意见仍可作为证据使用。","answer":"×","ref":"《民事诉讼法》第七十八条，经人民法院通知，鉴定人拒不出庭作证的，鉴定意见不得作为认定事实的根据。"},{"id":"2_287","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"当事人可以申请人民法院通知有专门知识的人出庭，就鉴定人是否应当回避等问题提出意见。","answer":"×","ref":"《民事诉讼法》第七十九条，当事人可以申请人民法院通知有专门知识的人出庭，就鉴定人作出的鉴定意见或者专业问题提出意见。"},{"id":"2_288","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"单位对鉴定人进行侮辱、诽谤、诬陷、殴打或者打击报复的，人民法院可以对单位予以罚款。","answer":"×","ref":"《民事诉讼法》第一百一十一条，人民法院对有前款规定的行为之一的单位，可以对其主要负责人或者直接责任人员予以罚款、拘留；构成犯罪的，依法追究刑事责任。不是对单位予以罚款。"},{"id":"2_289","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"当事人要求当事人要求重新进行鉴定的，是否准许，由人民法院决定。","answer":"√","ref":"《民事诉讼法》第一百三十九条。"},{"id":"2_290","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"需要重新鉴定的案件，应当中止开庭审理。","answer":"×","ref":"《民事诉讼法》第一百四十六条，需要重新鉴定的案件，可以延期开庭审理。"},{"id":"2_291","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"法庭调查按照下列顺序进行：（一）当事人陈述；（二）告知证人的权利义务，证人作证，宣读未到庭的证人证言；（三）出示书证、物证、视听资料和电子数据；（四）宣读鉴定意见；（五）宣读勘验笔录。","answer":"√","ref":"《民事诉讼法》第一百三十八条。"},{"id":"2_292","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"经法院通知，鉴定人拒不出庭作证的，鉴定人应当返还鉴定费用。","answer":"×","ref":"《民事诉讼法》第七十八条，经人民法院通知，鉴定人拒不出庭作证的，支付鉴定费用的当事人可以要求返还鉴定费用。不是应当返还。"},{"id":"2_293","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"人民法院认定公民无民事行为能力、限制民事行为能力的案件，应当对被请求认定为无民事行为能力或者限制民事行为能力的公民进行鉴定。","answer":"×","ref":"《民事诉讼法》第一百八十八条，必要时应当进行鉴定。"},{"id":"2_294","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人是本案当事人的亲属的，应当自行回避。","answer":"×","ref":"《民事诉讼法》第四十四条，本案当事人的近亲属才需要回避。"},{"id":"2_295","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"当事人未申请鉴定，人民法院对专门性问题认为需要鉴定的，可以委托具备资格的鉴定人进行鉴定。","answer":"×","ref":"《民事诉讼法》第七十六条，应当而不是可以。"},{"id":"2_296","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人有需要回避情形的，应当自行回避，当事人只能以书面方式申请他们回避。296 282 ×，《民事诉讼法》第七十六条，当事人未申请鉴定，人民法院对专门性问题认为需要鉴定的，应当委托具备资格的鉴定人进行鉴定。 284 ×，《民事诉讼法》第七十八条，当事人对鉴定意见有异议或者人民法院认为鉴定人有必要出庭的，鉴定人应当出庭作证。 定人应当出庭作证。 288 ×，《民事诉讼法》第一百一十一条，人民法院对有前款规定的行为之一的单位，可以对其主要负责人或者直接责任人员予以罚款、拘留；构成犯罪的，依法追究刑事责任。不是对单位予以罚款。 289 √，《民事诉讼法》第一百三十九条。","answer":"×","ref":"《民事诉讼法》第四十四条，可口头也可书面。"},{"id":"2_297","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"当事人向证人、鉴定人、勘验人发问无需经法庭许可。","answer":"×","ref":"《民事诉讼法》第一百三十九条。当事人经法庭许可，可以向证人、鉴定人、勘验人发问。"},{"id":"2_298","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"证据必须查证属实，才能作为认定事实的根据。","answer":"√","ref":"《民事诉讼法》第六十三条。"},{"id":"2_299","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"当事人应当就查明事实的专门性问题向人民法院申请鉴定。","answer":"×","ref":"《民事诉讼法》第七十六条。可以。"},{"id":"2_300","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"当事人申请鉴定的，由申请方确定具备资格的鉴定人。","answer":"×","ref":"《民事诉讼法》第七十六条。由双方当事人协商确定。"},{"id":"2_301","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"当事人未申请鉴定，人民法院对专门性问题认为需要鉴定的，应当委托具备专门知识的人进行鉴定。","answer":"×","ref":"《民事诉讼法》第七十六条。具备资格的鉴定人。"},{"id":"2_302","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人有权了解进行鉴定所需要的案件材料，必要时可以询问当事人、证人。","answer":"√","ref":"《民事诉讼法》第七十七条。"},{"id":"2_303","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人应当提出书面鉴定意见，在鉴定书上签名或者盖章。","answer":"√","ref":"《民事诉讼法》第七十七条。"},{"id":"2_304","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"当事人对鉴定意见有异议或者人民法院认为鉴定人有必要出庭的，鉴定人应当出庭作证。","answer":"√","ref":"《民事诉讼法》第七十八条。"},{"id":"2_305","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"经人民法院通知，鉴定人拒不出庭作证的，鉴定意见不得作为认定事实的根据；但支付的鉴定费用不能要求返还。","answer":"×","ref":"《民事诉讼法》第七十八条。支付鉴定费用的当事人可以要求返还鉴定费用。"},{"id":"2_306","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"当事人可以申请人民法院通知有专门知识的人出庭，就鉴定人作出的鉴定意见或者专业问题提出意见。","answer":"√","ref":"《民事诉讼法》第七十九条。"},{"id":"2_307","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"当事人未经法庭许可，不可以向证人、鉴定人、勘验人发问。","answer":"√","ref":"《民事诉讼法》第一百三十九条。"},{"id":"2_308","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"当事人要求重新进行调查、鉴定或者勘验的，人民法院应当准许。","answer":"×","ref":"《民事诉讼法》第一百三十九条。是否准许，由人民法院决定。"},{"id":"2_309","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"人民法院受理申请后，应当对被请求认定为无民事行为能力或者限制民事行为能力的公民进行鉴定。","answer":"×","ref":"《民事诉讼法》第一百八十八条。必要时应当。"},{"id":"2_310","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据新《民事诉讼法》的规定，当事人可以就查明事实的专门性问题向人民法院申请鉴定，由人民法院指定鉴定人。","answer":"×","ref":"新民事诉讼法第七十六条。当事人申请鉴定的，由双方当事人协商确定具备资格的鉴定人；协商不成的，由人民法院指定。"},{"id":"2_312","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据新《民事诉讼法》的规定，鉴定人有权了解进行鉴定所需要的案件材料，且应当询问当事人、证人。","answer":"×","ref":"新民事诉讼法第七十七条。必要时可以询问。"},{"id":"2_313","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据新《民事诉讼法》的规定，经人民法院通知，鉴定人拒不出庭作证的，鉴定意见不得作为认定事实的根据。但是支付鉴定费用的当事人不可以要求返还鉴定费用。","answer":"×","ref":"新民事诉讼法第七十八条。可以要求返还。"},{"id":"2_315","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据新《民事诉讼法》的规定，当事人要求重新进行鉴定的，人民法院应予准许。315 行政诉讼法及司法解释试题库","answer":"×","ref":"新民事诉讼法第一百三十九条。是否准许，由人民法院决定。"},{"id":"2_316","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《行政诉讼法》的规定，有下列情形（ ）的鉴定人应当回避。","options":{"A":"鉴定人与本案有利害关系的","B":"鉴定人与本案有关联的","C":"鉴定人会见当事人、诉讼代理人的","D":"鉴定人是本案当事人的亲属的"},"answer":["A"],"ref":"《行政诉讼法》第五十五条。"},{"id":"2_317","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《行政诉讼法》第三十三条的规定，鉴定人所出具的（）为法定证据的一种。","options":{"A":"鉴定意见","B":"鉴定结论","C":"鉴定书","D":"鉴定证明材料"},"answer":["A"],"ref":"《行政诉讼法》第三十三条。"},{"id":"2_318","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《行政诉讼法》的规定，下列说法错误的是（ ）。","options":{"A":"鉴定人所出具的鉴定意见为法定证据的一种","B":"鉴定意见经法庭审查属实，才能作为认定案件事实的依据","C":"鉴定人认为自己与本案有利害关系或者有其他关系，应当申请回避","D":"鉴定人的回避由法院院长决定"},"answer":["D"],"ref":"《行政诉讼法》第三十三条、第五十五条。"},{"id":"2_319","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《行政诉讼法》的规定，关于鉴定人的回避，下列说法正确的是（ ）。","options":{"A":"鉴定人与本案有关联的，应当申请回避","B":"鉴定人与本案有利害关系的，当事人有权申请其回避","C":"鉴定人会见当事人、诉讼代理人的，应当申请回避","D":"鉴定人是否回避，由审判委员会决定"},"answer":["B"],"ref":"《行政诉讼法》第五十五条。"},{"id":"2_320","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《行政诉讼法》的规定，下列说法不正确的是（ ）。","options":{"A":"当事人对鉴定人的回避决定不服的，可申请复议一次","B":"鉴定人的回避，由审判长决定","C":"鉴定意见可直接作为认定案件事实的根据，无需审查","D":"当事人认为鉴定人与本案有其他关系可能影响公正审判，有权申请其回避二、判断题（认为正确的划“√”，错误的划“×”）"},"answer":["C"],"ref":"《行政诉讼法》第三十三条、第五十五条。"},{"id":"2_326","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据我国《治安管理处罚法》，为了查明案情，需要解决案件中有争议的（），应当指派或聘请鉴定人进行鉴定。","options":{"A":"科学性问题","B":"专门性问题","C":"理论性问题","D":"技术性问题"},"answer":["B"],"ref":"《治安管理处罚法》第九十条。"},{"id":"2_327","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据我国《治安管理处罚法》，为了查明案情，需要解决案件中有争议的专门性问题的，应当（）具有专门知识的人员进行鉴定。","options":{"A":"指派","B":"委托","C":"聘请","D":"指派或聘请"},"answer":["D"],"ref":"《治安管理处罚法》第九十条。"},{"id":"2_328","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据我国《治安管理处罚法》，下列说法错误的是（ ）。","options":{"A":"鉴定人鉴定后，应当出具鉴定意见，并且签名","B":"为了查明案情进行鉴定的期间，不计入办理治安案件的期限","C":"为了解决案件中有争议的专门性问题的，应当指派或者聘请鉴定人进行鉴定","D":"鉴定人出具的鉴定意见可以书面也可以口头"},"answer":["D"],"ref":"《治安管理处罚法》第九十条、第九十九条。"},{"id":"2_329","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"为了解决案件中有争议的专门性问题的，（ ）指派或者聘请鉴定人进行鉴定。","options":{"A":"应当","B":"可以","C":"必须","D":"应该"},"answer":["A"],"ref":"《治安管理处罚法》第九十条。"},{"id":"2_330","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据我国《治安管理处罚法》，下列说法正确的是（ ）。","options":{"A":"为了解决案件中有争议的专门性问题，应当委托具有专门知识的人员进行鉴定","B":"鉴定人鉴定后，应当写出鉴定意见，并且签名。","C":"为了查明案情进行鉴定的期间，计入办理治安案件的期限","D":"鉴定人出具的鉴定意见可以书面也可以口头"},"answer":["B"],"ref":"《治安管理处罚法》第九十条、第九十九条。"},{"id":"2_331","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"为了查明案情进行鉴定的期间，计入办理治安案件的期限。","answer":"×","ref":"《治安管理处罚法》第九十九条，不计入办理治安案件的期限。"},{"id":"2_332","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"为了解决案件中有争议的专门性问题的，应当指派或者聘请鉴定人进行鉴定。","answer":"√","ref":"《治安管理处罚法》第九十条。"},{"id":"2_333","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"为了查明案情，需要解决案件中有争议的专门性问题的，可以委托具有专门知识的人员进行鉴定。","answer":"×","ref":"《治安管理处罚法》第九十条。"},{"id":"2_334","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人鉴定后，应当写出鉴定意见，并且签名。","answer":"√","ref":"《治安管理处罚法》第九十条，应当指派或者聘请鉴定人进行鉴定。"},{"id":"2_335","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定人鉴定后，应当出具鉴定意见，鉴定意见可以书面也可以口头。","answer":"×","ref":"《治安管理处罚法》第九十条，鉴定意见只能书面。"},{"id":"2_337","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据《中华人民共和国仲裁法》的规定，仲裁庭对专门性问题认为需要鉴定的，应当交由当事人约定的鉴定部门鉴定。","answer":

鉴定无法继续进行的"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第十五条、第二十九条。"},{"id":"5_703","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"哪些情形司法鉴定机构可以接受委托，进行补充鉴定（ ）。","options":{"A":"原委托鉴定事项有遗漏的","B":"诉讼当事人对原鉴定结论有异议的","C":"委托人就原委托鉴定事项提供新的鉴定材料的","D":"委托人有更换司法鉴定人要求的"},"answer":["A","C"],"ref":"《司法鉴定程序通则》第三十条。"},{"id":"5_704","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"有下列情形之一的，司法鉴定机构可以接受办案机关委托进行重新鉴定 （ ）。","options":{"A":"原司法鉴定人不具有从事委托鉴定事项执业资格的","B":"原司法鉴定人超出机构登记的业务范围组织鉴定的","C":"原司法鉴定人应当回避没有回避的","D":"诉讼当事人对原鉴定有异议的"},"answer":["A","B","C"],"ref":"《司法鉴定程序通则》第三十一条。"},{"id":"5_705","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"重新鉴定时，说法正确的是（ ）。","options":{"A":"应当委托原司法鉴定机构以外的其他司法鉴定机构进行","B":"接受委托的司法鉴定机构资质条件应当不低于原司法鉴定机构","C":"进行重新鉴定的司法鉴定人中应当至少有二名具有相关专业高级专业技术职称","D":"因特殊原因，委托人可委托原司法鉴定机构进行，且可以不更换原鉴定人"},"answer":["A","B"],"ref":"《司法鉴定程序通则》第三十二条。"},{"id":"5_706","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定意见书出具后，发现有下列情形之一的，司法鉴定机构可以进行补正（）。","options":{"A":"图像不清晰的","B":"编号不符合制作要求的","C":"文字错别字，但不影响司法鉴定意见的","D":"不符合制作要求的"},"answer":["A","B","C","D"],"ref":"《司法鉴定程序通则》第四十一条。"},{"id":"5_707","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定过程中补充或者重新提取鉴定材料所需的时间，计入鉴定时限。","answer":"×","ref":"司法鉴定程序通则第二十八条。"},{"id":"5_708","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构与委托人对鉴定时限另有约定的，从其约定。","answer":"√","ref":"司法鉴定程序通则第二十八条。"},{"id":"5_709","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"对需要进行尸体解剖的，死者近亲属必须到场见证。","answer":"×","ref":"司法鉴定程序通则第二十五条。"},{"id":"5_710","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"诉讼当事人对鉴定材料有异议的，应当向委托人提出。","answer":"√","ref":"司法鉴定程序通则第十二条。"},{"id":"5_712","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构对同一鉴定事项，应当指定或者选择二名司法鉴定人进行鉴定。","answer":"√","ref":"司法鉴定程序通则第十九条。"},{"id":"5_713","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定人自行提出回避的，由其所属的司法鉴定机构决定。","answer":"√","ref":"司法鉴定程序通则第二十一条。"},{"id":"5_715","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"修订后的《司法鉴定程序通则》自 2016 年 5 月 1 日起实施。","answer":"√","ref":"《司法鉴定程序通则》第五十条。"},{"id":"5_716","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"进行重新鉴定的司法鉴定人中应当至少有两名具有相关专业高级专业技术职称。","answer":"×","ref":"司法鉴定程序通则第三十二条。"},{"id":"5_717","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"最新修订的《司法鉴定程序通则》自 2016 年 10 月 1 日起实施。","answer":"×","ref":"《司法鉴定程序通则》第五十条，自 2016 年 5 月 1 日起实施。"},{"id":"5_718","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定是指在诉讼活动中鉴定人运用科学技术或者专门知识对诉讼涉及的专门性问题进行鉴别和判断并提供鉴定意见的活动。","answer":"√","ref":"《司法鉴定程序通则》第二条。"},{"id":"5_719","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定实行司法鉴定机构负责制度。","answer":"×","ref":"《司法鉴定程序通则》第五条，司法鉴定实行鉴定人负责制度。"},{"id":"5_720","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定人不得违反规定会见诉讼当事人及其委托的人。","answer":"√","ref":"《司法鉴定程序通则》第五条。"},{"id":"5_721","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构和司法鉴定人应当保守在执业活动中知悉的国家秘密、商业秘密，不得泄露个人隐私。","answer":"√","ref":"《司法鉴定程序通则》第六条。"},{"id":"5_722","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定人在执业活动中应当依照有关诉讼法律和《司法鉴定程序通则》规定实行回避。","answer":"√","ref":"《司法鉴定程序通则》第七条。"},{"id":"5_723","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定收费执行司法鉴定机构的规定。","answer":"×","ref":"《司法鉴定程序通则》第八条，司法鉴定收费执行国家有关规定。"},{"id":"5_724","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，委托人委托鉴定的，应当向司法鉴定机构提供资料。","answer":"√","ref":"《司法鉴定程序通则》第十二条。"},{"id":"5_725","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，诉讼当事人对鉴定材料有异议的，应当向委托人提出。","answer":"√","ref":"《司法鉴定程序通则》第十二条。"},{"id":"5_726","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，委托人委托鉴定的，应当对鉴定材料的真实性、合法性负责。","answer":"√","ref":"《司法鉴定程序通则》第十二条。"},{"id":"5_727","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定机构应当核对并记录鉴定材料的名称、种类、数量、性状、保存状况、收到时间等。","answer":"√","ref":"《司法鉴定程序通则》第十二条。"},{"id":"5_728","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"最新修订的《司法鉴定程序通则》，司法鉴定机构应当自收到委托之日起五 个工作日内作出是否受理的决定。","answer":"×","ref":"《司法鉴定程序通则》第十三条，七个工作日。"},{"id":"5_729","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定机构对属于本机构司法鉴定业务范围，鉴定用途合法，提供的鉴定材料能够满足鉴定需要的，应当受理。","answer":"√","ref":"《司法鉴定程序通则》第十四条。"},{"id":"5_730","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"对于鉴定材料不完整、不充分，不能满足鉴定需要的，司法鉴定机构应当要求委托人补充。","answer":"×","ref":"《司法鉴定程序通则》第十四条，可以要求委托人补充。"},{"id":"5_731","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定机构应当对委托鉴定事项、鉴定材料等进行审查。","answer":"√","ref":"《司法鉴定程序通则》第十四条。"},{"id":"5_732","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，委托鉴定事项超出本机构司法鉴定业务范围的，司法鉴定机构不得受理。","answer":"√","ref":"《司法鉴定程序通则》第十五条。"},{"id":"5_733","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定机构决定受理鉴定委托的，可以与委托人签订司法鉴定委托书。","answer":"×","ref":"《司法鉴定程序通则》第十六条，应当签订司法鉴定委托书。"},{"id":"5_734","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定机构决定不予受理鉴定委托的，应当向委托人说明理由，并退还鉴定材料。","answer":"√","ref":"《司法鉴定程序通则》第十六条。"},{"id":"5_735","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定机构受理鉴定委托后，应当协商选择本机构具有该鉴定事项执业资格的司法鉴定人进行鉴定。","answer":"×","ref":"《司法鉴定程序通则》第十八条，应当指定本机构具有该鉴定事项执业资格的司法鉴定人进行鉴定。"},{"id":"5_736","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，委托人有特殊要求的，经双方协商一致，也可以从本机构中选择符合条件的司法鉴定人进行鉴定。","answer":"√","ref":"《司法鉴定程序通则》第十八条。"},{"id":"5_737","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定人应当依法独立、客观、公正地进行鉴定，并与司法鉴定机构对鉴定意见负责。","answer":"×","ref":"《司法鉴定程序通则》第五条。"},{"id":"5_738","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，委托人不得要求或者暗示司法鉴定机构、司法鉴定人按其意图或者特定目的提供鉴定意见。","answer":"√","ref":"《司法鉴定程序通则》第十八条。"},{"id":"5_739","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，委托人要求司法鉴定人回避的，应当向该司法鉴定人由司法鉴定责人决定。","answer":"×","ref":"《司法鉴定程序通则》第二十一条，司法鉴定机构决定。"},{"id":"5_740","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定人自行提出回避的，由委托人决定。","answer":"×","ref":"《司法鉴定程序通则》第二十一条，司法鉴定机构决定。"},{"id":"5_741","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，委托人对司法鉴定机构作出的司法鉴定人是否回避的决定有异议的，应当撤销鉴定委托。","answer":"×","ref":"《司法鉴定程序通则》第二十一条，委托人可以撤销鉴定委托。"},{"id":"5_742","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，委托人对司法鉴定机构作出的司法鉴定人是否回避的决定有异议的，可以向司法局申诉。 《司法鉴定程序通则》第十八条，应当指定本机构具有该鉴定事项执业资格的司法鉴定人进行鉴定。","answer":"×","ref":"《司法鉴定程序通则》第二十一条，委托人可以撤销鉴定委托。"},{"id":"5_743","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，必要时司法鉴定人可以询问诉讼当事人、证人。","answer":"√","ref":"《司法鉴定程序通则》第二十四条。"},{"id":"5_744","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，经委托人同意，司法鉴定机构可以派一名司法鉴定机构的工作人员到现场提取鉴定材料。","answer":"×","ref":"《司法鉴定程序通则》第二十四条，不少于两名。"},{"id":"5_745","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，现场提取鉴定材料时，应当有委托人指派或者委托的人员在场见证并在提取记录上签名。","answer":"√","ref":"《司法鉴定程序通则》第二十四条。"},{"id":"5_746","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，鉴定过程中，需要对无民事行为能力人或者限制民事行为能力人进行身体检查的，应当通知委托人到场见证。","answer":"×","ref":"《司法鉴定程序通则》第二十五条，应当通知其监护人或者近亲属到场见证；必要时，可以通知委托人到场见证。"},{"id":"5_747","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，对被鉴定人进行法医精神病鉴定的，应当通知委托人或者被鉴定人的近亲属或者监护人到场见证。","answer":"√","ref":"《司法鉴定程序通则》第二十五条。"},{"id":"5_748","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，对需要进行尸体解剖的，应当通知委托人或者死者的近亲属或者监护人到场见证。","answer":"√","ref":"《司法鉴定程序通则》第二十五条。"},{"id":"5_749","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，到场见证人员可以在鉴定记录上签名。","answer":"×","ref":"《司法鉴定程序通则》第二十五条，应当签名。"},{"id":"5_750","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，鉴定过程中，需要对被鉴定人身体进行法医临床检查的，应当采取必要措施保护其隐私。","answer":"√","ref":"《司法鉴定程序通则》第二十六条。"},{"id":"5_751","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定人应当在两个工作日内在鉴定过程记录并签名。","answer":"×","ref":"《司法鉴定程序通则》第二十七条，司法鉴定人应当对鉴定过程进行实时记录。"},{"id":"5_752","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构应当自司法鉴定委托书生效之日起二十个工作日内完成鉴定。","answer":"×","ref":"《司法鉴定程序通则》第二十八条，三十个工作日。"},{"id":"5_753","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，在鉴定过程中补充或者重新提取鉴定材料所需的时间，不计入鉴定时限。","answer":"√","ref":"《司法鉴定程序通则》第二十八条。"},{"id":"5_754","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，委托人就原委托鉴定事项提供新的鉴定材料的，司法鉴定机构可以重新鉴定。","answer":"×","ref":"《司法鉴定程序通则》第二十九、三十条，可以补充鉴定。"},{"id":"5_755","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，原司法鉴定人应当回避没有回避的，司法鉴定机构可以指定其他司法鉴定人进行补充鉴定。","answer":"×","ref":"《司法鉴定程序通则》第三十、三十一条，可以重新鉴定。"},{"id":"5_756","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，补充鉴定是原委托鉴定的组成部分，应当由原司法鉴定人进行。","answer":"√","ref":"《司法鉴定程序通则》第三十条。"},{"id":"5_757","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，除特殊原因，重新鉴定应当委托原司法鉴定机构以外的其他司法鉴定机构进行。","answer":"√","ref":"《司法鉴定程序通则》第三十二条。"},{"id":"5_758","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，接受重新鉴定委托的司法鉴定机构的资质条件应当不低于原司法鉴定机构。 《司法鉴定程序通则》第二十五条，应当通知其监护人或者近亲属到场见证；必要时，可以通知委托人到场见证。 《司法鉴定程序通则》第二十七条，司法鉴定人应当对鉴定过程进行实时记录。","answer":"√","ref":"《司法鉴定程序通则》第三十二条。"},{"id":"5_759","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，鉴定过程中，涉及复杂、疑难、特殊技术问题的，可以向本机构以外的相关专业领域的专家进行咨询，并根据专家的意见出具鉴定意见。","answer":"×","ref":"《司法鉴定程序通则》第三十三条，最终的鉴定意见应当由本机构的司法鉴定人出具。"},{"id":"5_760","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，专家提供咨询意见应当签名，并存入鉴定档案。","answer":"√","ref":"《司法鉴定程序通则》第三十三条。"},{"id":"5_761","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，对于涉及重大案件或者特别复杂、疑难、特殊技术问题或者多个鉴定类别的鉴定事项，办案机关可以委托司法鉴定行业协会组织协调多个司法鉴定机构进行鉴定。","answer":"√","ref":"《司法鉴定程序通则》第三十四条。"},{"id":"5_762","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定人完成鉴定后，司法鉴定机构应当指定具有相应资质的人员对鉴定程序和鉴定意见进行复核。","answer":"√","ref":"《司法鉴定程序通则》第三十五条。"},{"id":"5_763","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，复核人员完成复核后，应当提出复核意见并签名。","answer":"√","ref":"《司法鉴定程序通则》第三十五条。"},{"id":"5_764","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，多人参加的鉴定，对鉴定意见有不同意见的，应当注明，但不需要在鉴定意见书上签名。","answer":"×","ref":"《司法鉴定程序通则》第三十七条。"},{"id":"5_765","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定意见书应当由司法鉴定人签名，并加盖司法鉴定机构的司法鉴定专用章。","answer":"√","ref":"《司法鉴定程序通则》第三十七、三十八条。"},{"id":"5_766","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定意见书应当一式四份，两交委托人收执，一份交被鉴定人收执，一份由司法鉴定机构存档。","answer":"×","ref":"《司法鉴定程序通则》第三十九条，三份交委托人收执，一份由司法鉴定机构存档。"},{"id":"5_767","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，委托人对鉴定过程、鉴定意见提出询问的，司法鉴定机构和司法鉴定人应当给予解释或者说明。","answer":"√","ref":"《司法鉴定程序通则》第四十条。"},{"id":"5_768","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定意见书出具后，签名、盖章或者编号不符合制作要求的，司法鉴定机构可以进行补正。","answer":"√","ref":"《司法鉴定程序通则》第四十一条。"},{"id":"5_769","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，司法鉴定意见书出具后，原委托鉴定事项有遗漏的，司法鉴定机构可以进行补正。","answer":"×","ref":"《司法鉴定程序通则》第三十、四十一条，补充鉴定。"},{"id":"5_770","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，对司法鉴定意见书进行补正，可以改变司法鉴定意见的原意。","answer":"×","ref":"《司法鉴定程序通则》第四十一条，不得改变原意见。"},{"id":"5_771","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，经人民法院依法通知，司法鉴定人应当出庭作证。","answer":"√","ref":"《司法鉴定程序通则》第四十三条。"},{"id":"5_772","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"根据最新修订的《司法鉴定程序通则》，，司法鉴定机构应当支持司法鉴定人出庭作证，为司法鉴定人依法出庭提供必要条件。","answer":"√","ref":"《司法鉴定程序通则》第四十五条。"},{"id":"5_773","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定是指在诉讼活动中鉴定人运用科学技术或者专门知识对诉讼涉及的专门性问题进行鉴别和判断并提供鉴定意见的活动。 《司法鉴定程序通则》第三十三条，最终的鉴定意见应当由本机构的司法鉴定人出具。 《司法鉴定程序通则》第三十九条，三份交委托人收执，一份由司法鉴定机构存档。","answer":"√","ref":"《司法鉴定程序通则》第二条。"},{"id":"5_774","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"《司法鉴定程序通则》适用于司法鉴定机构和司法鉴定人从事各类司法鉴定业务的活动。","answer":"√","ref":"《司法鉴定程序通则》第三条。"},{"id":"5_775","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定人应当单独会见诉讼当事人及其委托的人，以便更充分了解鉴定事宜。","answer":"×","ref":"《司法鉴定程序通则》第五条，司法鉴定人不得违反规定会见诉讼当事人及其委托的人。"},{"id":"5_776","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定实行司法鉴定机构负责制。","answer":"×","ref":"《司法鉴定程序通则》第五条，司法鉴定实行鉴定人负责制度。"},{"id":"5_777","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"诉讼当事人或律师事务所确因诉讼或其他需要，可以要求司法鉴定机构调取相关鉴定资料。","answer":"×","ref":"《司法鉴定程序通则》第五条，司法鉴定人不得违反规定会见诉讼当事人及其委托的人。"},{"id":"5_778","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构和司法鉴定人应当保守在执业活动中知悉的国家秘密、商业秘密，不得泄露个人隐私。","answer":"√","ref":"《司法鉴定程序通则》第六条。"},{"id":"5_779","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定人应当依法独立、客观、公正地进行鉴定，司法鉴定机构对其作出的鉴定意见负责。","answer":"×","ref":"《司法鉴定程序通则》第五条，司法鉴定人应当依法独立、客观、公正地进行鉴定，并对自己作出的鉴定意见负责。"},{"id":"5_780","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定人在执业活动中应当依照规定实行回避。","answer":"√","ref":"《司法鉴定程序通则》第七条。"},{"id":"5_781","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定人违反《司法鉴定程序通则》规定的，司法行政机关应当予以纠正。","answer":"×","ref":"《司法鉴定程序通则》第十条，司法鉴定人违反本通则规定的，司法鉴定机构应当予以纠正。"},{"id":"5_782","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定因提供的鉴定材料虚假或不完全而出现的错鉴，应当由司法鉴定机构承担责任。","answer":"×","ref":"《司法鉴定程序通则》第十二条，委托人委托鉴定的，应当向司法鉴定机构提供真实、完整、充分的鉴定材料，并对鉴定材料的真实性、合法性负责。"},{"id":"5_783","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"诉讼当事人对鉴定材料有异议的，应当向司法行政机关提出。","answer":"×","ref":"《司法鉴定程序通则》第十二条，诉讼当事人对鉴定材料有异议的，应当向委托方提出。"},{"id":"5_784","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构应当自收到委托之日起十个工作日内作出是否受理的决定。","answer":"×","ref":"《司法鉴定程序通则》第十三条，司法鉴定机构应当自收到委托之日起七个工作日内作出是否受理的决定。"},{"id":"5_785","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构决定受理鉴定委托的，应当与委托人签订司法鉴定协议书。","answer":"×","ref":"《司法鉴定程序通则》第十六条，应当与委托人签订司法鉴定委托书。"},{"id":"5_786","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"委托人就同一鉴定事项可同时委托两家司法鉴定机构进行鉴定。","answer":"×","ref":"《司法鉴定程序通则》第十五条第（六）款，委托人就同一鉴定事项同时委托其他司法鉴定机构进行鉴定的，不得受理。"},{"id":"5_787","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构受理鉴定委托后，应当指定本机构的某类司法鉴定人进行鉴定。","answer":"×","ref":"《司法鉴定程序通则》第十八条，司法鉴定机构受理鉴定委托后，应当指定本机构具有该鉴定事项执业资格的司法鉴定人进行鉴定。"},{"id":"5_788","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构决定不予受理鉴定委托的，应当向委托人说明理由，退还鉴定材料。","answer":"√","ref":"《司法鉴定程序通则》第十七条。"},{"id":"5_789","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"对于鉴定材料不真实、不完整、不充分或者取得方式不合法的，鉴定机构不得受理。","answer":"√","ref":"《司法鉴定程序通则》第十五条。"},{"id":"5_790","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构接受委托后，可由委托人在司法鉴定机构内任意选取司法鉴定 人进行鉴定。","answer":"×","ref":"《司法鉴定程序通则》第十八条，司法鉴定机构受理鉴定委托后，应当指定本机构具有该鉴定事项执业资格的司法鉴定人进行鉴定。"},{"id":"5_791","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"委托人要求司法鉴定人回避的，应当向该司法鉴定人所属的司法鉴定机构提出，如对回避结果有异议的，可申请仲裁。","answer":"×","ref":"《司法鉴定程序通则》第二十一条。委托人对司法鉴定机构作出的司法鉴定人是否回避的决定有异议的，可以撤销鉴定委托。"},{"id":"5_792","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"需现场提取鉴定材料的，应当不少于三名司法鉴定机构的工作人员进行。","answer":"×","ref":"《司法鉴定程序通则》第二十四条，现场提取鉴定材料应当由不少于二名司法鉴定机构的工作人员进行，其中至少一名应为该鉴定事项的司法鉴定人。"},{"id":"5_793","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定事项涉及复杂、疑难、特殊技术问题或者鉴定过程需要较长时间的，经本机构负责人批准，完成鉴定的时限可以延长，延长时限一般不得超过 90 工作日。","answer":"×","ref":"《司法鉴定程序通则》第二十八条，延长时限一般不得超过三十个工作日。"},{"id":"5_794","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构应当自司法鉴定委托书生效之日起三十个工作日内完成所有鉴定。","answer":"×","ref":"《司法鉴定程序通则》第二十八条，应当三十个工作日内完成鉴定，如遇疑难、复杂案件可延长时限，一般不得超过三十个工作日。"},{"id":"5_795","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"终止鉴定时，司法鉴定机构应通知当事人。","answer":"×","ref":"《司法鉴定程序通则》第二十九条，司法鉴定机构应当书面通知委托人，说明理由并退还鉴定材料。"},{"id":"5_796","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定机构可接受诉讼当事人委托对有异议的鉴定进行重新鉴定。","answer":"×","ref":"《司法鉴定程序通则》第三十一条，办案机关认为需要重新鉴定的。"},{"id":"5_797","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"鉴定过程中涉及疑难、复杂的案件，可以向本机构以外的相关专业领域的专家进行咨询，出具的最终鉴定意见中应由专家签名并存入鉴定档案。","answer":"×","ref":"《司法鉴定程序通则》第三十三条。最终的鉴定意见应当由本机构的司法鉴定人出具，提供的咨询意见应签名并存入鉴定档案。"},{"id":"5_798","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定意见书应当一式三份。","answer":"×","ref":"《司法鉴定程序通则》第三十九条。"},{"id":"5_799","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"委托人对鉴定过程、鉴定意见提出询问的，司法鉴定机构和司法鉴定人应当给予解释或者说明。","answer":"√","ref":"《司法鉴定程序通则》第四十条。"},{"id":"5_800","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定的重新鉴定应当由原司法鉴定人进行鉴定。","answer":"×","ref":"《司法鉴定程序通则》第三十二条，重新鉴定应当委托原司法鉴定机构以外的其他司法鉴定机构进行。"},{"id":"5_801","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"进行重新鉴定的司法鉴定人中应至少有一名具有相关专业高级专业技术职称。","answer":"√","ref":"《司法鉴定程序通则》第三十二条。"},{"id":"5_802","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定意见书应当加盖司法鉴定机构公章。","answer":"×","ref":"《司法鉴定程序通则》第三十八条。"},{"id":"5_803","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"对司法鉴定意见书进行补正，需在补正处加盖司法鉴定人的人名章。","answer":"×","ref":"《司法鉴定程序通则》第四十一条，需至少一名司法鉴定人在补正处签名。"},{"id":"5_804","type":"judge","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"委托方不配合缴纳出庭费用的，司法鉴定人有权拒绝出庭作证。 司法鉴定执业活动投诉处理办法试题库","answer":"√","ref":"《司法鉴定程序通则》第四十四条。"},{"id":"5_805","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"负责指导、监督本行政区域内司法鉴定执业投诉处理工作的部门为（ ）。","options":{"A":"省级人民法院","B":"省级人民检察机关","C":"省级人民政府","D":"省级司法行政机关"},"answer":["D"],"ref":"<司法鉴定执业活动投诉处理办法>第六条。"},{"id":"5_806","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法行政机关一般应当自收到投诉材料之日起（）内，作出是否受理的决定。","options":{"A":"七日","B":"七个工作日","C":"十五日","D":"十五个工作日"},"answer":["A"],"ref":"<司法鉴定执业活动投诉处理办法>第十五条。"},{"id":"5_807","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"情况复杂的投诉案件，司法行政机关可以适当延长作出受理决定的时间，但延长期限不得超过（），并应当将延长的理由告知投诉人。","options":{"A":"七日","B":"七个工作日","C":"十五日","D":"十五个工作日"},"answer":["C"],"ref":"<司法鉴定执业活动投诉处理办法>第十五条。"},{"id":"5_808","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下关于投诉处理工作的做法，不正确的是（ ）。","options":{"A":"对涉及严重违法违规行为的投诉，省级司法行政机关可以直接受理，也可以交由下一级司法行政机关受理","B":"对于不受理的投诉，应当告知投诉人寻求救济的途径和办法","C":"投诉人应当向司法行政机关提交书面投诉材料","D":"仅对鉴定意见有异议的投诉，司法行政机关应予立案受理"},"answer":["D"],"ref":"<司法鉴定执业活动投诉处理办法>第十二条、第十三条、第九条。"},{"id":"5_809","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法行政机关受理投诉的，应当自受理之日起（ ）内办结。","options":{"A":"三十日","B":"三十个工作日","C":"六十日","D":"六十个工作日"},"answer":["C"],"ref":"<司法鉴定执业活动投诉处理办法>第二十二条"},{"id":"5_810","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"情况复杂的投诉案件，经司法行政机关负责人批准，可适当延长办理期限，但延长期限不得超过（）。","options":{"A":"三十日","B":"三十个工作日","C":"六十日","D":"六十个工作日"},"answer":["A"],"ref":"<司法鉴定执业活动投诉处理办法>第二十二条。"},{"id":"5_811","type":"single","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法行政机关应当自作出处理决定之日起（）内，将投诉处理结果书面告知投诉人、被投诉人。","options":{"A":"七日","B":"七个工作日","C":"十五日","D":"十五个工作日二、多项选择题（错选、多选、少选皆不得分）"},"answer":["A"],"ref":"<司法鉴定执业活动投诉处理办法>第二十三条。"},{"id":"5_812","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定执业活动投诉人可以为（ ）。","options":{"A":"委托人","B":"被鉴定人","C":"案件相关利益方","D":"被鉴定人家属"},"answer":["A","B","C","D"],"ref":"<司法鉴定执业活动投诉处理办法>第三条。"},{"id":"5_813","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法鉴定执业活动投诉处理工作应当遵循的原则（ ）。","options":{"A":"处罚与教育相结合","B":"分级受理","C":"依法查处","D":"异地受理"},"answer":["A","B","C"],"ref":"<司法鉴定执业活动投诉处理办法>第四条。"},{"id":"5_814","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"投诉人认为存在以下哪些情形，可以向司法行政机关投诉（ ）。","options":{"A":"对人民法院采信鉴定意见的决定有异议的","B":"鉴定机构超出登记的业务范围从事司法鉴定活动的","C":"仅对鉴定机构出具的鉴定意见有异议的","D":"司法鉴定人私自接受司法鉴定委托的"},"answer":["B","D"],"ref":"<司法鉴定执业活动投诉处理办法>第八条。"},{"id":"5_815","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"投诉人认为存在以下哪些情形，可以向司法行政机关投诉（ ）。","options":{"A":"鉴定机构违反司法鉴定收费管理规定的","B":"鉴定机构因不负责任给当事人合法权益造成损失的","C":"鉴定人违反司法鉴定程序规则从事司法鉴定活动的","D":"鉴定人故意做虚假鉴定的"},"answer":["A","B","C","D"],"ref":"<司法鉴定执业活动投诉处理办法>第八条。"},{"id":"5_816","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下哪些情形，司法行政机关可以不予受理（ ）。","options":{"A":"对司法鉴定程序规则有异议的","B":"对司法鉴定技术规范有异议的","C":"仅对鉴定意见有异议的","D":"对人民法院采信鉴定意见的决定有异议的"},"answer":["A","B","C","D"],"ref":"<司法鉴定执业活动投诉处理办法>第十二条。"},{"id":"5_817","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下关于投诉调查的说法，正确的有（ ）。","options":{"A":"司法行政机关可以要求被投诉人说明情况、提交有关材料","B":"司法行政机关可以调阅被投诉人有关业务案卷和档案材料","C":"司法行政机关调查人员可以由一名工作人员进行，但须制作笔录","D":"调查笔录应当由被调查人签字或盖章"},"answer":["A","B","D"],"ref":"<司法鉴定执业活动投诉处理办法>第十七条。"},{"id":"5_818","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"司法行政机关对鉴定执业活动投诉处理的方式有（ ）。","options":{"A":"行政处罚","B":"批评教育","C":"通报","D":"责令限期整改"},"answer":["A","B","C","D"],"ref":"<司法鉴定执业活动投诉处理办法>第二十一条第二款。"},{"id":"5_819","type":"multi","chapter":"全国人民代表大会常务委员会关于司法鉴定管理问题的决定","question":"以下关于投诉处理结果的说法，正确的有（ ）。","options":{"A":"被投诉人对司法行政机关的投诉处理决定有异议的，可以提起行政诉讼","B":"司法行政机关应当将投诉处理结果记入被投诉人的司法鉴定执业诚信档案","C":"投诉事项查证不实或者无法查实的，司法行政机关可以对被投诉人不作处理，直接中止调查，无须告知投诉人","D":"司法行政机关应当对被投诉人纠正违法违规行为的情况进行检查、监督，发现问题可以责令其限期整改"},"answer":["A","B","D"],"ref":"<司法鉴定执业活动投诉处理办法>第二十一条，对被投诉人不作处理，应当将不予处理的理由书面告知投诉人。"},{"id":"6_830","type":"single","chapter":"司法鉴定教育培训规定","question":"（）负责对司法鉴定教育培训工作进行规划、组织和指导，对司法鉴定机构及其司法鉴定人参加教育培训的情况进行监督、检查。","options":{"A":"司法行政机关","B":"司法鉴定行业协会","C":"司法鉴定专家委员会","D":"司法鉴定机构法人代表"},"answer":["A"],"ref":"《司法鉴定教育培训规定》第六条。"},{"id":"6_831","type":"single","chapter":"司法鉴定教育培训规定","question":"对未取得司法鉴定人执业证书的人员和已取得司法鉴定人执业证书尚未独立执业的人员进行的培训是（）。","options":{"A":"职业培训","B":"继续教育","C":"岗前培训","D":"转岗培训"},"answer":["C"],"ref":"《司法鉴定教育培训规定》第八条。"},{"id":"6_832","type":"single","chapter":"司法鉴定教育培训规定","question":"对取得司法鉴定人执业证书已经执业和尚未独立执业的人员进行的培训是 （ ）。","options":{"A":"职业培训","B":"继续教育","C":"岗前培训","D":"转岗培训"},"answer":["D"],"ref":"《司法鉴定教育培训规定》第八条。"},{"id":"6_833","type":"single","chapter":"司法鉴定教育培训规定","question":"岗前培训方案由（）制定并组织实施。","options":{"A":"司法部","B":"省级司法行政机关","C":"市级司法行政机关","D":"县级司法行政机关"},"answer":["B"],"ref":"《司法鉴定教育培训规定》第九条。"},{"id":"6_834","type":"single","chapter":"司法鉴定教育培训规定","question":"转岗培训方案由（ ）制定并指导实施。","options":{"A":"司法部","B":"省级司法行政机关","C":"市级司法行政机关","D":"县级司法行政机关"},"answer":["A"],"ref":"《司法鉴定教育培训规定》第九条第二款。"},{"id":"6_835","type":"single","chapter":"司法鉴定教育培训规定","question":"岗位培训应当在（ ）确定的司法鉴定人继续教育基地和培训机构进行。","options":{"A":"司法部或者省级司法行政机关","B":"司法部和省级司法行政机关共同","C":"省级司法行政机关或者市级司法行政机关","D":"省级司法行政机关和市级司法行政机关共同"},"answer":["A"],"ref":"《司法鉴定教育培训规定》第十条。"},{"id":"6_836","type":"single","chapter":"司法鉴定教育培训规定","question":"继续教育是指司法鉴定人执业后，为进一步改善知识结构、提高执业能力而进行的（）。","options":{"A":"学历教育和非学历教育","B":"岗前培训和岗位培训","C":"岗前培训和转岗培训","D":"岗位培训和转岗培训"},"answer":["A"],"ref":"《司法鉴定教育培训规定》第十一条。"},{"id":"6_837","type":"single","chapter":"司法鉴定教育培训规定","question":"司法鉴定人参加继续教育，每年不得少于（ ）学时，继续教育每学时为（）分钟。","options":{"A":"30 40","B":"40 50","C":"40 45","D":"30 30"},"answer":["B"],"ref":"《司法鉴定教育培训规定》第十三条。"},{"id":"6_838","type":"single","chapter":"司法鉴定教育培训规定","question":"司法鉴定人参加国际性研讨、交流和培训的，计（ ）学时。","options":{"A":"4","B":"8","C":"12","D":"16"},"answer":["D"],"ref":"《司法鉴定教育培训规定》第十五条。"},{"id":"6_839","type":"single","chapter":"司法鉴定教育培训规定","question":"司法鉴定人参加全国性研讨、交流和培训的，计（ ）学时。","options":{"A":"4","B":"8","C":"12","D":"16"},"answer":["C"],"ref":"《司法鉴定教育培训规定》第十五条。"},{"id":"6_840","type":"single","chapter":"司法鉴定教育培训规定","question":"司法鉴定人参加省级研讨、交流和培训的，计（ ）学时。","options":{"A":"4","B":"8","C":"12","D":"16"},"answer":["B"],"ref":"《司法鉴定教育培训规定》第十五条。"},{"id":"6_841","type":"single","chapter":"司法鉴定教育培训规定","question":"司法鉴定人发生法定情形的，经（）批准后，可以免修年度继续教育学时。","options":{"A":"司法部","B":"省级司法行政机关","C":"市级司法行政机关","D":"县级司法行政机关"},"answer":["B"],"ref":"《司法鉴定教育培训规定》第十七条。"},{"id":"6_842","type":"single","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》是由哪个部门制定的（ ）。","options":{"A":"公安部","B":"教育部","C":"司法部","D":"卫生部"},"answer":["C"],"ref":"《司法鉴定教育培训规定》前言部分。"},{"id":"6_843","type":"single","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》规定的岗前培训的培训对象是（ ）。","options":{"A":"相同专业的人员","B":"不同专业的人员","C":"相关专业的人员","D":"不相关专业的人员"},"answer":["A"],"ref":"《司法鉴定教育培训规定》第八条。"},{"id":"6_844","type":"single","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》规定的转岗培训的培训对象是（ ）。","options":{"A":"相同专业的人员","B":"不同专业的人员","C":"相关专业的人员","D":"不相关专业的人员"},"answer":["C"],"ref":"《司法鉴定教育培训规定》第八条。"},{"id":"6_845","type":"single","chapter":"司法鉴定教育培训规定","question":"国家对司法鉴定教育培训工作的要求（ ）。","options":{"A":"先培训后上岗","B":"先上岗后培训","C":"仅培训新上岗人员","D":"在岗人员不需要培训"},"answer":["A"],"ref":"《司法鉴定教育培训规定》第三条。"},{"id":"6_846","type":"single","chapter":"司法鉴定教育培训规定","question":"司法鉴定人需要接受（）培训后，方可以司法鉴定人的名义独立进行执业活动。","options":{"A":"继续教育","B":"重新教育","C":"岗位","D":"技能"},"answer":["C"],"ref":"《司法鉴定教育培训规定》第四条。"},{"id":"6_847","type":"single","chapter":"司法鉴定教育培训规定","question":"司法鉴定教育培训由（）负责规划、组织和指导。","options":{"A":"立法机关","B":"公安机关","C":"检察机关","D":"司法行政机关"},"answer":["D"],"ref":"《司法鉴定教育培训规定》第六条。"},{"id":"6_848","type":"single","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》规定的继续教育实行（ ）学时制度。","options":{"A":"月度","B":"季度","C":"半年度","D":"年度"},"answer":["D"],"ref":"《司法鉴定教育培训规定》第十三条。"},{"id":"6_849","type":"single","chapter":"司法鉴定教育培训规定","question":"司法鉴定人年度内在境外工作（）个月以上，经省级司法行政机关批准后，可以免修年度继续教育学时。","options":{"A":"三","B":"六","C":"九","D":"十"},"answer":["B"],"ref":"《司法鉴定教育培训规定》第十七条。"},{"id":"6_850","type":"single","chapter":"司法鉴定教育培训规定","question":"司法鉴定人年度内病假或事假（）个月以上，经省级司法行政机关批准后，可以免修年度继续教育学时。","options":{"A":"三","B":"六","C":"九","D":"十"},"answer":["B"],"ref":"《司法鉴定教育培训规定》第十七条。"},{"id":"6_851","type":"multi","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》所称的司法鉴定教育培训包括（ ）。","options":{"A":"岗位培训","B":"继续教育","C":"在职培训","D":"管理培训"},"answer":["A","B"],"ref":"《司法鉴定教育培训规定》第二条。"},{"id":"6_852","type":"multi","chapter":"司法鉴定教育培训规定","question":"司法鉴定教育培训工作根据国家“先培训后上岗”和终身教育的要求，坚持 842 C，《司法鉴定教育培训规定》前言部分。 843 A，《司法鉴定教育培训规定》第八条。 844 C，《司法鉴定教育培训规定》第八条。 845 A，《司法鉴定教育培训规定》第三条。 846 C，《司法鉴定教育培训规定》第四条。 847 D，《司法鉴定教育培训规定》第六条。 848 D，《司法鉴定教育培训规定》第十三条。 849 B，《司法鉴定教育培训规定》第十七条。 850 B，《司法鉴定教育培训规定》第十七条。 下列哪些原则（ ）。","options":{"A":"统筹规划","B":"分级负责","C":"按需组织","D":"分类实施"},"answer":["A","B","C","D"],"ref":"《司法鉴定教育培训规定》第三条。"},{"id":"6_853","type":"multi","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》所规定的岗位培训的对象包括（ ）。","options":{"A":"已取得司法鉴定人执业证书已经独立执业的人员","B":"已取得司法鉴定人执业证书尚未独立执业的人员","C":"申请司法鉴定执业的人员","D":"司法行政机关的工作人员"},"answer":["B","C"],"ref":"《司法鉴定教育培训规定》第七条。"},{"id":"6_855","type":"multi","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》所称的岗位培训分为（ ）。","options":{"A":"学历教育培训","B":"继续教育培训","C":"岗前培训","D":"转岗培训"},"answer":["C","D"],"ref":"《司法鉴定教育培训规定》第八条。"},{"id":"6_856","type":"multi","chapter":"司法鉴定教育培训规定","question":"继续教育的目的是不断提高司法鉴定人的（ ），实现可持续发展。","options":{"A":"政治素质","B":"业务素质","C":"职业道德素质","D":"身体素质"},"answer":["A","B","C"],"ref":"《司法鉴定教育培训规定》第十二条。"},{"id":"6_857","type":"multi","chapter":"司法鉴定教育培训规定","question":"继续教育的内容主要是司法鉴定的（ ）。","options":{"A":"新理论","B":"新知识","C":"新技术","D":"新方法"},"answer":["A","B","C","D"],"ref":"《司法鉴定教育培训规定》第十二条。"},{"id":"6_858","type":"multi","chapter":"司法鉴定教育培训规定","question":"司法鉴定人参加下列哪些活动，计入学时（ ）。","options":{"A":"司法部或者省级司法行政机关组织或者委托举办的研讨、交流和培训","B":"司法部或者省级司法行政机关认可的国内、国外的大专院校、科研机构开展的相关专业学历教育和进修","C":"省级司法行政机关认可，由所在业务主管部门或者行业组织开展的专业对口的研讨、交流和培训","D":"教育行政部门认可的对口专业教育"},"answer":["A","B","C","D"],"ref":"《司法鉴定教育培训规定》第十四条。"},{"id":"6_859","type":"multi","chapter":"司法鉴定教育培训规定","question":"司法鉴定人参加下列哪些活动的，计入学时（ ）。","options":{"A":"国际性司法鉴定研讨、交流和培训","B":"教育行政部门认可的对口专业教育","C":"行业组织开展的专业对口的研讨、交流和培训","D":"司法鉴定人自学相关理论"},"answer":["A","B"],"ref":"《司法鉴定教育培训规定》第十四条。C 需要经过省级司法行政机关认可。"},{"id":"6_860","type":"multi","chapter":"司法鉴定教育培训规定","question":"司法鉴定人有下列哪些情形的，经省级司法行政机关批准后，可以免修年度继续教育学时（）。","options":{"A":"本年度内在境外工作六个月以上","B":"本年度内病假六个月以上","C":"女性司法鉴定人在孕期、产假、哺乳期内","D":"本年度内事假六个月以上"},"answer":["A","B","C","D"],"ref":"《司法鉴定教育培训规定》第十七条。"},{"id":"6_862","type":"multi","chapter":"司法鉴定教育培训规定","question":"省级司法行政机关负责组织和管理本行政区域司法鉴定人继续教育工作，需要履行的职责包括（）。","options":{"A":"制定本行政区域司法鉴定人继续教育计划并组织实施","B":"组织编写和推荐司法鉴定人继续教育教材","C":"确定本行政区域司法鉴定人继续教育基地","D":"组织检查本行政区域司法鉴定人继续教育工作"},"answer":["A","C","D"],"ref":"《司法鉴定教育培训规定》第十九条。B 为司法部职责。"},{"id":"6_863","type":"multi","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》的制定是为了提高司法鉴定队伍的哪些素质（）。","options":{"A":"政治素质","B":"业务素质","C":"职业道德素质","D":"心理素质"},"answer":["A","B","C"],"ref":"《司法鉴定教育培训规定》第一条。"},{"id":"6_864","type":"multi","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》规定的岗位培训的内容包括（ ）。","options":{"A":"国家有关政策方针","B":"鉴定业务知识","C":"相关法律知识","D":"职业道德、执业纪律、执业规则"},"answer":["A","B","C","D"],"ref":"《司法鉴定教育培训规定》第七条。"},{"id":"6_865","type":"multi","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》规定的岗前培训的人员包括（ ）。","options":{"A":"未取得司法鉴定人执业证书的人员","B":"已取得司法鉴定人执业证书尚未独立执业的人员","C":"取得司法鉴定人执业证书已经执业的人员","D":"司法行政机关的工作人员"},"answer":["A","B"],"ref":"《司法鉴定教育培训规定》第八条。"},{"id":"6_866","type":"multi","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》规定的岗前培训应当统一（ ）内容。","options":{"A":"统一培训内容","B":"统一培训要求","C":"统一考核形式","D":"统一颁发证书"},"answer":["A","B","C","D"],"ref":"《司法鉴定教育培训规定》第九条。"},{"id":"6_867","type":"multi","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》规定的岗位培训应当在（ ）或（）确定的司法鉴定继续教育基地和培训机构中进行。","options":{"A":"司法部","B":"公安部","C":"省级司法行政机关","D":"市级司法行政机关"},"answer":["A","C"],"ref":"《司法鉴定教育培训规定》第十条。"},{"id":"6_868","type":"multi","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》中转岗培训对象是相关专业人员，相关专业是指鉴定人的（）与所拟从事的鉴定执业类别相关联。","options":{"A":"专业学历","B":"专业技术职称任职资格","C":"执业资格","D":"专业技能"},"answer":["A","B","C"],"ref":"《司法鉴定教育培训规定》第二十三条。"},{"id":"6_869","type":"judge","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》仅适用于已取得司法鉴定人执业证书的人员。","answer":"×","ref":"《司法鉴定教育培训规定》第二条。适用于申请和已取得司法鉴定人执业证书的人员。"},{"id":"6_870","type":"judge","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》所称的司法鉴定教育培训包括岗位培训和继续教育。","answer":"√","ref":"《司法鉴定教育培训规定》第二条。"},{"id":"6_871","type":"judge","chapter":"司法鉴定教育培训规定","question":"司法鉴定教育培训工作根据国家“先上岗后培训”和终身教育的要求，坚持统筹规划、分级负责、按需组织、分类实施的原则。","answer":"×","ref":"《司法鉴定教育培训规定》第三条。先培训后上岗。"},{"id":"6_872","type":"judge","chapter":"司法鉴定教育培训规定","question":"司法鉴定人接受岗位培训后，方可以司法鉴定人的名义独立进行执业活动。","answer":"√","ref":"《司法鉴定教育培训规定》第四条。"},{"id":"6_873","type":"judge","chapter":"司法鉴定教育培训规定","question":"司法鉴定人完成规定的继续教育学时是申报评定司法鉴定专业技术职称任职资格的条件之一。","answer":"√","ref":"《司法鉴定教育培训规定》第四条。"},{"id":"6_874","type":"judge","chapter":"司法鉴定教育培训规定","question":"司法鉴定机构组织教育培训的情况，并非必然纳入对其进行资质评估、考核评价的内容。","answer":"×","ref":"《司法鉴定教育培训规定》第五条，纳入。"},{"id":"6_875","type":"judge","chapter":"司法鉴定教育培训规定","question":"岗位培训是指以适应职业岗位任职的需要，达到司法鉴定岗位资质要求和执业能力为目的的学习和培训活动。","answer":"√","ref":"《司法鉴定教育培训规定》第七条。"},{"id":"6_876","type":"judge","chapter":"司法鉴定教育培训规定","question":"转岗培训是指对未取得司法鉴定人执业证书的人员和已取得司法鉴定人执业证书尚未独立执业的人员进行的培训。","answer":"×","ref":"《司法鉴定教育培训规定》第八条。岗前培训。"},{"id":"6_877","type":"judge","chapter":"司法鉴定教育培训规定","question":"岗前培训是指对取得司法鉴定人执业证书已经执业和尚未独立执业的人员进行的培训。","answer":"×","ref":"《司法鉴定教育培训规定》第八条。转岗培训。"},{"id":"6_878","type":"judge","chapter":"司法鉴定教育培训规定","question":"岗前培训的培训对象是相关专业的人员。“相关专业”是指鉴定人的专业学历、专业技术职称任职资格和执业资格与所拟从事的鉴定执业类别相关联。","answer":"×","ref":"《司法鉴定教育培训规定》第八条。相同专业。二十三条。"},{"id":"6_879","type":"judge","chapter":"司法鉴定教育培训规定","question":"转岗培训的培训对象是相同专业的人员。“相同专业”是指鉴定人的专业学历、专业技术职称任职资格和执业资格与所拟从事的鉴定执业类别相一致。","answer":"×","ref":"《司法鉴定教育培训规定》第八条。相关专业。二十三条。"},{"id":"6_880","type":"judge","chapter":"司法鉴定教育培训规定","question":"岗前培训应当做到五个统一：即统一培训内容、统一培训要求、统一培训时间、统一考核形式和统一颁发证书。","answer":"√","ref":"《司法鉴定教育培训规定》第九条第一款。"},{"id":"6_881","type":"judge","chapter":"司法鉴定教育培训规定","question":"岗位培训应当在司法部或者省级司法行政机关确定的司法鉴定人继续教育基地和培训机构进行。","answer":"√","ref":"《司法鉴定教育培训规定》第十条。"},{"id":"6_882","type":"judge","chapter":"司法鉴定教育培训规定","question":"岗位教育是指司法鉴定人执业后，为进一步改善知识结构、提高执业能力而进行的学历教育和非学历教育。","answer":"×","ref":"《司法鉴定教育培训规定》第十一条，继续教育。"},{"id":"6_883","type":"judge","chapter":"司法鉴定教育培训规定","question":"继续教育的内容主要是司法鉴定的新理论、新知识、新技术、新方法。","answer":"√","ref":"《司法鉴定教育培训规定》第十二条。"},{"id":"6_884","type":"judge","chapter":"司法鉴定教育培训规定","question":"继续教育实行年度学时制度。","answer":"√","ref":"《司法鉴定教育培训规定》第十三条。"},{"id":"6_885","type":"judge","chapter":"司法鉴定教育培训规定","question":"司法鉴定人参加行业组织开展的专业对口的研讨、交流和培训，计入继续教育学时。","answer":"×","ref":"《司法鉴定教育培训规定》第十四条，须经过省级司法行政机关认可。"},{"id":"6_886","type":"judge","chapter":"司法鉴定教育培训规定","question":"司法鉴定人参加国际性司法鉴定研讨、交流和培训的，计 8 学时。","answer":"×","ref":"《司法鉴定教育培训规定》第十五条。16 学时。"},{"id":"6_887","type":"judge","chapter":"司法鉴定教育培训规定","question":"司法鉴定人参加全国性司法鉴定研讨、交流和培训的，计 16 学时。","answer":"×","ref":"《司法鉴定教育培训规定》第十五条。12 学时。"},{"id":"6_888","type":"judge","chapter":"司法鉴定教育培训规定","question":"司法鉴定人参加省级司法鉴定研讨、交流和培训的，计 8 学时。","answer":"√","ref":"《司法鉴定教育培训规定》第十五条。"},{"id":"6_889","type":"judge","chapter":"司法鉴定教育培训规定","question":"司法鉴定机构每年应当在规定的时间内，将本机构司法鉴定人参加继续教育活动的有关证明材料统一提交司法行政机关，由司法行政机关核计学时并记入档案。","answer":"√","ref":"《司法鉴定教育培训规定》第十六条。"},{"id":"6_890","type":"judge","chapter":"司法鉴定教育培训规定","question":"女性司法鉴定人在孕期、产假、哺乳期内应当免修年度继续教育学时。","answer":"×","ref":"《司法鉴定教育培训规定》第十七条，经省级司法行政机关批准后，可以免修。"},{"id":"6_891","type":"judge","chapter":"司法鉴定教育培训规定","question":"本年度内在境外工作三个月以上的，经省级司法行政机关批准后，可以免修年度继续教育学时。","answer":"×","ref":"《司法鉴定教育培训规定》第十七条，六个月。"},{"id":"6_892","type":"judge","chapter":"司法鉴定教育培训规定","question":"本年度内病假、事假六个月以上的，经省级司法行政机关批准后，可以免修年度继续教育学时。","answer":"√","ref":"《司法鉴定教育培训规定》第十七条。"},{"id":"6_893","type":"judge","chapter":"司法鉴定教育培训规定","question":"未达到规定的年度继续教育学时要求的，司法行政机关应当根据有关规定予以处理。","answer":"×","ref":"《司法鉴定教育培训规定》第十八条，对于无正当理由者。"},{"id":"6_894","type":"judge","chapter":"司法鉴定教育培训规定","question":"组织编写和推荐司法鉴定人继续教育教材是省级司法行政机关需要履行的职责。","answer":"×","ref":"《司法鉴定教育培训规定》第十九条。司法部的职责。"},{"id":"6_895","type":"judge","chapter":"司法鉴定教育培训规定","question":"司法鉴定行业协会在司法行政机关指导下，组织实施继续教育活动。","answer":"√","ref":"《司法鉴定教育培训规定》第二十一条。"},{"id":"6_896","type":"judge","chapter":"司法鉴定教育培训规定","question":"司法鉴定机构在司法行政机关指导下，组织实施继续教育活动。司法鉴定行业协会应当为司法鉴定人参加继续教育提供便利条件。","answer":"×","ref":"《司法鉴定教育培训规定》第二十一条、第二十二条。反了。司法鉴定行业协会在司法行政机关指导下，组织实施继续教育活动。司法鉴定机构应当为司法鉴定人参加继续教育提供便利条件。"},{"id":"6_897","type":"judge","chapter":"司法鉴定教育培训规定","question":"司法鉴定人取得司法鉴定人执业证书后，即可独立进行执业活动。","answer":"×","ref":"《司法鉴定教育培训规定》第四条。司法鉴定人接受岗位培训后，方可以司法鉴定人的名义独立进行执业活动。"},{"id":"6_898","type":"judge","chapter":"司法鉴定教育培训规定","question":"司法鉴定机构是否组织本机构司法鉴定人参加继续教育培训，对于该机构的资质评估、考核评价没有影响。","answer":"×","ref":"《司法鉴定教育培训规定》第五条。司法鉴定机构组织教育培训的情况，纳入对其进行资质评估、考核评价的内容。"},{"id":"6_899","type":"judge","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》适用于已取得司法鉴定人执业证书的人员。","answer":"√","ref":"《司法鉴定教育培训规定》第二条。"},{"id":"6_900","type":"judge","chapter":"司法鉴定教育培训规定","question":"司法鉴定机构无需组织本机构司法鉴定人参加教育培训。","answer":"×","ref":"《司法鉴定教育培训规定》第五条。司法鉴定机构应当按照本规定的要求，组织本机构司法鉴定人参加教育培训。"},{"id":"6_901","type":"judge","chapter":"司法鉴定教育培训规定","question":"司法鉴定机构组织教育培训的情况，纳入对其进行资质评估、考核评价的内容。","answer":"√","ref":"《司法鉴定教育培训规定》第五条。"},{"id":"6_902","type":"judge","chapter":"司法鉴定教育培训规定","question":"法院负责对司法鉴定教育培训工作进行规划、组织和指导。","answer":"×","ref":"《司法鉴定教育培训规定》第六条。司法行政机关负责对司法鉴定教育培训工作进行规划、组织和指导。"},{"id":"6_904","type":"judge","chapter":"司法鉴定教育培训规定","question":"岗位培训的对象是指申请司法鉴定执业的人员。","answer":"×","ref":"《司法鉴定教育培训规定》第七条。岗位培训的对象包括申请司法鉴定执业的人员和已取得司法鉴定人执业证书尚未独立执业的人员。"},{"id":"6_905","type":"judge","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》规定岗位培训的内容包括相关法律知识。","answer":"√","ref":"《司法鉴定教育培训规定》第七条。"},{"id":"6_906","type":"judge","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》规定岗位培训的内容包括鉴定业务知识。","answer":"√","ref":"《司法鉴定教育培训规定》第七条。"},{"id":"6_907","type":"judge","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》规定岗位培训的内容包括职业道德。","answer":"√","ref":"《司法鉴定教育培训规定》第七条。"},{"id":"6_908","type":"judge","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》规定岗位培训的内容包括执业规则。","answer":"√","ref":"《司法鉴定教育培训规定》第七条。"},{"id":"6_909","type":"judge","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》规定岗位培训的内容包括职业纪律。","answer":"√","ref":"《司法鉴定教育培训规定》第七条。"},{"id":"6_910","type":"judge","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》规定岗位培训分为岗前培训和转岗培训。","answer":"√","ref":"《司法鉴定教育培训规定》第八条。"},{"id":"6_911","type":"judge","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》规定岗前培训方案由司法部制定并组织实施。","answer":"×","ref":"《司法鉴定教育培训规定》第九条。岗前培训方案由省级司法行政机关制定并组织实施。"},{"id":"6_912","type":"judge","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》规定转岗培训方案由省级司法行政机关制定并指导实施。","answer":"×","ref":"《司法鉴定教育培训规定》第九条。转岗培训方案由司法部制定并指导实施。"},{"id":"6_913","type":"judge","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》规定岗前培训方案由各级司法行政机关制定并组织实施。","answer":"×","ref":"《司法鉴定教育培训规定》第九条。岗前培训方案由省级司法行政机关制定并组织实施。"},{"id":"6_914","type":"judge","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》规定岗前培训应当根据不同地区的不同情况，采取不同的培训要求和考核形式。","answer":"×","ref":"《司法鉴定教育培训规定》第九条。岗前培训应当统一培训内容、统一培训要求、统一培训时间、统一考核形式和统一颁发证书。"},{"id":"6_915","type":"judge","chapter":"司法鉴定教育培训规定","question":"《司法鉴定教育培训规定》规定继续教育实行季度学时制度。","answer":"×","ref":"《司法鉴定教育培训规定》第十三条。继续教育实行年度学时制度。"},{"id":"7_916","type":"multi","chapter":"司法鉴定职业道德基本规范","question":"《司法鉴定职业道德基本规范》要求鉴定人崇尚法治，尊重科学。下列为其基本要求的是（）。 903 ×，《司法鉴定教育培训规定》第六条。司法行政机关对司法鉴定机构及其司法鉴定人参加教育培训的情况进行监督、检查。 904 ×，《司法鉴定教育培训规定》第七条。岗位培训的对象包括申请司法鉴定执业的人员和已取得司法鉴定人执业证书尚未独立执业的人员。 905 √，《司法鉴定教育培训规定》第七条。 906 √，《司法鉴定教育培训规定》第七条。 907 √，《司法鉴定教育培训规定》第七条。 908 √，《司法鉴定教育培训规定》第七条。 909 √，《司法鉴定教育培训规定》第七条。 910 √，《司法鉴定教育培训规定》第八条。 911 ×，《司法鉴定教育培训规定》第九条。岗前培训方案由省级司法行政机关制定并组织实施。 912 ×，《司法鉴定教育培训规定》第九条。转岗培训方案由司法部制定并指导实施。 913 ×，《司法鉴定教育培训规定》第九条。岗前培训方案由省级司法行政机关制定并组织实施。 914 ×，《司法鉴定教育培训规定》第九条。岗前培训应当统一培训内容、统一培训要求、统一培训时间、统一考核形式和统一颁发证书。 915 ×，《司法鉴定教育培训规定》第十三条。继续教育实行年度学时制度。","options":{"A":"树立法律意识","B":"培养法治精神","C":"遵守诉讼程序和法律规定","D":"遵循科学原理、科学方法和技术规范"},"answer":["A","B","C","D"],"ref":"《司法鉴定职业道德基本规范》崇尚法治，尊重科学。"},{"id":"7_917","type":"multi","chapter":"司法鉴定职业道德基本规范","question":"《司法鉴定职业道德基本规范》要求鉴定人服务大局，执业为民。下列为其基本要求的是（）。","options":{"A":"树立法律意识","B":"坚持以人为本，牢固树立社会主义法治理念","C":"保障司法，服务诉讼","D":"化解矛盾纠纷，维护公民合法权益"},"answer":["B","C","D"],"ref":"《司法鉴定职业道德基本规范》服务大局，执业为民。"},{"id":"7_918","type":"multi","chapter":"司法鉴定职业道德基本规范","question":"《司法鉴定职业道德基本规范》要求鉴定人严谨规范，讲求效率。下列为其基本要求的是（）。","options":{"A":"认真负责，严格细致，一丝不苟","B":"正确适用技术标准","C":"运行有序，保证质量，及时有效","D":"严格遵守实施程序和执业行为规则"},"answer":["A","B","C","D"],"ref":"《司法鉴定职业道德基本规范》严谨规范，讲求效率。"},{"id":"7_919","type":"multi","chapter":"司法鉴定职业道德基本规范","question":"《司法鉴定职业道德基本规范》要求鉴定人廉洁自律，诚信敬业。下列为其基本要求的是（）。","options":{"A":"品行良好，行为规范，举止文明","B":"恪守司法鉴定职业伦理","C":"遵守保密规定，注重职业修养","D":"注重社会效益，维护职业声誉"},"answer":["A","B","C","D"],"ref":"《司法鉴定职业道德基本规范》廉洁自律，诚信敬业。"},{"id":"7_920","type":"multi","chapter":"司法鉴定职业道德基本规范","question":"《司法鉴定职业道德基本规范》要求鉴定人相互尊重，持续发展。下列为其基本要求的是（）。","options":{"A":"尊重同行，交流合作，公平竞争","B":"维护司法鉴定执业秩序","C":"更新观念、提高","D":"严格遵守实施程序和执业行为规则"},"answer":["A","B","C"],"ref":"《司法鉴定职业道德基本规范》相互尊重，持续发展。"},{"id":"7_921","type":"judge","chapter":"司法鉴定职业道德基本规范","question":"《司法鉴定职业道德基本规范》中“崇尚法治，尊重科学”基本要求（）树立法律意识，培养法治精神，遵守诉讼程序和法律规定;遵循科学原理、科学方法和技术规范。","answer":"√","ref":"《司法鉴定职业道德基本规范》崇尚法治，尊重科学。"},{"id":"7_922","type":"judge","chapter":"司法鉴定职业道德基本规范","question":"《司法鉴定职业道德基本规范》主要内容（）崇尚法治，尊重科学；服务大局，执业为民；客观公正，探真求实；严谨规范，讲求效率；廉洁自律，诚信敬业；相互尊重，持续发展。","answer":"√","ref":"《司法鉴定职业道德基本规范》主要内容。"},{"id":"7_923","type":"judge","chapter":"司法鉴定职业道德基本规范","question":"《司法鉴定职业道德基本规范》中“客观公正，探真求实”基本要求（ ）尊重规律，实事求是，依法独立执业，促进司法公正，维护公平公义;对法律负责， 对科学负责，对案件事实负责，对执业行为负责。","answer":"√","ref":"《司法鉴定职业道德基本规范》客观公正，探真求实。"},{"id":"7_925","type":"judge","chapter":"司法鉴定职业道德基本规范","question":"《司法鉴定职业道德基本规范》中“相互尊重，持续发展”基本要求（）尊重同行，交流合作，公平竞争，维护司法鉴定执业秩序;更新观念、提高能力，继续教育，促进司法鉴定行业可持续发展。","answer":"√","ref":"《司法鉴定职业道德基本规范》相互尊重，持续发展。"},{"id":"8_926","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构在领取《司法鉴定许可证》后的（ ）日内，应当按照有关规定刻制印章、办理与机构执业活动有关的收费许可、税务登记、机构代码证件等 依法执业手续，并将相关情况报送审核登记的司法行政机关备案。","options":{"A":"十","B":"三十","C":"六十","D":"九十"},"answer":["C"],"ref":"《司法鉴定机构内部管理规范》第八条。"},{"id":"8_927","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当建立重大事项报告制度，受理具有重大社会影响案件委托后的（）小时内，向所在地及省级司法行政机关报告相关信息。","options":{"A":"24","B":"48","C":"72","D":"12"},"answer":["A"],"ref":"《司法鉴定机构内部管理规范》第十五条。"},{"id":"8_928","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当建立完善（）制度，负责办理本机构从业人员的执业证书、聘用合同、职称评聘、社会保障、执业保险等相关事务。","options":{"A":"人事管理","B":"档案管理","C":"财务管理","D":"鉴定业务管理"},"answer":["A"],"ref":"《司法鉴定机构内部管理规范》第二十六条。"},{"id":"8_929","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当依法建立完善（），单独建立账册。对外统一收取鉴定等费用，依法出具票据;对内按劳计酬，合理确定分配形式，逐步建立教育培训基金、执业责任保险基金和机构发展基金。","options":{"A":"人事管理制度","B":"档案管理制度","C":"财务管理制度","D":"鉴定业务管理制度"},"answer":["C"],"ref":"《司法鉴定机构内部管理规范》第二十条。"},{"id":"8_930","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当建立完善（）。司法鉴定机构红印、司法鉴定专用章、财务专用章以及司法鉴定许可证等，除需要公示的，应当由机构指定专人统一管理并按规定使用。","options":{"A":"档案管理制度","B":"印章和证书管理制度","C":"财务管理制度","D":"鉴定业务管理制度"},"answer":["B"],"ref":"《司法鉴定机构内部管理规范》第二十一条。"},{"id":"8_931","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当建立完善（），支持和保障本机构人员参加在岗培训、继续教育和学术交流与科研活动，定期组织本机构人员开展业务交流和专题讨论。","options":{"A":"鉴定业务管理制度","B":"档案管理制度","C":"财务管理制度","D":"教育培训和业务考评制度"},"answer":["D"],"ref":"《司法鉴定机构内部管理规范》第二十五。"},{"id":"8_932","type":"single","chapter":"司法鉴定机构内部管理规范","question":"《司法鉴定机构内部管理规范》适用于经（ ）依法审核登记的司法鉴定机构。","options":{"A":"司法行政机关","B":"公安机关","C":"人民法院","D":"人民检察院"},"answer":["A"],"ref":"《司法鉴定机构内部管理规范》第二条。"},{"id":"8_933","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当建立完善（），明确质量组织、管理体系和内部运转程序，加强质量管理，提高鉴定质量。","options":{"A":"质量管理体系","B":"档案管理制度","C":"财务管理制度","D":"鉴定业务管理制度"},"answer":["C"],"ref":"《司法鉴定机构内部管理规范》第十二条。"},{"id":"8_934","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当建立完善（）。对于重大疑难和特殊复杂问题的鉴定或者有争议案件的鉴定，应当组织鉴定人研究讨论，并做好书面记录。","options":{"A":"内部讨论和复核制度","B":"印章和证书管理制度","C":"财务管理制度","D":"鉴定业务管理制度"},"answer":["A"],"ref":"《司法鉴定机构内部管理规范》第十四条。"},{"id":"8_936","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当根据本机构司法鉴定业务档案的制作、存储要求，配备档案管理人员，切实做好（）。","options":{"A":"档案管理工作","B":"监督评审工作","C":"实验室认可工作","D":"人事管理工作"},"answer":["A"],"ref":"《司法鉴定机构内部管理规范》第十七条。"},{"id":"8_937","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当建立完善司法鉴定风险告知、鉴定质量评估办法，建立（）基金。","options":{"A":"执业风险","B":"执业保障","C":"执业控制","D":"执业损失"},"answer":["A"],"ref":"《司法鉴定机构内部管理规范》第十九条。"},{"id":"8_938","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构受到暂停执业或者撤销登记处罚的，应当终止鉴定;己受理的鉴定委托尚未办结的，应当主动通知（）办理清结手续。","options":{"A":"委托人","B":"当事人","C":"被鉴定人","D":"被告方"},"answer":["A"],"ref":"《司法鉴定机构内部管理规范》第二十三条。"},{"id":"8_939","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当建立完善（），统一受理鉴定委托、统一签订委托协议、统一指派鉴定人员、统一收取鉴定费用、统一建立鉴定材料审核、接收、保管、使用、退还和存档等工作制度。","options":{"A":"重大事项报告制度","B":"档案管理制度","C":"业务管理制度","D":"人事管理工作"},"answer":["C"],"ref":"《司法鉴定机构内部管理规范》第十一条。"},{"id":"8_940","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当接受（ ）和司法鉴定行业协会的管理、监督和指导。","options":{"A":"公安机关","B":"司法行政机关","C":"人民检察院","D":"人民法院"},"answer":["B"],"ref":"《司法鉴定机构内部管理规范》第三条。"},{"id":"8_941","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定人拟变更执业机构的，司法鉴定机构应当责成其清结以往受理的鉴定委托，收回司法鉴定人执业证，并及时向司法行政机关办理相关（）手续。","options":{"A":"清退","B":"注销","C":"解除","D":"离职"},"answer":["B"],"ref":"《司法鉴定机构内部管理规范》第二十四条。"},{"id":"8_942","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构相关从业人员自行解除聘用合同或者被辞退的，司法鉴定机构应当及时办理（）手续。","options":{"A":"注销","B":"解除","C":"离职","D":"清退"},"answer":["D"],"ref":"《司法鉴定机构内部管理规范》第二十四条。"},{"id":"8_943","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构法定代表人和机构负责人（ ）为同一人。","options":{"A":"不可以","B":"必须","C":"可以","D":"一定"},"answer":["C"],"ref":"《司法鉴定机构内部管理规范》第六条。"},{"id":"8_944","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定依据的外部信息、外聘专家意见及签名（）存入同一鉴定业务档案，存档备案。","options":{"A":"不必","B":"应当","C":"不需要","D":"可以"},"answer":["B"],"ref":"《司法鉴定机构内部管理规范》第十三条。"},{"id":"8_945","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当加强执业活动的监督管理，指定（）负责接待投诉、核查立案、调查处理工作。","options":{"A":"第一鉴定人","B":"专人","C":"机构负责人","D":"机构行政人员"},"answer":["B"],"ref":"《司法鉴定机构内部管理规范》第二十二条。"},{"id":"8_946","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构可以根据鉴定业务需要聘用司法鉴定人助理，辅助司法鉴定人开展司法鉴定业务活动，（）在鉴定意见书上签名。","options":{"A":"可以","B":"应当","C":"必须","D":"不得"},"answer":["D"],"ref":"《司法鉴定机构内部管理规范》第七条。"},{"id":"8_947","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定人助理应当经（）司法行政机关备案。","options":{"A":"县级","B":"市级","C":"省级","D":"国家"},"answer":["C"],"ref":"《司法鉴定机构内部管理规范》第七条。"},{"id":"8_948","type":"single","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构负责人可以依章程产生，也可以由（）授权或者申请设立主体任命。","options":{"A":"法定代表人","B":"资深鉴定人","C":"质量负责人","D":"专人"},"answer":["A"],"ref":"《司法鉴定机构内部管理规范》第六条。"},{"id":"8_951","type":"multi","chapter":"司法鉴定机构内部管理规范","question":"以下哪些是鉴定机构需要公示的信息（ ）。","options":{"A":"司法鉴定机构业务范围和《司法鉴定许可证（正本）》证书","B":"司法鉴定收费项目和收费标准","C":"执业承诺和风险告知","D":"投诉监督电话和联系人姓名"},"answer":["A","B","C","D"],"ref":"《司法鉴定机构内部管理规范》第十条。"},{"id":"8_952","type":"multi","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当建立完善业务管理制度，统一（）、统一建立鉴定材料审核、接收、保管、使用、退还和存档等工作制度。","options":{"A":"受理鉴定委托","B":"签订委托协议","C":"收取鉴定费用","D":"指派鉴定人员"},"answer":["A","B","C","D"],"ref":"《司法鉴定机构内部管理规范》第十一条。"},{"id":"8_953","type":"multi","chapter":"司法鉴定机构内部管理规范","question":"以下哪些是鉴定机构需要公示的信息（ ）。","options":{"A":"职业道德和执业纪律","B":"执业承诺和风险告知","C":"投诉监督电话和联系人姓名","D":"司法鉴定收费项目和收费标准"},"answer":["A","B","C","D"],"ref":"《司法鉴定机构内部管理规范》第十条。"},{"id":"8_954","type":"multi","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当加强执业活动的监督管理，指定专人负责（ ）工作，回复司法行政机关或者司法鉴定行业协会转交的涉及本机构投诉事项的调查办理 31 C，《司法鉴定机构内部管理规范》第十三条第一款。 意见。","options":{"A":"接待投诉","B":"核查立案","C":"调查处理","D":"侦察"},"answer":["A","B","C"],"ref":"《司法鉴定机构内部管理规范》第二十二条。"},{"id":"8_955","type":"multi","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当依法建立完善财务管理制度，单独建立账册。对外统一收取鉴定等费用，依法出具票据;对内按劳计酬，合理确定分配形式，逐步建立（）。","options":{"A":"教育培训基金","B":"执业责任保险基金","C":"机构发展基金","D":"失业保险金"},"answer":["A","B","C"],"ref":"《司法鉴定机构内部管理规范》第二十条。"},{"id":"8_957","type":"multi","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当秉承（）、合作的原则，根据鉴定业务需要依法聘用人员并保障其合法权益，保障司法鉴定人依法独立执业，维护鉴定人合法权益，规范鉴定人执业行为。","options":{"A":"依法","B":"科学","C":"规范","D":"诚信"},"answer":["A","B","C","D"],"ref":"《司法鉴定机构内部管理规范》第七条。"},{"id":"8_958","type":"multi","chapter":"司法鉴定机构内部管理规范","question":"不具有法人资格的司法鉴定机构应当有设立主体的授权书，内容包括（）等。","options":{"A":"机构负责人任免及职责","B":"重大仪器设备购置或使用","C":"财务管理","D":"人员管理"},"answer":["A","B","C","D"],"ref":"《司法鉴定机构内部管理规范》第五条。"},{"id":"8_959","type":"multi","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构的执业场所应当根据业务范围和执业类别要求，合理划分（）等区域。","options":{"A":"接待鉴定委托","B":"保管鉴定材料","C":"实施鉴定活动","D":"存放鉴定档案"},"answer":["A","B","C","D"],"ref":"《司法鉴定机构内部管理规范》第九条。"},{"id":"8_960","type":"multi","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当根据法律法规规章和本规范，建立完善机构内部管理制度，加强专业化、职业化、规范化和科学化建设，提高从业人员的（）。","options":{"A":"政治素质","B":"业务素质","C":"职业道德素质","D":"心理素质"},"answer":["A","B","C"],"ref":"《司法鉴定机构内部管理规范》第三条。"},{"id":"8_961","type":"multi","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当接受司法行政机关和司法鉴定行业协会的（ ）。","options":{"A":"管理","B":"监督","C":"指导","D":"命令"},"answer":["A","B","C"],"ref":"《司法鉴定机构内部管理规范》第三条。"},{"id":"8_963","type":"multi","chapter":"司法鉴定机构内部管理规范","question":"具有法人资格的司法鉴定机构应当制定机构章程，包括下列内容（ ）。","options":{"A":"司法鉴定人及其相关从业人员的权利和义务","B":"司法鉴定机构内相关职能部门的设置和职责","C":"司法鉴定机构章程变更、修改","D":"司法鉴定机构内部执业管理、质量管理形式"},"answer":["A","B","C","D"],"ref":"《司法鉴定机构内部管理规范》第四条。"},{"id":"8_964","type":"multi","chapter":"司法鉴定机构内部管理规范","question":"具有法人资格的司法鉴定机构应当制定机构章程，包括下列内容（ ）。","options":{"A":"司法鉴定机构资产来源、财务管理和使用分配形式","B":"司法鉴定机构注销或者撤销后的终止程序及其资产处理","C":"司法鉴定机构章程变更、修改","D":"司法鉴定机构内部执业管理、质量管理形式"},"answer":["A","B","C","D"],"ref":"《司法鉴定机构内部管理规范》第四条。"},{"id":"8_965","type":"multi","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当秉承依法、科学、规范、诚信、合作的原则，根据鉴定业务需要（）。","options":{"A":"依法聘用人员并保障其合法权益","B":"保障司法鉴定人依法独立执业","C":"维护鉴定人合法权益","D":"规范鉴定人执业行为"},"answer":["A","B","C","D"],"ref":"《司法鉴定机构内部管理规范》第七条。"},{"id":"8_966","type":"multi","chapter":"司法鉴定机构内部管理规范","question":"司法鉴定机构应当建立完善教育培训和业务考评制度，支持和保障本机构人员参加（），定期组织本机构人员开展业务交流和专题讨论。","options":{"A":"在岗培训","B":"继续教育","C":"学术交流","D":"科研活动三、判断题（认为正确的划“√”，错误的划“   var cj=qs.filter(function(q){return q.type==='judge';}).length;
  var item=document.createElement('div');
  item.className='ch-item'; item.id='ch-'+ch;
  item.innerHTML='<div class="ch-check">✓</div><div class="ch-info"><div class="ch-name">'+chName(ch)+'</div><div class="ch-badges">'+(cs?'<span class="bdg bdg-s">单选 '+cs+'</span>':'')+(cm?'<span class="bdg bdg-m">多选 '+cm+'</span>':'')+(cj?'<span class="bdg bdg-j">判断 '+cj+'</span>':'')+'</div></div>';
  item.onclick=(function(c){return function(){selectCh(c);};})(ch);
  list.appendChild(item);
});

function selectCh(ch){
  if(ch==='__all__'){
    selChapters={'__all__':true};
    chapters.forEach(function(c){ var el=document.getElementById('ch-'+c); if(el) el.classList.remove('sel'); });
    document.getElementById('ch-__all__').classList.add('sel');
    return;
  }
  delete selChapters['__all__'];
  document.getElementById('ch-__all__').classList.remove('sel');
  if(selChapters[ch]){ delete selChapters[ch]; document.getElementById('ch-'+ch).classList.remove('sel'); }
  else{ selChapters[ch]=true; document.getElementById('ch-'+ch).classList.add('sel'); }
  if(!Object.keys(selChapters).length){ selChapters={'__all__':true}; document.getElementById('ch-__all__').classList.add('sel'); }
}

document.getElementById('type-row').querySelectorAll('.pill').forEach(function(btn){
  btn.onclick=function(){
    document.getElementById('type-row').querySelectorAll('.pill').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active'); selType=btn.getAttribute('data-v');
  };
});
document.getElementById('mode-row').querySelectorAll('.pill').forEach(function(btn){
  btn.onclick=function(){
    document.getElementById('mode-row').querySelectorAll('.pill').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active'); mode=btn.getAttribute('data-v');
  };
});

document.getElementById('btn-start').onclick=startQuiz;
document.getElementById('btn-prev').onclick=prevQ;
document.getElementById('btn-skip').onclick=skipQ;
document.getElementById('btn-next').onclick=nextQ;
document.getElementById('btn-home').onclick=function(){saveProgress();showHome();};
document.getElementById('btn-restart').onclick=restartQuiz;
document.getElementById('btn-review-wrong').onclick=reviewWrong;
document.getElementById('btn-quit').onclick=function(){saveProgress();showHome();};
document.getElementById('btn-show-ans').onclick=showAns;

function getFiltered(){
  return QUESTIONS.filter(function(q){
    if(!selChapters['__all__']&&!selChapters[q.chapter]) return false;
    if(selType!=='all'&&q.type!==selType) return false;
    return true;
  });
}

function startQuiz(){
  var qs=getFiltered();
  if(mode==='wrong'){ qs=qs.filter(function(q){return wrongIds[q.id];}); if(!qs.length){alert('暂无错题！先做几道题再来复习吧。');return;} }
  if(!qs.length){alert('当前筛选条件下没有题目。');return;}
  if(mode==='random') qs=qs.slice().sort(function(){return Math.random()-0.5;});
  quiz=qs; idx=0; answered={}; multiSel=[];
  clearProgress();
  showQuiz(); renderQ();
}

function renderQ(){
  var q=quiz[idx]; var ans=answered[idx];
  var tl={single:'单选题',multi:'多选题',judge:'判断题'};
  var tc={single:'q-tag tag-s',multi:'q-tag tag-m',judge:'q-tag tag-j'};
  document.getElementById('q-tag').textContent=tl[q.type];
  document.getElementById('q-tag').className=tc[q.type];
  document.getElementById('q-ch').textContent=chName(q.chapter);
  document.getElementById('q-ctr').textContent=(idx+1)+'/'+quiz.length;
  document.getElementById('hdr-ctr').textContent=(idx+1)+'/'+quiz.length;

  // Progress bar
  var pct=Math.round((idx+1)/quiz.length*100);
  document.getElementById('hdr-prog-fill').style.width=pct+'%';

  document.getElementById('q-text').textContent=q.question;
  var hint=document.getElementById('q-hint');
  if(q.type==='multi'){ hint.textContent='（多选题，选出所有正确答案后点击"提交"）'; hint.style.display=''; }
  else hint.style.display='none';

  var area=document.getElementById('q-opts'); area.innerHTML='';

  if(q.type==='judge'){
    var row=document.createElement('div'); row.className='judge-row';
    ['√','×'].forEach(function(sym){
      var btn=document.createElement('button'); btn.className='j-btn'; btn.textContent=sym;
      if(ans){ btn.disabled=true; if(sym===q.answer) btn.classList.add('j-ok'); else if(ans.sel[0]===sym) btn.classList.add('j-bad'); }
      else btn.onclick=(function(s){return function(){submitAns([s]);};})(sym);
      row.appendChild(btn);
    });
    area.appendChild(row);
  } else {
    var opts=document.createElement('div'); opts.className='opts';
    ['A','B','C','D'].forEach(function(letter){
      if(!q.options[letter]) return;
      var btn=document.createElement('button'); btn.className='opt'; btn.setAttribute('data-l',letter);
      btn.innerHTML='<span class="opt-ltr">'+letter+'</span><span>'+q.options[letter]+'</span>';
      if(ans){
        btn.disabled=true;
        if(q.answer.indexOf(letter)!==-1) btn.classList.add('ans-ok');
        else if(ans.sel.indexOf(letter)!==-1) btn.classList.add('ans-bad');
      } else {
        btn.onclick=(function(l){return function(){pickOpt(l);};})(letter);
      }
      if(!ans&&multiSel.indexOf(letter)!==-1) btn.classList.add('picked');
      opts.appendChild(btn);
    });
    area.appendChild(opts);
    if(q.type==='multi'&&!ans){
      var sub=document.createElement('button');
      sub.className='nav-btn primary'; sub.style.width='100%'; sub.style.marginTop='14px'; sub.style.padding='14px';
      sub.textContent='提交答案';
      sub.onclick=function(){ if(!multiSel.length){alert('请至少选择一个选项');return;} submitAns(multiSel.slice()); };
      area.appendChild(sub);
    }
  }

  var fb=document.getElementById('q-fb');
  if(ans){
    fb.style.display='';
    var cls=ans.skipped?'feedback fb-skip':(ans.ok?'feedback fb-ok':'feedback fb-bad');
    var title=ans.skipped?'已跳过':(ans.ok?'✓ 回答正确！':'✗ 回答错误');
    var ca=q.type==='judge'?q.answer:q.answer.join('、');
    fb.className=cls;
    fb.innerHTML='<div class="fb-title">'+title+'</div>'+(!ans.ok&&!ans.skipped?'<div class="fb-ans">正确答案：'+ca+'</div>':'')+(q.ref?'<div class="fb-ref">依据：'+q.ref+'</div>':'');
  } else fb.style.display='none';

  document.getElementById('btn-prev').disabled=idx===0;
  document.getElementById('btn-skip').style.display=ans?'none':'';
  document.getElementById('btn-show-ans').style.display=ans?'none':'';
  var isLast=idx===quiz.length-1;
  var nb=document.getElementById('btn-next');
  nb.textContent=isLast?'完成 ✓':'下一题 →';
  if(q.type==='multi'&&!ans) nb.style.visibility='hidden'; else nb.style.visibility='';

  updateStats();
}

function showAns(){
  var q=quiz[idx];
  var ca=q.type==='judge'?q.answer:q.answer.join('、');
  var fb=document.getElementById('q-fb');
  fb.className='feedback fb-show';
  fb.innerHTML='<div class="fb-title">📖 正确答案</div><div class="fb-ans">答案：'+ca+'</div>'+(q.ref?'<div class="fb-ref">依据：'+q.ref+'</div>':'');
  fb.style.display='';
  document.getElementById('btn-show-ans').style.display='none';
}

function pickOpt(letter){
  var q=quiz[idx];
  if(q.type==='single'){submitAns([letter]);return;}
  var pos=multiSel.indexOf(letter);
  if(pos!==-1) multiSel.splice(pos,1); else multiSel.push(letter);
  document.getElementById('q-opts').querySelectorAll('.opt').forEach(function(btn){
    var l=btn.getAttribute('data-l');
    var ltr=btn.querySelector('.opt-ltr');
    if(multiSel.indexOf(l)!==-1){
      btn.classList.add('picked');
      ltr.style.background='var(--gold)'; ltr.style.borderColor='var(--gold)'; ltr.style.color='white';
    } else {
      btn.classList.remove('picked');
      ltr.style.background=''; ltr.style.borderColor=''; ltr.style.color='';
    }
  });
}

function submitAns(sel){
  var q=quiz[idx]; var ok;
  if(q.type==='judge') ok=sel[0]===q.answer;
  else ok=sel.slice().sort().join('')===q.answer.slice().sort().join('');
  answered[idx]={sel:sel,ok:ok,skipped:false};
  if(!ok) wrongIds[q.id]=true; else delete wrongIds[q.id];
  saveWrong(); saveProgress(); multiSel=[];
  renderQ();
}

function nextQ(){
  if(!answered[idx]) return;
  if(idx<quiz.length-1){ idx++; multiSel=[]; saveProgress(); renderQ(); }
  else{ clearProgress(); showResults(); }
}
function prevQ(){ if(idx>0){idx--;multiSel=[];renderQ();} }
function skipQ(){
  answered[idx]={sel:[],ok:false,skipped:true};
  wrongIds[quiz[idx].id]=true; saveWrong(); saveProgress(); multiSel=[];
  if(idx<quiz.length-1){idx++;renderQ();} else{clearProgress();showResults();}
}

function updateStats(){
  var vals=Object.keys(answered).map(function(k){return answered[k];});
  document.getElementById('sc').textContent=vals.filter(function(v){return v.ok;}).length;
  document.getElementById('sw').textContent=vals.filter(function(v){return !v.ok&&!v.skipped;}).length;
  document.getElementById('ss').textContent=vals.filter(function(v){return v.skipped;}).length;
  var pct=quiz.length?Math.round(vals.length/quiz.length*100):0;
  document.getElementById('hdr-prog-fill').style.width=pct+'%';
}

function showResults(){
  var vals=Object.keys(answered).map(function(k){return answered[k];});
  var c=vals.filter(function(v){return v.ok;}).length;
  var w=vals.filter(function(v){return !v.ok&&!v.skipped;}).length;
  var s=vals.filter(function(v){return v.skipped;}).length;
  var pct=quiz.length?Math.round(c/quiz.length*100):0;
  document.getElementById('res-pct').textContent=pct+'%';
  document.getElementById('res-c').textContent=c;
  document.getElementById('res-w').textContent=w;
  document.getElementById('res-s').textContent=s;
  document.getElementById('wrong-n').textContent=w+s;
  showRes();
}

function reviewWrong(){
  var wq=[];
  quiz.forEach(function(q,i){ if(answered[i]&&(!answered[i].ok||answered[i].skipped)) wq.push(q); });
  if(!wq.length){alert('没有错题！');return;}
  quiz=wq; idx=0; answered={}; multiSel=[];
  showQuiz(); renderQ();
}
function restartQuiz(){
  idx=0; answered={}; multiSel=[];
  if(mode==='random') quiz.sort(function(){return Math.random()-0.5;});
  clearProgress(); showQuiz(); renderQ();
}

function showHome(){
  document.getElementById('S-home').style.display='';
  document.getElementById('S-quiz').style.display='none';
  document.getElementById('S-res').style.display='none';
  document.getElementById('hdr-prog').style.display='none';
  document.getElementById('hdr-ctr').style.display='none';
  showResumeBar();
}
function showQuiz(){
  document.getElementById('S-home').style.display='none';
  document.getElementById('S-quiz').style.display='';
  document.getElementById('S-res').style.display='none';
  document.getElementById('hdr-prog').style.display='';
  document.getElementById('hdr-ctr').style.display='';
}
function showRes(){
  document.getElementById('S-home').style.display='none';
  document.getElementById('S-quiz').style.display='none';
  document.getElementById('S-res').style.display='';
  document.getElementById('hdr-prog').style.display='none';
  document.getElementById('hdr-ctr').style.display='none';
}

function showResumeBar(){
  var prog=loadProgress();
  var bar=document.getElementById('resume-bar');
  if(!prog){bar.classList.remove('show');return;}
  var done=Object.keys(prog.answered).length;
  var total=prog.quiz.length;
  var correct=Object.keys(prog.answered).filter(function(k){return prog.answered[k].ok;}).length;
  var d=new Date(prog.ts);
  var ts=(d.getMonth()+1)+'月'+d.getDate()+'日 '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
  document.getElementById('resume-info').textContent=ts+' · '+done+'/'+total+' 题 · 正确 '+correct;
  bar.classList.add('show');
}
function resumeQuiz(){
  var prog=loadProgress(); if(!prog) return;
  quiz=prog.quiz; idx=prog.idx; answered=prog.answered;
  selChapters=prog.selChapters; selType=prog.selType; mode=prog.mode;
  multiSel=[];
  showQuiz(); renderQ();
}

// Init
document.getElementById('total-n').textContent='共 '+QUESTIONS.length+' 道题 · 6个章节 · 单选 / 多选 / 判断';
showResumeBar();
</script>
</body>
</html>
